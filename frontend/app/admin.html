<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blabby Admin</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M4 26 L4 14 L10 19 L16 8 L22 19 L28 14 L28 26 Z' fill='none' stroke='%23C9A84C' stroke-width='2' stroke-linejoin='round'/><line x1='4' y1='26' x2='28' y2='26' stroke='%23C9A84C' stroke-width='2'/><circle cx='16' cy='7' r='2' fill='%23C9A84C'/><circle cx='4' cy='13' r='2' fill='%23C9A84C'/><circle cx='28' cy='13' r='2' fill='%23C9A84C'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=EB+Garamond:ital,wght@0,400;0,500;0,700;1,400&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  :root {
    --cream:    #F5F0E8;
    --bg:       #F5F0E8;
    --surface:  #FDFAF4;
    --ink:      #2C2416;
    --navy:     #1A3550;
    --gold:     #C9A84C;
    --green:    #2D5016;
    --red:      #6B1A1A;
    --amber:    #8a6e1a;
    --border:   #C4B89A;
    --muted:    #7A6E5F;
    --line:     #ececec;
    --sans:     'Inter Tight', system-ui, sans-serif;
    --serif:    'EB Garamond', Georgia, serif;
    /* Dashboard redesign tokens (handoff) — additive, used by #dashboard-tab only */
    --surface-2: #FBF9F3;
    --ink-soft:  #4A4234;
    --faint:     #B3A892;
    --danger:    #8E2A2A;
    --valid:     #3D6B24;
    --partial:   #A9791B;
    --invalid:   #9A9488;
    --border-2:  #EDE7DA;
    --mono:      'DM Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; writing-mode: horizontal-tb; }
  html, body {
    background: var(--cream); color: var(--ink);
    font-family: var(--sans); font-size: 14px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }

  /* === Top bar === */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .topbar__brand {
    font-family: var(--serif); font-size: 18px; font-weight: 700;
    color: var(--navy); letter-spacing: 0.02em;
  }
  .topbar__brand span { color: var(--gold); margin-left: 6px; font-style: italic; font-weight: 400; }
  .topbar__user { font-size: 12px; color: var(--muted); }
  .topbar__user a { color: var(--gold); margin-left: 12px; text-decoration: none; }
  .topbar__user a:hover { text-decoration: underline; }

  /* === Tabs === */
  .tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 10px 18px; font-family: var(--sans); font-size: 13px;
    color: var(--muted); cursor: pointer; background: transparent;
    border: none; border-bottom: 2px solid transparent;
    letter-spacing: 0.04em; transition: color 100ms ease, border-color 100ms ease;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--navy); border-bottom-color: var(--gold);
    font-weight: 600;
  }
  .tab-panel:not(.active) { display: none; height: calc(100vh - 47px - 41px); overflow: hidden; }
  .tab-panel.active { display: block; }
  .tab-panel.active.layout { display: grid; }

  /* === Pro grant management (訂閱管理 tab) — 3-col layout === */
  .subs-search {
    padding: 8px 14px; border-bottom: 1px solid var(--line);
    background: var(--surface); position: sticky; top: 41px; z-index: 1;
  }
  .subs-search input {
    width: 100%; padding: 6px 10px;
    border: 1px solid var(--border); border-radius: 3px;
    font-family: var(--sans); font-size: 12px; color: var(--ink);
    background: var(--bg);
  }
  .subs-search input:focus { outline: none; border-color: var(--gold); }
  .subs-user-row {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    cursor: pointer; transition: background 100ms ease;
  }
  .subs-user-row:hover { background: rgba(201,168,76,0.06); }
  .subs-user-row.active {
    background: rgba(201,168,76,0.16);
    border-left: 3px solid var(--gold);
    padding-left: 11px;
  }
  .subs-user-row__email {
    font-size: 12px; color: var(--ink); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .subs-user-row__status {
    font-size: 10px; font-family: var(--sans); margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .subs-user-row__status.pro { color: var(--green); font-weight: 700; }
  .subs-user-row__status.free { color: var(--muted); }
  .subs-user-row__status .manual { color: var(--gold); margin-left: 6px; font-style: italic; }

  /* Middle: detail (redesign — hierarchy: info card → action area → result) */
  .subs-detail { padding: 24px 28px; max-width: 560px; }

  /* Info card — always visible when a user is selected */
  .subs-info { margin-bottom: 24px; }
  .subs-info__email {
    font-family: var(--serif); font-size: 22px; font-weight: 700;
    color: var(--navy); margin-bottom: 10px; word-break: break-all;
  }
  .subs-info__meta {
    display: flex; flex-direction: column; gap: 3px;
    font-size: 12px; color: var(--muted); margin-bottom: 16px;
  }
  .subs-info__meta-label { font-style: italic; }

  /* Big status badge — same visual weight as .badge.valid/.invalid */
  .subs-status-badge {
    display: inline-block;
    padding: 6px 14px;
    font-family: var(--sans); font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
    border-radius: 3px;
  }
  .subs-status-badge--pro {
    background: var(--green); color: var(--gold);
    border: 1px solid var(--green);
  }
  .subs-status-badge--free {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
  }
  .subs-info__grant-line {
    font-size: 11px; color: var(--muted); font-style: italic;
    margin-top: 8px; line-height: 1.5; word-break: break-word;
  }

  /* Pro audit info box — reuses cream + gold left-border visual language */
  .subs-pro-info {
    background: var(--cream); border-left: 2px solid var(--gold);
    padding: 12px 14px; margin-bottom: 14px;
    font-family: var(--serif); font-size: 13px; color: var(--ink);
  }
  .subs-pro-info__row { padding: 2px 0; }
  .subs-pro-info__row-label {
    display: inline-block; min-width: 80px;
    font-size: 11px; font-family: var(--sans); color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .subs-pro-info__row-value {
    font-family: var(--serif); color: var(--ink);
  }

  /* Action area — single primary entry point, no clutter */
  .subs-action {
    margin-top: 18px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .subs-action__upgrade {
    width: 100%;
    padding: 11px 16px;
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 3px;
    font-family: var(--serif); font-size: 14px; letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 100ms ease;
  }
  .subs-action__upgrade:hover:not(:disabled) {
    background: rgba(45,80,22,0.06);
  }
  .subs-action__revoke {
    padding: 7px 14px;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: 3px;
    font-family: var(--sans); font-size: 12px; letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 100ms ease;
  }
  .subs-action__revoke:hover:not(:disabled) {
    background: rgba(107,26,26,0.06);
  }
  .subs-action__upgrade:disabled,
  .subs-action__revoke:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Expand-on-click grant form (hidden by default) */
  .subs-grant-form { display: none; }
  .subs-grant-form.is-open { display: flex; flex-direction: column; gap: 10px; }
  .subs-grant-form__label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  /* Expiry option pills (7天 / 30天 / 永久 / 自訂) */
  .subs-expiry-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .subs-expiry-pill {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--sans); font-size: 12px;
    color: var(--muted); cursor: pointer;
    transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
  }
  .subs-expiry-pill:hover { color: var(--ink); border-color: var(--ink); }
  .subs-expiry-pill.active {
    background: var(--green); color: var(--gold); border-color: var(--green);
  }
  .subs-expiry-custom { display: none; }
  .subs-expiry-custom.is-shown { display: block; }
  /* "已到期" red badge replacing PRO when grant has expired */
  .subs-status-badge--expired {
    background: transparent; color: var(--red);
    border: 1px solid var(--red);
  }
  .subs-grant-form__input {
    padding: 9px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-family: var(--sans); font-size: 13px; color: var(--ink);
    background: var(--bg);
  }
  .subs-grant-form__input:focus { outline: none; border-color: var(--gold); }
  .subs-grant-form__confirm {
    padding: 10px 16px;
    background: var(--green); color: var(--gold);
    border: 1px solid var(--green); border-radius: 3px;
    font-family: var(--serif); font-size: 14px; letter-spacing: 0.04em;
    cursor: pointer;
  }
  .subs-grant-form__confirm:hover:not(:disabled) { background: #244112; }
  .subs-grant-form__confirm:disabled { opacity: 0.5; cursor: not-allowed; }
  .subs-grant-form__cancel {
    align-self: center;
    font-size: 12px; color: var(--muted);
    cursor: pointer; text-decoration: underline;
    background: transparent; border: none; padding: 4px;
  }
  .subs-grant-form__cancel:hover { color: var(--ink); }

  /* Inline result */
  .subs-result {
    font-size: 13px; min-height: 18px; margin-top: 12px;
  }
  .subs-result.ok  { color: var(--green); }
  .subs-result.err { color: var(--red); }
  .subs-detail__status-box {
    background: var(--cream); border-left: 2px solid var(--gold);
    padding: 14px 16px; margin-bottom: 16px;
  }
  .subs-detail__status-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 6px;
  }
  .subs-detail__status-value {
    font-family: var(--serif); font-size: 20px;
    margin-bottom: 4px;
  }
  .subs-detail__status-value.pro  { color: var(--green); }
  .subs-detail__status-value.free { color: var(--muted); }
  .subs-detail__status-note { font-size: 12px; color: var(--muted); }
  .subs-detail__form { display: flex; flex-direction: column; gap: 10px; max-width: 460px; }
  .subs-detail__form label {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .subs-detail__form input {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 3px;
    font-family: var(--sans); font-size: 13px; color: var(--ink);
    background: var(--bg);
  }
  .subs-detail__form input:focus { outline: none; border-color: var(--gold); }
  .subs-detail__btn {
    width: 100%; padding: 10px;
    font-family: var(--serif); font-size: 14px; letter-spacing: 0.03em;
    border-radius: 3px; cursor: pointer;
  }
  .subs-detail__btn--grant {
    background: var(--green); color: var(--gold); border: 1px solid var(--green);
  }
  .subs-detail__btn--grant:hover:not(:disabled) { background: #244112; }
  .subs-detail__btn--revoke {
    background: transparent; color: var(--red); border: 1px solid var(--red);
  }
  .subs-detail__btn--revoke:hover:not(:disabled) { background: rgba(107,26,26,0.06); }
  .subs-detail__btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .subs-detail__result { font-size: 13px; min-height: 18px; margin-top: 4px; }
  .subs-detail__result.ok   { color: var(--green); }
  .subs-detail__result.err  { color: var(--red); }

  /* Right: action log */
  .subs-action-item {
    padding: 12px 14px; border-bottom: 1px solid var(--line);
    font-size: 12px;
  }
  .subs-action-item__when {
    font-family: monospace; font-size: 11px; color: var(--muted); margin-bottom: 4px;
  }
  .subs-action-item__what { color: var(--ink); }
  .subs-action-item__what .verb-grant  { color: var(--green); font-weight: 700; }
  .subs-action-item__what .verb-revoke { color: var(--red); font-weight: 700; }
  .subs-action-item__reason {
    font-style: italic; color: var(--muted); font-size: 11px; margin-top: 4px;
  }

  /* === Legacy subscriptions panel (dead — kept to avoid surgical drift) === */
  .subs-wrap { padding: 16px 20px; overflow-y: auto; height: 100%; }
  .subs-wrap h2 {
    font-family: var(--serif); font-size: 16px; color: var(--navy);
    margin-bottom: 12px; letter-spacing: 0.04em;
  }
  .subs-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .subs-table th {
    text-align: left; padding: 8px 10px; font-family: var(--sans);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0;
  }
  .subs-table td {
    padding: 10px; border-bottom: 1px solid var(--line);
    font-size: 12px; color: var(--ink); vertical-align: middle;
  }
  .subs-table tr:hover td { background: rgba(201,168,76,0.04); }
  .subs-table .email { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .subs-table .actions { white-space: nowrap; }
  .subs-table .expiring-soon { color: var(--red); font-weight: 600; }

  .sub-badge {
    display: inline-block; padding: 2px 8px; border-radius: 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; font-family: var(--sans);
  }
  .sub-badge.active    { background: rgba(45,80,22,0.12);  color: var(--green); }
  .sub-badge.pending   { background: rgba(201,168,76,0.18); color: #8a6e1a; }
  .sub-badge.expired   { background: #f3efe6;              color: var(--muted); }
  .sub-badge.cancelled { background: rgba(107,26,26,0.12); color: var(--red); }

  .subs-actions-btn {
    padding: 4px 10px; font-size: 11px; border: 1px solid var(--border);
    background: var(--surface); color: var(--navy);
    cursor: pointer; font-family: var(--sans); margin-right: 6px;
  }
  .subs-actions-btn:hover:not(:disabled) { background: rgba(201,168,76,0.10); }
  .subs-actions-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .subs-actions-btn.cancel { color: var(--red); border-color: rgba(107,26,26,0.3); }
  .subs-actions-btn.cancel:hover:not(:disabled) { background: rgba(107,26,26,0.06); }

  /* === Changelog panel === */
  .changelog {
    padding: 28px 36px 60px; max-width: 720px; margin: 0 auto;
    overflow-y: auto; height: 100%;
    font-family: var(--serif);
    background: var(--cream);
  }
  .changelog__version {
    padding: 26px 0 30px;
    border-bottom: 1px solid rgba(196,184,154,0.45);
  }
  .changelog__version:first-child { padding-top: 12px; }
  .changelog__version:last-child  { border-bottom: none; }
  .changelog__head {
    margin-bottom: 18px;
    font-family: 'EB Garamond', Georgia, serif;
    line-height: 1.4;
  }
  .changelog__ver {
    font-size: 26px; color: var(--gold); font-weight: 700;
    letter-spacing: 0.02em;
  }
  .changelog__date {
    font-size: 13px; color: var(--muted); font-style: italic;
    margin-left: 12px;
  }
  .changelog__feature { margin-bottom: 18px; }
  .changelog__feature:last-child { margin-bottom: 0; }
  .changelog__title {
    color: var(--green); font-weight: 700; font-size: 15px;
    margin-bottom: 5px;
    font-family: 'Inter Tight', system-ui, sans-serif;
    letter-spacing: 0.01em;
  }
  .changelog__desc {
    color: var(--ink); font-size: 14px; line-height: 1.75;
    white-space: pre-wrap;
  }

  /* === Three-column layout === */
  .layout {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr) 420px;
    gap: 0;
    height: calc(100vh - 47px);
  }
  .col {
    overflow-y: auto;
    border-right: 1px solid var(--border);
    background: var(--surface);
  }
  .col:last-child { border-right: none; }
  .col__title {
    padding: 12px 14px; font-family: var(--serif); font-size: 13px;
    font-weight: 700; color: var(--navy); letter-spacing: 0.06em;
    text-transform: uppercase; border-bottom: 1px solid var(--line);
    background: var(--surface); position: sticky; top: 0; z-index: 1;
  }
  .col__body { padding: 6px 0; }
  .col__empty {
    padding: 24px 14px; color: var(--muted); font-style: italic; font-size: 13px;
  }

  /* === Left: user list === */
  .user-row {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    cursor: pointer; transition: background 100ms ease;
  }
  .user-row:hover { background: rgba(201,168,76,0.06); }
  .user-row.active {
    background: rgba(201,168,76,0.16);
    border-left: 3px solid var(--gold);
    padding-left: 11px;
  }
  .user-row__email {
    font-size: 12px; color: var(--ink); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 100%;
  }
  .user-row__counts {
    display: flex; gap: 8px; font-size: 11px; margin-top: 4px;
    font-family: monospace;
  }
  .user-row__counts .v { color: var(--green); }
  .user-row__counts .p { color: var(--amber); }
  .user-row__counts .i { color: var(--red); }
  .user-row__counts .user-row__last { margin-left: auto; color: var(--muted); }
  .user-row__top { display: flex; align-items: center; gap: 6px; }
  .user-row__top .user-row__email { flex: 1; min-width: 0; }
  .user-row__plan {
    font-size: 9px; font-weight: 700; letter-spacing: 0.04em; padding: 1px 5px;
    border-radius: 2px; background: rgba(45,80,22,0.12); color: var(--green); flex-shrink: 0;
  }
  .user-controls {
    padding: 8px 10px; border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 6px;
    background: var(--surface); position: sticky; top: 41px; z-index: 1;
  }
  .user-controls__row { display: flex; gap: 6px; align-items: center; }
  .user-search, .user-sort {
    font-family: var(--sans); font-size: 12px; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 4px; background: white; color: var(--ink);
  }
  .user-search { width: 100%; }
  .user-sort { flex-shrink: 0; }
  .user-chips { display: flex; gap: 4px; flex-wrap: wrap; }
  .user-chip {
    font-family: var(--sans); font-size: 11px; padding: 3px 8px; cursor: pointer;
    border: 1px solid var(--border); border-radius: 10px; background: none; color: var(--muted);
  }
  .user-chip:hover { color: var(--ink); }
  .user-chip.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* === Middle: triage bar + practice rows === */
  .triage-bar {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    font-size: 12px; background: var(--surface);
    position: sticky; top: 41px; z-index: 1;
  }
  .triage-bar__stats { font-family: var(--serif); color: var(--ink); font-size: 13px; }
  .triage-bar__stats .qc { font-weight: 700; margin-right: 8px; }
  .triage-bar__stats .qc.v { color: var(--green); }
  .triage-bar__stats .qc.p { color: var(--amber); }
  .triage-bar__stats .qc.i { color: var(--red); }
  .triage-bar__total { color: var(--muted); }
  .triage-bar__actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .toggle {
    display: inline-flex; align-items: center; gap: 5px;
    cursor: pointer; color: var(--muted); font-size: 12px;
  }
  .toggle input { cursor: pointer; }
  .btn {
    padding: 5px 12px; border: 1px solid var(--gold); background: var(--surface);
    color: var(--green); font-family: var(--sans); font-size: 12px;
    cursor: pointer; letter-spacing: 0.02em; transition: background 100ms ease;
  }
  .btn:hover:not(:disabled) { background: rgba(201,168,76,0.10); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn--primary {
    background: var(--green); color: var(--gold); border-color: var(--green);
  }
  .btn--primary:hover:not(:disabled) { background: #244112; }
  .status {
    font-size: 11px; color: var(--muted); font-style: italic;
  }

  /* Part 1 / Part 2 filter tabs — sits between triage-bar and practice rows.
     NOT sticky: when triage-bar wraps (actions row breaks to second line on
     narrow widths) its height would push the tabs into overlap. Tabs scroll
     with content; triage-bar stays sticky alone. Background uses --cream so
     it's visually distinct from the --surface triage-bar above. */
  .part-filter-tabs {
    display: flex; gap: 4px;
    /* Middle column has no .col__title above triage-bar, so triage-bar's
       sticky top:41px pulls it DOWN by 41px from its natural y=0 at scroll=0.
       Tabs in normal flow start at (triage natural height) and would overlap
       the sticky-shifted triage-bar. margin-top = 41 (clear the shift) + 8
       (visual gap) pushes tabs below the sticky pin zone. Independent of
       triage-bar height since the shift amount is what matters. */
    margin-top: 49px;
    padding: 10px 14px;
    background: var(--cream);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .part-filter-tab {
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-family: var(--sans); font-size: 12px;
    color: var(--muted); cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
  }
  .part-filter-tab:hover { color: var(--ink); }
  .part-filter-tab.active {
    background: var(--green); color: var(--gold); border-color: var(--green);
  }

  /* Practice row */
  .prow {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    gap: 10px; padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 12px; cursor: pointer; align-items: start;
    transition: background 100ms ease;
  }
  .prow:hover { background: rgba(201,168,76,0.05); }
  .prow.active { background: rgba(201,168,76,0.14); }
  .prow.hidden { display: none; }
  .prow__time { color: var(--muted); font-family: monospace; font-size: 11px; }
  .prow__main { min-width: 0; }
  .prow__q {
    font-style: italic; color: var(--ink); font-size: 12px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .prow__t {
    color: var(--muted); font-size: 11px; margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .prow__grade { text-align: right; }

  /* === Quality badges === */
  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 2px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; font-family: var(--sans);
  }
  .badge.valid    { background: rgba(45,80,22,0.12);  color: var(--green); }
  .badge.partial  { background: rgba(201,168,76,0.18); color: var(--amber); }
  .badge.invalid  { background: rgba(107,26,26,0.12); color: var(--red); }
  .badge.unknown  { background: rgba(122,110,95,0.12); color: var(--muted); }
  .badge.none     { background: #f3efe6; color: #999; }
  .badge.tag {
    background: rgba(26,53,80,0.10); color: var(--navy); text-transform: none;
    font-style: italic; font-weight: 500;
  }

  /* === Right: student detail === */
  .right-header {
    padding: 14px; border-bottom: 1px solid var(--line);
  }
  .right-header__email {
    font-family: var(--serif); font-size: 16px; font-weight: 500;
    color: var(--navy); margin-bottom: 6px; word-break: break-all;
  }
  .right-header__meta { font-size: 11px; color: var(--muted); }
  .right-actions {
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .right-section { padding: 14px; border-bottom: 1px solid var(--line); }
  .right-section h3 {
    font-family: var(--serif); font-size: 13px; color: var(--navy);
    font-weight: 700; margin-bottom: 8px; letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .brief-block, .diag-block {
    background: var(--cream); padding: 12px; border-left: 2px solid var(--gold);
    font-size: 13px; line-height: 1.7; color: var(--ink);
    white-space: pre-wrap; word-break: break-word;
    font-family: var(--serif);
  }
  .brief-block.loading, .diag-block.loading {
    color: var(--muted); font-style: italic;
  }
  .copy-btn {
    margin-top: 8px; font-size: 11px; padding: 3px 10px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
  }
  .copy-btn:hover { color: var(--green); border-color: var(--green); }

  /* Markdown rendering for AI diagnosis */
  .md h1, .md h2 {
    font-family: var(--serif); font-size: 14px; color: var(--navy);
    margin: 12px 0 6px; padding-bottom: 3px; border-bottom: 1px solid var(--line);
  }
  .md h1:first-child, .md h2:first-child { margin-top: 0; }
  .md h3 { font-size: 13px; font-weight: 700; margin: 10px 0 4px; color: var(--ink); }
  .md p  { margin: 0 0 8px; }
  .md ul, .md ol { margin: 0 0 8px 18px; }
  .md li { margin-bottom: 3px; }
  .md strong { color: var(--ink); font-weight: 700; }
  .md em { color: var(--navy); font-style: italic; }

  /* Record detail panel (clicked from middle column) */
  .detail-field { margin-bottom: 10px; }
  .detail-field__label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 3px;
  }
  .detail-field__value {
    font-size: 13px; color: var(--ink); line-height: 1.6;
    word-break: break-word;
  }
  .detail-field__value.italic { font-style: italic; }
  .detail-field__value.empty { color: var(--muted); font-style: italic; }
  .detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }

  /* Part 2 structured scoring inside record detail */
  .p2-detail {
    background: var(--cream);
    border-left: 2px solid var(--gold);
    padding: 10px 12px;
    font-family: var(--serif);
    font-size: 13px;
    color: var(--ink);
  }
  .p2-detail__overall {
    font-family: var(--sans); font-size: 14px; font-weight: 700;
    color: var(--ink); margin-bottom: 6px;
  }
  .p2-detail__row {
    display: flex; justify-content: space-between;
    padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
  }
  .p2-detail__row:last-of-type { border-bottom: none; }
  .p2-detail__band {
    font-family: var(--sans); font-weight: 600;
    font-variant-numeric: tabular-nums; color: var(--ink);
  }
  .p2-detail__section {
    font-family: var(--sans); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin-top: 8px; font-style: italic;
  }
  .p2-detail__list {
    list-style: none; padding: 0; margin: 4px 0 0;
  }
  .p2-detail__list li { padding: 2px 0; line-height: 1.5; }

  /* === Mobile (single column with dropdown) === */
  .mobile-user-select { display: none; }
  @media (max-width: 900px) {
    .layout {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      height: auto;
    }
    .col {
      border-right: none; border-bottom: 1px solid var(--border);
      max-height: 70vh;
    }
    .col--users { display: none; }
    .mobile-user-select {
      display: block; padding: 10px 14px; background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .mobile-user-select select {
      width: 100%; padding: 8px; font-family: var(--sans); font-size: 13px;
      border: 1px solid var(--border); background: white;
    }
  }

  /* === Writing / Reading admin tabs (flat list + inline detail) === */
  #writing-tab.active, #reading-tab.active { display: block; overflow-y: auto; }
  .ltab-summary {
    padding: 10px 14px; font-size: 12px; color: var(--muted);
    border-bottom: 1px solid var(--line);
  }
  .lrow {
    display: flex; gap: 12px; align-items: baseline;
    padding: 9px 14px; border-bottom: 1px solid var(--line);
    font-size: 12px; cursor: pointer; transition: background 100ms ease;
  }
  .lrow:hover { background: rgba(201,168,76,0.05); }
  .lrow__time {
    color: var(--muted); font-family: monospace; font-size: 11px; white-space: nowrap;
  }
  .lrow__main { flex: 1 1 auto; min-width: 0; }
  .lrow__title {
    color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .lrow__meta { color: var(--muted); font-size: 11px; margin-top: 2px; }
  /* Zombie attempt: opened, never answered — greyed so a column of them reads at a glance. */
  .lrow.zombie { background: rgba(107,26,26,0.04); opacity: 0.72; }
  .lrow.zombie:hover { background: rgba(107,26,26,0.08); }
  .ldetail {
    padding: 12px 16px 16px; background: var(--cream);
    border-bottom: 1px solid var(--line);
  }
  .ldetail__essay {
    white-space: pre-wrap; font-family: var(--serif); font-size: 13px;
    line-height: 1.6; color: var(--ink); margin-bottom: 10px;
  }
  .ldim { border-left: 2px solid var(--gold); padding: 4px 0 4px 10px; margin-bottom: 8px; }
  .ldim__head {
    font-family: var(--sans); font-size: 11px; font-weight: 700; color: var(--ink);
    margin-bottom: 3px;
  }

  /* === 總覽 Dashboard (handoff §3.1) === */
  #dashboard-tab.active { display: block; overflow-y: auto; }
  .dash { max-width: 1500px; margin: 0 auto; padding: 22px 24px; }
  .dash-stats {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px;
  }
  .statcard {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 16px; border-top: 2px solid transparent;
  }
  .statcard--green  { border-top-color: var(--green); }
  .statcard--gold   { border-top-color: var(--gold); }
  .statcard__label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
  }
  .statcard__value {
    font-family: var(--mono); font-size: 30px; color: var(--ink); line-height: 1.1; margin-top: 6px;
  }
  .statcard__sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .dash-section {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 16px; margin-bottom: 22px;
  }
  .dash-section__title {
    font-family: var(--serif); font-size: 15px; color: var(--ink); margin-bottom: 14px;
  }
  .dash-bars { display: flex; gap: 10px; align-items: flex-end; height: 150px; }
  .dash-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
  .dash-bar__val { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .dash-bar__col {
    width: 100%; max-width: 48px; background: rgba(45,80,22,0.18);
    border-radius: 3px 3px 0 0; min-height: 2px;
  }
  .dash-bar.today .dash-bar__col { background: var(--green); }
  .dash-bar__day { font-size: 10px; color: var(--muted); }
  .dash-bar.today .dash-bar__day { color: var(--green); font-weight: 600; }
  .dash-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .actrow {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--line); cursor: pointer;
  }
  .actrow:last-child { border-bottom: none; }
  .actrow:hover { background: var(--surface-2); }
  .actrow__email {
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-size: 12px; color: var(--ink);
  }
  .actrow__time {
    font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap;
  }
  .actrow__time.warn   { color: var(--partial); }
  .actrow__time.danger { color: var(--danger); font-weight: 600; }
  .dash-empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 6px 0; }
  @media (max-width: 1180px) {
    .dash-stats { grid-template-columns: repeat(3, 1fr); }
    .dash-cols { grid-template-columns: 1fr; }
  }

  /* === 用戶管理 student-centric 2-pane detail (Phase 2) === */
  #users-tab { grid-template-columns: 296px minmax(0, 1fr); }
  .col--detail-pane { overflow-y: auto; }
  #detail-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .dh__top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .dh__email { font-family: var(--serif); font-size: 16px; color: var(--navy); word-break: break-all; }
  .dh__actions { display: flex; gap: 8px; flex-shrink: 0; }
  .dh__meta { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: var(--mono); }
  .dh__pro { display: flex; gap: 6px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
  .dh__reason {
    font-family: var(--sans); font-size: 12px; padding: 5px 8px; flex: 1; min-width: 120px;
    border: 1px solid var(--border); border-radius: 4px; background: white; color: var(--ink);
  }
  .dh__pro-result { font-size: 11px; color: var(--muted); }
  .bd { display: flex; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 10px; background: var(--surface-2); }
  .bd__seg--valid   { background: var(--valid); }
  .bd__seg--partial { background: var(--partial); }
  .bd__seg--invalid { background: var(--invalid); }
  .bd__seg--unknown { background: var(--faint); }
  .bd__legend { display: flex; gap: 12px; margin-top: 6px; font-size: 10.5px; color: var(--muted); }
  .bd__dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
  .bd__dot--valid   { background: var(--valid); }
  .bd__dot--partial { background: var(--partial); }
  .bd__dot--invalid { background: var(--invalid); }
  .subtabs { display: flex; gap: 4px; padding: 8px 16px 0; border-bottom: 1px solid var(--border); }
  .subtab {
    background: none; border: none; padding: 8px 12px; font-family: var(--sans);
    font-size: 12px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
  }
  .subtab:hover { color: var(--ink); }
  .subtab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 600; }
  .subpanel { display: none; }
  .subpanel.active { display: block; }
  @media (max-width: 900px) { #users-tab { grid-template-columns: 1fr; } }
  /* 概覽 sub-tab */
  .ov { padding: 14px 16px; }
  .ov-counts { display: flex; gap: 14px; margin-bottom: 18px; }
  .ov-count {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px; text-align: center;
  }
  .ov-count__n { font-family: var(--mono); font-size: 24px; color: var(--ink); }
  .ov-count__l { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ov-tl__row {
    display: flex; gap: 10px; align-items: baseline; padding: 6px 0;
    border-bottom: 1px solid var(--line); font-size: 12px;
  }
  .ov-tl__row:last-child { border-bottom: none; }
  .ov-tl__time { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
  .ov-tl__skill { font-size: 10px; padding: 1px 6px; border-radius: 2px; white-space: nowrap; }
  .ov-tl__skill--sp { background: rgba(45,80,22,0.12); color: var(--green); }
  .ov-tl__skill--wr { background: rgba(201,168,76,0.18); color: var(--amber); }
  .ov-tl__skill--rd { background: rgba(26,53,80,0.10); color: var(--navy); }
  .ov-tl__label { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="topbar">

<div class="tabs" role="tablist">

<script>
(() => {
  const cfg = window.BLABBY_CONFIG || {};
  const SUPABASE_URL = cfg.supabaseUrl;
  const SUPABASE_ANON_KEY = cfg.supabaseAnonKey;
  const API_BASE = 'https://blabby-backend.onrender.com';
  const ADMIN_EMAILS = ['galant.chiu@kumo-edu.com', 'galant19951209@gmail.com'];

  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    document.body.innerHTML = '<div style="padding:40px;font-family:serif;">Configuration missing.</div>';
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Page state — single source of truth, mutated by select* helpers below.
  const state = {
    users: [],            // [{user_id, email, record_count, quality_counts, last_seen, ...}]
    selectedUserId: null,
    detail: null,         // {user_id, email, total_records, records: [...]}
    selectedRecordId: null,
    showAll: false,
    partFilter: 'all',    // 'all' | 'part1' | 'part2' — client-side filter, mode inferred from coach_response shape
    token: null,
    userSearch: '',       // left-list email search
    userSort: 'recent',   // 'recent' | 'count' | 'az'
    userFilter: 'all',    // 'all' | 'pro' | 'free' | 'practiced'
  };

  // === Helpers ===
  const $ = (id) => document.getElementById(id);
  const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const truncate = (s, n) => {
    const t = String(s || '').trim();
    return t.length > n ? t.slice(0, n) + '…' : t;
  };
  const fmtTime = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mn = String(d.getMinutes()).padStart(2, '0');
      return `${mm}/${dd} ${hh}:${mn}`;
    } catch (_) { return '—'; }
  };
  const fmtDateTime = (iso) => {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleString(); } catch (_) { return iso; }
  };

  // Minimal markdown — same shape as diagnosis.html. Reads OK for AI output.
  function renderMarkdown(src) {
    const lines = String(src || '').replace(/\r\n/g, '\n').split('\n');
    const out = []; let inList = false;
    const flush = () => { if (inList) { out.push('</ul>'); inList = false; } };
    const inline = (s) => escapeHtml(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\W)\*(?!\s)([^*]+?)\*(?!\w)/g, '$1<em>$2</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>');
    for (const raw of lines) {
      const line = raw.trimEnd();
      if (!line.trim()) { flush(); continue; }
      const h = line.match(/^(#{1,3})\s+(.+)$/);
      if (h) { flush(); out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); continue; }
      const li = line.match(/^[-*]\s+(.+)$/);
      if (li) { if (!inList) { out.push('<ul>'); inList = true; } out.push(`<li>${inline(li[1])}</li>`); continue; }
      flush();
      out.push(`<p>${inline(line)}</p>`);
    }
    flush();
    return out.join('\n');
  }

  // === Boot: auth gate ===
  async function boot() {
    let session = null;
    try {
      const { data } = await sb.auth.getSession();
      session = data && data.session;
    } catch (e) {
      console.error('getSession failed', e);
    }
    if (!session || !session.user) {
      window.location.replace('/index.html');
      return;
    }
    const userEmail = (session.user.email || '').toLowerCase();
    if (!ADMIN_EMAILS.map(e => e.toLowerCase()).includes(userEmail)) {
      // Not a designated admin — silently bounce.
      window.location.replace('/');
      return;
    }
    state.token = session.access_token;
    $('admin-email').textContent = session.user.email;
    // Users list backs the 用戶管理 tab + is reused by the dashboard, so load
    // it once up front regardless of which tab we land on.
    await loadUsers();
    // Restore last-visited tab; default landing is the 總覽 dashboard.
    let initialTab = 'dashboard';
    try { initialTab = localStorage.getItem('blabby_admin_tab') || 'dashboard'; } catch (_) {}
    activateTab(initialTab);
  }

  // === Left column: users ===
  async function loadUsers() {
    const list = $('users-list');
    list.innerHTML = '<div class="col__empty">Loading…</div>';
    try {
      const res = await fetch(`${API_BASE}/admin/users`, {
        headers: { 'Authorization': `Bearer ${state.token}` },
      });
      if (!res.ok) {
        list.innerHTML = `<div class="col__empty">Failed to load (${res.status})</div>`;
        return;
      }
      const body = await res.json();
      const users = (body.users || []).slice().sort((a, b) =>
        String(b.last_seen || '').localeCompare(String(a.last_seen || ''))
      );
      state.users = users;
      renderUsers();
      // Populate mobile dropdown.
      const dd = $('mobile-user-dropdown');
      dd.innerHTML = users.map(u => {
        const label = (u.email || (u.user_id || '').slice(0, 8));
        const q = u.quality_counts || {};
        return `<option value="${escapeHtml(u.user_id)}">${escapeHtml(label)} · ${q.valid||0}v / ${q.invalid||0}i</option>`;
      }).join('');
      dd.addEventListener('change', () => selectUser(dd.value));

      if (users.length > 0) await selectUser(users[0].user_id);
    } catch (err) {
      console.error('loadUsers error', err);
      list.innerHTML = '<div class="col__empty">Network error</div>';
    }
  }

  let userControlsWired = false;
  function wireUserControls() {
    if (userControlsWired) return;
    const search = $('user-search');
    if (search) search.addEventListener('input', () => { state.userSearch = search.value; renderUsers(); });
    const sort = $('user-sort');
    if (sort) sort.addEventListener('change', () => { state.userSort = sort.value; renderUsers(); });
    document.querySelectorAll('#user-chips .user-chip').forEach(c => {
      c.addEventListener('click', () => {
        state.userFilter = c.dataset.filter;
        document.querySelectorAll('#user-chips .user-chip').forEach(x => x.classList.toggle('active', x === c));
        renderUsers();
      });
    });
    userControlsWired = true;
  }

  function renderUsers() {
    wireUserControls();
    const list = $('users-list');
    if (!state.users.length) {
      list.innerHTML = '<div class="col__empty">No users yet.</div>';
      return;
    }
    // Filter → search → sort (all client-side over the loaded user set).
    let view = state.users.slice();
    if (state.userFilter === 'pro') view = view.filter(u => u.is_pro_effective);
    else if (state.userFilter === 'free') view = view.filter(u => !u.is_pro_effective);
    else if (state.userFilter === 'practiced') view = view.filter(u => (u.practice_count || 0) > 0);
    const s = (state.userSearch || '').trim().toLowerCase();
    if (s) view = view.filter(u => (u.email || '').toLowerCase().includes(s));
    if (state.userSort === 'recent') view.sort((a, b) => String(b.last_practice || '').localeCompare(String(a.last_practice || '')));
    else if (state.userSort === 'count') view.sort((a, b) => (b.practice_count || 0) - (a.practice_count || 0));
    else if (state.userSort === 'az') view.sort((a, b) => String(a.email || '').localeCompare(String(b.email || '')));

    if (!view.length) {
      list.innerHTML = '<div class="col__empty">No matches.</div>';
      return;
    }
    list.innerHTML = view.map(u => {
      const q = u.quality_counts || {};
      const label = u.email ? truncate(u.email, 20) : (u.user_id || '').slice(0, 8);
      const cls = u.user_id === state.selectedUserId ? 'user-row active' : 'user-row';
      const plan = u.is_pro_effective ? '<span class="user-row__plan">PRO</span>' : '';
      return `
        <div class="${cls}" data-user-id="${escapeHtml(u.user_id)}" title="${escapeHtml(u.email || u.user_id)}">
          <div class="user-row__top">
            <span class="user-row__email">${escapeHtml(label)}</span>
            ${plan}
          </div>
          <div class="user-row__counts">
            <span class="v">${q.valid || 0}v</span>
            <span class="p">${q.partial || 0}p</span>
            <span class="i">${q.invalid || 0}i</span>
            <span class="user-row__last">${escapeHtml(relTime(u.last_practice))}</span>
          </div>
        </div>
      `;
    }).join('');
    list.querySelectorAll('.user-row').forEach(el => {
      el.addEventListener('click', () => selectUser(el.dataset.userId));
    });
  }

  // existing renderMiddle / selectRecord work unchanged. 概覽/寫作/閱讀 are

  function buildDetailSkeleton() {

      <div id="detail-header"></div>

        <button class="subtab active" data-sub="overview" type="button">概覽</button>

  function renderMiddle() {
    const d = state.detail;
    if (!d) return;
    const records = (d.records || []).slice().sort((a, b) =>
      String(b.created_at || '').localeCompare(String(a.created_at || ''))
    );
    const counts = { valid: 0, partial: 0, invalid: 0, unknown: 0, none: 0 };
    records.forEach(r => {
      const g = r.quality_grade || 'none';
      if (counts[g] !== undefined) counts[g] += 1;
      else counts.unknown += 1;
    });
    const total = d.total_records || records.length;

    const bar = `
      <div class="triage-bar">
        <div class="triage-bar__stats">
          <span class="qc v">${counts.valid} valid</span>
          <span class="qc p">${counts.partial} partial</span>
          <span class="qc i">${counts.invalid} invalid</span>
          ${counts.unknown ? `<span class="qc">${counts.unknown} unknown</span>` : ''}
          ${counts.none ? `<span class="qc">${counts.none} unrated</span>` : ''}
          <span class="triage-bar__total">/ ${total} total</span>
        </div>
        <div class="triage-bar__actions">
          <label class="toggle">
            <input type="checkbox" id="show-all" ${state.showAll ? 'checked' : ''}>
            Show all
          </label>
          <button class="btn" id="reclassify-btn" type="button">Run Reclassify</button>
          <span class="status" id="reclassify-status"></span>
        </div>
      </div>
    `;

    // Part 1 / Part 2 filter tabs — sits between triage-bar and rows.
    // mode field isn't returned by /admin/user/{id}, so infer from coach_response shape.
    const tabs = `
      <div class="part-filter-tabs" id="part-filter-tabs">
        <button class="part-filter-tab ${state.partFilter === 'all' ? 'active' : ''}" data-filter="all">全部</button>
        <button class="part-filter-tab ${state.partFilter === 'part1' ? 'active' : ''}" data-filter="part1">Part 1</button>
        <button class="part-filter-tab ${state.partFilter === 'part2' ? 'active' : ''}" data-filter="part2">Part 2</button>
      </div>
    `;

    // Primary: server-side mode field. Fallback: coach_response JSON shape
    // (covers historical records before mode was added to the SELECT).
    const isP2 = (r) => r.mode === 'part2'
      || (typeof r.coach_response === 'string' && r.coach_response.trim().startsWith('{'));
    const rows = records.map(r => {
      const grade = r.quality_grade || 'none';
      const badgeLabel = grade === 'none' ? 'unrated' : grade;
      const part = isP2(r) ? 'part2' : 'part1';
      const okQuality = state.showAll || grade === 'valid';
      const okPart = state.partFilter === 'all' || state.partFilter === part;
      const cls = [
        'prow',
        r.id === state.selectedRecordId ? 'active' : '',
        (okQuality && okPart) ? '' : 'hidden',
      ].filter(Boolean).join(' ');
      return `
        <div class="${cls}" data-record-id="${escapeHtml(r.id || '')}" data-part="${part}">
          <div class="prow__time">${escapeHtml(fmtTime(r.created_at))}</div>
          <div class="prow__main">
            <div class="prow__q">${(r.question || '').trim()
              ? escapeHtml(truncate(r.question, 40))
              : `<span class="italic" style="color:var(--muted);opacity:.75;">No question was preserved — a relic of an older fault, since mended.</span>`}</div>
            <div class="prow__t">${escapeHtml(truncate(r.user_transcript || '(no transcript)', 60))}</div>
          </div>
          <div class="prow__grade">
            <span class="badge ${escapeHtml(grade)}">${escapeHtml(badgeLabel)}</span>
          </div>
        </div>
      `;
    }).join('');

    $('middle-content').innerHTML = bar + tabs + (rows || '<div class="col__empty">No records.</div>');

    $('show-all').addEventListener('change', (e) => {
      state.showAll = e.target.checked;
      renderMiddle();
    });
    $('reclassify-btn').addEventListener('click', runReclassify);

    document.querySelectorAll('#part-filter-tabs .part-filter-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        state.partFilter = btn.dataset.filter || 'all';
        renderMiddle();
      });
    });

    document.querySelectorAll('#middle-content .prow').forEach(el => {
      el.addEventListener('click', () => selectRecord(el.dataset.recordId));
    });
  }

  async function runReclassify() {
    const btn = $('reclassify-btn');
    const status = $('reclassify-status');
    btn.disabled = true;
    status.textContent = 'Running…';
    try {
      const res = await fetch(`${API_BASE}/api/admin/reclassify`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${state.token}` },
      });
      const body = await res.json();
      if (!res.ok) {
        status.textContent = body.detail || 'Failed';
        btn.disabled = false;
        return;
      }
      status.textContent = `Updated ${body.updated}/${body.batch_size}, ${body.failed || 0} failed`;

      if (state.selectedUserId) await selectUser(state.selectedUserId);
      // Also refresh user list so left-column counts update.
      await loadUsers();
    } catch (err) {
      console.error('reclassify failed', err);
      status.textContent = 'Network error';
      btn.disabled = false;
    }
  }

  // 後端把結構化診斷放在 body.data(summary / weaknesses[] / next_step);
  // body.diagnosis_markdown 其實是原始 JSON 字串,直接 render 會把整包 JSON 倒給管理員。
  // 優先讀 structured;退而求其次自己 parse 一次;真的解析不出也絕不倒原始 JSON。
  function renderAdminDiagnosis(body) {
    let d = (body && body.format === 'structured' && body.data && Array.isArray(body.data.weaknesses))
      ? body.data : null;
    if (!d) {
      const t = String((body && (body.raw || body.diagnosis_markdown)) || '').trim();
      if (t.startsWith('{')) {
        try { const p = JSON.parse(t); if (p && Array.isArray(p.weaknesses)) d = p; } catch (_) {}
      }
    }
    if (!d) {
      const txt = String((body && (body.diagnosis_markdown || body.raw)) || '');
      if (txt.trim().startsWith('{')) {
        return '<p style="color:var(--muted,#8A7E6E)">診斷結果解析失敗（模型回傳的 JSON 格式異常）。請重新生成。</p>';
      }
      return renderMarkdown(txt || '(empty)');
    }
    const summary = d.summary
      ? `<p style="font-size:15px;line-height:1.7;margin:0 0 16px">${escapeHtml(d.summary)}</p>` : '';
    const cards = (Array.isArray(d.weaknesses) ? d.weaknesses : []).map(w => {
      const ev = Array.isArray(w.evidence) ? w.evidence : [];
      const evHtml = ev.length
        ? `<ul style="margin:8px 0 0;padding-left:18px;color:var(--muted,#8A7E6E);font-size:13px">${ev.map(e => `<li style="margin:2px 0">${escapeHtml(e)}</li>`).join('')}</ul>`
        : '';
      return `<div style="border-left:3px solid var(--gold,#C9A84C);padding:8px 14px;margin:10px 0;background:rgba(0,0,0,0.02)">
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <span style="color:var(--green,#2D5016);font-weight:700">#${escapeHtml(w.rank)}</span>
          <strong>${escapeHtml(w.title || '')}</strong>
          <span style="font-size:12px;color:var(--muted,#8A7E6E)">${escapeHtml(w.tag || '')}</span>
          ${w.drill_available === true ? '<span style="font-size:11px;color:var(--green,#2D5016)">· drill 可用</span>' : ''}
        </div>
        ${w.description ? `<p style="margin:6px 0 0;font-size:14px;line-height:1.6">${escapeHtml(w.description)}</p>` : ''}
        ${evHtml}
      </div>`;
    }).join('');
    const next = d.next_step
      ? `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border,#C4B89A)"><strong>下一步</strong><p style="margin:6px 0 0;font-size:14px;line-height:1.6">${escapeHtml(d.next_step)}</p></div>`
      : '';
    return summary + cards + next;
  }

  async function loadDiagnosis() {
    const sec = $('diag-section');
    const block = $('diag-content');
    const btn = $('diag-btn');
    sec.style.display = '';
    block.classList.add('loading');
    block.classList.remove('md');
    block.textContent = 'Generating diagnosis… (this may take 10–30 seconds)';
    btn.disabled = true;
    try {
      const res = await fetch(
        `${API_BASE}/admin/user/${encodeURIComponent(state.selectedUserId)}/diagnosis`,
        { method: 'POST', headers: { 'Authorization': `Bearer ${state.token}` } }
      );
      const body = await res.json();
      if (!res.ok) {
        block.textContent = body.detail || 'Failed';
        block.classList.remove('loading');
        return;
      }
      block.classList.remove('loading');
      block.classList.add('md');
      block.innerHTML = renderAdminDiagnosis(body);
    } catch (err) {
      console.error('loadDiagnosis failed', err);
      block.textContent = 'Network error';
      block.classList.remove('loading');
    } finally {
      btn.disabled = false;
    }
  }

  function selectRecord(recordId) {
    state.selectedRecordId = recordId;
    renderMiddle();
    const r = (state.detail.records || []).find(x => String(x.id) === String(recordId));
    if (!r) return;
    const sec = $('record-detail-section');
    const c = $('record-detail-content');
    sec.style.display = '';
    const grade = r.quality_grade || 'none';
    const tag = r.weakness_tag || '';
    const transcript = (r.user_transcript || '').trim();
    const coach = (r.coach_response || '').trim();
    const better = (r.better_expression || '').trim();
    const betterZh = (r.better_expression_zh || '').trim();
    const reason = (r.quality_reason || '').trim();

    // Part 2 detection + structured render: coach_response stores JSON
    // ({band_score, criteria[], strengths[], improvements[]}) for Part 2.
    let coachFieldHTML = `
      <div class="detail-field">
        <div class="detail-field__label">Coach response</div>
        <div class="detail-field__value ${coach ? '' : 'empty'}">${escapeHtml(coach || '(empty)')}</div>
      </div>`;
    if (coach.startsWith('{')) {
      try {
        const parsed = JSON.parse(coach);
        if (parsed && (parsed.band_score !== undefined || Array.isArray(parsed.criteria))) {
          const critRows = (parsed.criteria || []).map(cr => `
            <div class="p2-detail__row">
              <span>${escapeHtml(cr.name || '')}</span>
              <span class="p2-detail__band">${escapeHtml(cr.band ?? '—')}</span>
            </div>`).join('');
          const liList = (arr) => (Array.isArray(arr) ? arr : [])
            .map(s => `<li>${escapeHtml(s)}</li>`).join('');
          coachFieldHTML = `
            <div class="detail-field">
              <div class="detail-field__label">Part 2 scoring</div>
              <div class="p2-detail">
                <div class="p2-detail__overall">Overall band: ${escapeHtml(parsed.band_score ?? '—')}</div>
                ${critRows}
                ${Array.isArray(parsed.strengths) && parsed.strengths.length ? `
                  <div class="p2-detail__section">STRENGTHS</div>
                  <ul class="p2-detail__list">${liList(parsed.strengths)}</ul>` : ''}
                ${Array.isArray(parsed.improvements) && parsed.improvements.length ? `
                  <div class="p2-detail__section">IMPROVEMENTS</div>
                  <ul class="p2-detail__list">${liList(parsed.improvements)}</ul>` : ''}
              </div>
            </div>`;
        }
      } catch (e) { /* not valid JSON — keep plain text fallback */ }
    }

    c.innerHTML = `
      <div class="detail-badges">
        <span class="badge ${escapeHtml(grade)}">${escapeHtml(grade === 'none' ? 'unrated' : grade)}</span>
        ${tag ? `<span class="badge tag">${escapeHtml(tag)}</span>` : ''}
      </div>
      ${reason ? `
        <div class="detail-field">
          <div class="detail-field__label">Quality reason</div>
          <div class="detail-field__value italic">${escapeHtml(reason)}</div>
        </div>` : ''}
      <div class="detail-field">
        <div class="detail-field__label">Question</div>
        ${(r.question || '').trim()
          ? `<div class="detail-field__value italic">${escapeHtml(r.question)}</div>`
          : `<div class="detail-field__value italic" style="color:var(--muted);opacity:.75;">No question was preserved — a relic of an older fault, since mended.</div>`}
      </div>
      <div class="detail-field">
        <div class="detail-field__label">Transcript</div>
        <div class="detail-field__value ${transcript ? '' : 'empty'}">${escapeHtml(transcript || '(empty)')}</div>
      </div>
      ${coachFieldHTML}
      ${better ? `
        <div class="detail-field">
          <div class="detail-field__label">Better expression</div>
          <div class="detail-field__value italic">"${escapeHtml(better)}"</div>
          ${betterZh ? `<div class="detail-field__value" style="font-size:11px;color:var(--muted);margin-top:3px;">→ ${escapeHtml(betterZh)}</div>` : ''}
        </div>` : ''}
      <div class="detail-field">
        <div class="detail-field__label">Time</div>
        <div class="detail-field__value">${escapeHtml(fmtDateTime(r.created_at))}</div>
      </div>
    `;
    // Scroll the record detail into view on the right column.
    sec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // === Tabs (用戶管理 / 訂閱管理 / 更新日誌) ===
  // Subs/changelog are lazy on first click. Subs round-trips an API; changelog
  // is static but rendering 5 versions of HTML is still wasted work if no one
  // opens the tab.
  let changelogLoaded = false;
  function activateTab(name) {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => {
      p.classList.toggle('active', p.id === `${name}-tab`);
    });
    try { localStorage.setItem('blabby_admin_tab', name); } catch (_) { /* private mode */ }
    if (name === 'dashboard') {
      loadDashboard();
    }
    if (name === 'subs') {
      loadSubsTab();
    }
    if (name === 'changelog' && !changelogLoaded) {
      changelogLoaded = true;
      renderChangelog();
    }
    if (name === 'writing') {
      loadWritingSubmissions();
    }
    if (name === 'reading') {
      loadReadingAttempts();
    }
  }
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => activateTab(t.dataset.tab));
  });

  // === Writing / Reading admin tabs (B pattern: flat list + inline detail) ===
  // Lazy: fetched only when the tab is opened (wired in activateTab). Each row
  // toggles an inline detail block; no right-hand column. Reuses the speaking
  // fetch shape (Bearer state.token + innerHTML status states) and the
  // .badge / .detail-field visual vocabulary.
  function bindRowToggles(container) {
    container.querySelectorAll('.lrow').forEach(row => {
      row.addEventListener('click', () => {
        const target = document.getElementById(row.dataset.target);
        if (target) target.hidden = !target.hidden;
      });
    });
  }

  // Resolve a user_id to an email via the already-loaded user set (the
  // cross-student writing/reading endpoints return user_id only).
  function emailFor(uid) {
    const u = (state.users || []).find(x => x.user_id === uid);
    return (u && u.email) || (uid ? uid.slice(0, 8) : '—');
  }

  // Cross-link: jump from a monitoring row into that student's 用戶管理 detail,
  // landing on the given sub-tab. Core to the handoff's "fewer clicks" IA.
  async function jumpToStudent(uid, sub) {
    if (!uid) return;
    activateTab('users');
    await selectUser(uid);
    if (sub) activateSubtab(sub);
  }

    if (!host || !state.selectedUserId) return;

    const speaking = (state.detail && state.detail.records) || [];

    try {
      const [wRes, rRes] = await Promise.all([
        fetch(`${API_BASE}/admin/writing/submissions?user_id=${encodeURIComponent(state.selectedUserId)}`, { headers: { 'Authorization': `Bearer ${state.token}` } }),

  function renderOverview(speaking, writing, reading) {
    const host = $('sub-overview');
    if (!host) return;

    // Common weakness tags from speaking records, most frequent first.
    const tagCounts = {};
    speaking.forEach(r => {
      const t = (r.weakness_tag || '').trim();
      if (t) tagCounts[t] = (tagCounts[t] || 0) + 1;
    });
    const tags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);
    const tagsHTML = tags.length
      ? tags.map(([t, n]) => `<span class="badge tag">${escapeHtml(t)} · ${n}</span>`).join(' ')
      : '<span class="dash-empty">尚無弱點資料</span>';

    // Unified cross-skill timeline, newest first.
    const events = [];
    speaking.forEach(r => events.push({ at: r.created_at, skill: '口說', cls: 'sp', label: r.weakness_tag || r.topic || r.question || '口說練習' }));
    writing.forEach(w => events.push({ at: w.submitted_at, skill: '寫作', cls: 'wr', label: `${w.task_type || 'writing'} · band ${w.band_overall ?? '—'}` }));
    reading.forEach(a => events.push({ at: a.started_at, skill: '閱讀', cls: 'rd', label: `${(a.reading_passages && a.reading_passages.title) || 'reading'} · ${a.status || ''}` }));
    events.sort((a, b) => String(b.at || '').localeCompare(String(a.at || '')));
    const timeline = events.slice(0, 15).map(e => `
      <div class="ov-tl__row">
        <span class="ov-tl__time">${escapeHtml(fmtTime(e.at))}</span>
        <span class="ov-tl__skill ov-tl__skill--${e.cls}">${e.skill}</span>
        <span class="ov-tl__label">${escapeHtml(truncate(e.label, 50))}</span>
      </div>`).join('') || '<div class="dash-empty">尚無活動</div>';

    host.innerHTML = `
      <div class="ov">
        <div class="ov-counts">
          <div class="ov-count"><div class="ov-count__n">${speaking.length}</div><div class="ov-count__l">口說</div></div>
          <div class="ov-count"><div class="ov-count__n">${writing.length}</div><div class="ov-count__l">寫作</div></div>
          <div class="ov-count"><div class="ov-count__n">${reading.length}</div><div class="ov-count__l">閱讀</div></div>
        </div>
        <div class="dash-section">
          <div class="dash-section__title">常見弱點</div>
          <div>${tagsHTML}</div>
        </div>
        <div class="dash-section">
          <div class="dash-section__title">近期活動</div>
          ${timeline}
        </div>
      </div>`;
  }

  // === 總覽 Dashboard (handoff §3.1) ===
  // Reuses state.users (get_admin_users_full: email, is_pro_effective,
  // created_at, last_practice, practice_count) loaded at bootstrap, plus
  // GET /admin/practice-volume for the weekly bar + today/week cards.
  const _WEEKDAY_TC = ['日', '一', '二', '三', '四', '五', '六'];
  function daysSince(iso) {
    if (!iso) return Infinity;
    return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  }
  function relTime(iso) {
    if (!iso) return '—';
    const d = daysSince(iso);
    if (d <= 0) return '今天';
    if (d === 1) return '昨天';
    if (d < 7) return `${d} 天前`;
    if (d < 30) return `${Math.floor(d / 7)} 週前`;
    if (d < 365) return `${Math.floor(d / 30)} 個月前`;
    return `${Math.floor(d / 365)} 年前`;
  }

  async function loadDashboard() {
    const host = $('dashboard-content');
    host.innerHTML = '<div class="col__empty">Loading…</div>';
    try {
      if (!state.users || !state.users.length) await loadUsers();
      let days = [];
      try {
        const res = await fetch(`${API_BASE}/admin/practice-volume`, {
          headers: { 'Authorization': `Bearer ${state.token}` },
        });
        if (res.ok) {
          const body = await res.json();
          days = body.days || [];
        }
      } catch (e) {
        console.error('practice-volume fetch failed', e);
      }
      renderDashboard(state.users || [], days);
    } catch (err) {
      console.error('loadDashboard error', err);
      host.innerHTML = '<div class="col__empty">Network error</div>';
    }
  }

  function renderDashboard(users, days) {
    const host = $('dashboard-content');
    const total = users.length;
    const pro = users.filter(u => u.is_pro_effective).length;
    const free = total - pro;
    const todayVol = days.length
      ? (() => { const d = days[days.length - 1]; return (d.speaking || 0) + (d.writing || 0) + (d.reading || 0); })()
      : 0;
    const weekVol = days.reduce((s, d) => s + (d.speaking || 0) + (d.writing || 0) + (d.reading || 0), 0);

    const cards = [
      { label: '總用戶', value: total, sub: '', cls: '' },
      { label: 'PRO', value: pro, sub: total ? `${Math.round(pro / total * 100)}%` : '', cls: 'statcard--green' },
      { label: 'FREE', value: free, sub: '', cls: '' },
      { label: '今日練習', value: todayVol, sub: '口說+寫作+閱讀', cls: 'statcard--gold' },
      { label: '本週練習', value: weekVol, sub: '近 7 日', cls: '' },
    ].map(c => `
      <div class="statcard ${c.cls}">
        <div class="statcard__label">${c.label}</div>
        <div class="statcard__value">${c.value}</div>
        <div class="statcard__sub">${escapeHtml(c.sub)}</div>
      </div>`).join('');

    // Weekly bars — total volume per day, scaled to the busiest day.
    const totals = days.map(d => (d.speaking || 0) + (d.writing || 0) + (d.reading || 0));
    const maxVol = Math.max(1, ...totals);
    const bars = days.map((d, i) => {
      const t = totals[i];
      const h = Math.round(t / maxVol * 100);
      const isToday = i === days.length - 1;
      const wd = _WEEKDAY_TC[new Date(d.date + 'T00:00:00Z').getUTCDay()];
      return `
        <div class="dash-bar ${isToday ? 'today' : ''}">
          <div class="dash-bar__val">${t}</div>
          <div class="dash-bar__col" style="height:${h}%"></div>
          <div class="dash-bar__day">${wd}</div>
        </div>`;
    }).join('');

    // Recent active — practised at least once, newest first.
    const recent = users
      .filter(u => (u.practice_count || 0) > 0 && u.last_practice)
      .sort((a, b) => String(b.last_practice).localeCompare(String(a.last_practice)))
      .slice(0, 8);
    // Dormant — ≥ 7 days since last practice, coldest first. PRO flagged red.
    const dormant = users
      .filter(u => u.last_practice && daysSince(u.last_practice) >= 7)

  function renderChangelog() {
    const root = $('changelog-content');
    if (!root) return;

    const versions = CHANGELOG.split(/\n---\n/).map(s => s.trim()).filter(Boolean);
    const html = versions.map(block => {
      const lines = block.split('\n');
      const headerLine = (lines[0] || '').trim();
      // Header parts: split first " — " to get version + (date · subtitle).
      const dashIdx = headerLine.indexOf(' — ');
      let ver = headerLine, rest = '';
      if (dashIdx !== -1) {
        ver = headerLine.slice(0, dashIdx);
        rest = headerLine.slice(dashIdx + 3);
      }

      // Walk remaining lines, group into [title, description] pairs.
      // A blank line terminates the current feature; the next non-blank
      // becomes the next title.
      const features = [];
      let cur = null; // {title, descLines: []}
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        if (!line.trim()) {
          if (cur) { features.push(cur); cur = null; }
          continue;
        }
        if (!cur) { cur = { title: line.trim(), descLines: [] }; }
        else { cur.descLines.push(line); }
      }
      if (cur) features.push(cur);

      const featuresHtml = features.map(f => `
        <div class="changelog__feature">
          <div class="changelog__title">${escapeHtml(f.title)}</div>
          ${f.descLines.length
            ? `<div class="changelog__desc">${escapeHtml(f.descLines.join('\n'))}</div>`
            : ''}
        </div>
      `).join('');

      return `
        <section class="changelog__version">
          <div class="changelog__head">
            <span class="changelog__ver">${escapeHtml(ver)}</span>
            ${rest ? `<span class="changelog__date">${escapeHtml(rest)}</span>` : ''}
          </div>
          ${featuresHtml}
        </section>
      `;
    }).join('');
    root.innerHTML = html;
  }

  // === Subscriptions ===
  function fmtDay(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleDateString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric',
      });
    } catch (_) { return iso; }
  }
  function daysUntil(iso) {
    if (!iso) return null;
    try {
      const ms = new Date(iso).getTime() - Date.now();
      return Math.ceil(ms / 86400000);
    } catch (_) { return null; }
  }
