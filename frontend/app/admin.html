                <div>
                    <span style="font-size:13px;">${escapeHtml(u.email || u.user_id)}</span>
                    ${u.is_pro_grant ? '<span style="font-size:10px;color:var(--gold);margin-left:6px;">manual</span>' : ''}
                    ${u.is_pro ? '<span style="font-size:10px;color:var(--green);margin-left:6px;">subscription</span>' : ''}
                </div>
                <button onclick="revokeProById('${u.user_id}', '${escapeHtml(u.email || '')}')"
                    style="font-size:11px;padding:3px 10px;background:transparent;border:1px solid var(--wine);color:var(--wine);border-radius:4px;cursor:pointer;">
                    Revoke
                </button>
            </div>
        `).join('');
  }

  // === 訂閱管理 tab — 3-column Pro grant management ===
  // Mirrors the 用戶管理 tab pattern: left=user list, middle=selected user detail
  // (with grant/revoke form), right=action log (session-scoped, no persistence).
  let _subsSelectedUserId = null;
  let _subsSearchQuery    = '';
  const _subsActionLog    = []; // [{when:ISO, verb:'grant'|'revoke', email, reason}]

  async function loadSubsTab() {
    if (!state.users || state.users.length === 0) await loadUsers();
    subsRenderUserList();
    subsRenderActionLog();
    // Bind search input once. Re-bind safe because the input is in static HTML.
    const search = document.getElementById('subs-search-input');
    if (search && !search.dataset.bound) {
      search.dataset.bound = '1';
      search.addEventListener('input', (e) => {
        _subsSearchQuery = (e.target.value || '').trim().toLowerCase();
        subsRenderUserList();
      });
    }
    // If we had a previously-selected user, re-render the middle detail with
    // fresh Pro status from the reloaded state.users.
    if (_subsSelectedUserId) selectSubsUser(_subsSelectedUserId);
  }

  function subsRenderUserList() {
    const listEl = document.getElementById('subs-user-list');
    if (!listEl) return;
    const q = _subsSearchQuery;
    const filtered = (state.users || []).filter(u => {
      if (!q) return true;
      return (u.email || '').toLowerCase().includes(q);
    });
    if (filtered.length === 0) {
      listEl.innerHTML = '<div class="col__empty">No matches.</div>';
      return;
    }
    listEl.innerHTML = filtered.map(u => {
      const isPro = u.is_pro || u.is_pro_grant;
      const active = u.user_id === _subsSelectedUserId ? ' active' : '';
      return `
        <div class="subs-user-row${active}" data-user-id="${escapeHtml(u.user_id)}">
          <div class="subs-user-row__email">${escapeHtml(u.email || u.user_id)}</div>
          <div class="subs-user-row__status ${isPro ? 'pro' : 'free'}">
            ${isPro ? '✦ PRO' : 'FREE'}${u.is_pro_grant ? '<span class="manual">manual</span>' : ''}
          </div>
        </div>
      `;
    }).join('');
    listEl.querySelectorAll('.subs-user-row').forEach(el => {
      el.addEventListener('click', () => selectSubsUser(el.dataset.userId));
    });
  }

  window.selectSubsUser = function(userId) {
    _subsSelectedUserId = userId;
    subsRenderUserList();  // refresh active highlight
    const user = (state.users || []).find(u => u.user_id === userId);
    const middle = document.getElementById('subs-middle-content');
    if (!middle) return;
    if (!user) {
      middle.innerHTML = '<div class="col__empty">User not found.</div>';
      return;
    }

    // Field-name fallback chain — get_admin_users_full RPC has 3 historical
    // versions (v1: is_pro/practice_count/last_practice, v2: is_pro_paid/
    // is_pro_effective + grant audit columns, v3: adds pro_grant_expires_at).
    // Try the latest first so UI works against any deployed migration.
    const isPaid    = user.is_pro_paid ?? user.is_pro ?? false;
    const isGranted = user.is_pro_grant === true;
    const practices = user.practice_count ?? user.record_count ?? 0;
    const memberSince = user.created_at;
    const grantAt      = user.pro_grant_at;
    const grantReason  = user.pro_grant_reason;
    const grantBy      = user.pro_grant_by;
    const grantExpires = user.pro_grant_expires_at || null;

    // Expiry-aware effective Pro: a granted+expired user is NOT effectively Pro.
    // Trust server's is_pro_effective if available, else compute locally as fallback.
    const grantExpired = isGranted && grantExpires
      ? (new Date(grantExpires).getTime() <= Date.now())
      : false;
    const isPro = user.is_pro_effective ?? (isPaid || (isGranted && !grantExpired));

    // === Section 1: user info card ===
    const metaRows = [
      memberSince ? `<div><span class="subs-info__meta-label">Member since:</span> ${escapeHtml(fmtDateTime(memberSince))}</div>` : '',
      `<div><span class="subs-info__meta-label">Total practices:</span> ${escapeHtml(practices)}</div>`,
    ].filter(Boolean).join('');

    // Status badge: 3 states — PRO (active) / 已到期 (granted but past expiry) / FREE
    let statusBadge;
    if (isPro) {
      statusBadge = `<span class="subs-status-badge subs-status-badge--pro">✦ PRO</span>`;
    } else if (grantExpired) {
      statusBadge = `<span class="subs-status-badge subs-status-badge--expired">已到期</span>`;
    } else {
      statusBadge = `<span class="subs-status-badge subs-status-badge--free">FREE</span>`;
    }

    // Grant-line summary below badge: granted users see expiry + grant origin.
    const expiryLabel = (e) => e ? `到期：${escapeHtml(fmtDateTime(e))}` : '永久';
    let proGrantLine = '';
    if (isGranted) {
      const bits = [];
      bits.push(expiryLabel(grantExpires));
      if (grantAt) bits.push(`Granted ${escapeHtml(fmtDateTime(grantAt))}`);
      if (grantBy) bits.push(`by ${escapeHtml(grantBy)}`);
      proGrantLine = `<div class="subs-info__grant-line">${bits.join(' · ')}${grantReason ? ` · "${escapeHtml(grantReason)}"` : ''}</div>`;
    } else if (isPro && isPaid) {
      proGrantLine = `<div class="subs-info__grant-line">Active paid subscription</div>`;
    }

    // === Section 2: action area ===
    let actionHTML = '';
    // Show revoke flow whenever the row carries a manual grant (active OR expired)
    // so admin can still tidy up. Show grant flow only for truly Free users.
    if (isPro || isGranted) {
      // PRO user OR expired grant: audit info box + revoke button
      const auditBox = isGranted ? `
        <div class="subs-pro-info">
          ${grantAt      ? `<div class="subs-pro-info__row"><span class="subs-pro-info__row-label">Granted</span> <span class="subs-pro-info__row-value">${escapeHtml(fmtDateTime(grantAt))}</span></div>` : ''}
          ${grantBy      ? `<div class="subs-pro-info__row"><span class="subs-pro-info__row-label">By</span> <span class="subs-pro-info__row-value">${escapeHtml(grantBy)}</span></div>` : ''}
          ${grantReason  ? `<div class="subs-pro-info__row"><span class="subs-pro-info__row-label">Reason</span> <span class="subs-pro-info__row-value">${escapeHtml(grantReason)}</span></div>` : ''}
          <div class="subs-pro-info__row"><span class="subs-pro-info__row-label">Expiry</span> <span class="subs-pro-info__row-value">${expiryLabel(grantExpires)}${grantExpired ? ' (已過期)' : ''}</span></div>
        </div>
      ` : '';
      actionHTML = `
        ${auditBox}
        <button class="subs-action__revoke" id="subs-revoke-btn" type="button">撤銷 Pro 權限</button>
      `;
    } else {
      // FREE user: trigger button → expand inline form
      actionHTML = `
        <button class="subs-action__upgrade" id="subs-upgrade-trigger" type="button">升級為 Pro</button>
        <div class="subs-grant-form" id="subs-grant-form">
          <label class="subs-grant-form__label" for="subs-reason-input">Reason for grant (required)</label>
          <input class="subs-grant-form__input" type="text" id="subs-reason-input" placeholder="e.g. early access, content creator, refund">
          <label class="subs-grant-form__label">Expiry</label>
          <div class="subs-expiry-options" id="subs-expiry-options">
            <button class="subs-expiry-pill" data-expiry="7"        type="button">7 天</button>
            <button class="subs-expiry-pill" data-expiry="30"       type="button">30 天</button>
            <button class="subs-expiry-pill active" data-expiry="0" type="button">永久</button>
            <button class="subs-expiry-pill" data-expiry="custom"   type="button">自訂</button>
          </div>
          <input class="subs-grant-form__input subs-expiry-custom" type="date" id="subs-expiry-custom-input">
          <button class="subs-grant-form__confirm" id="subs-grant-btn" type="button">Grant Pro Access</button>
          <button class="subs-grant-form__cancel" id="subs-cancel-link" type="button">Cancel</button>
        </div>
      `;
    }

    middle.innerHTML = `
      <div class="subs-detail">
        <div class="subs-info">
          <div class="subs-info__email">${escapeHtml(user.email || userId)}</div>
          <div class="subs-info__meta">${metaRows}</div>
          ${statusBadge}
          ${proGrantLine}
        </div>
        <div class="subs-action">
          ${actionHTML}
          <div class="subs-result" id="subs-pro-result"></div>
        </div>
      </div>
    `;

    // Wire interactions
    const upgradeBtn = document.getElementById('subs-upgrade-trigger');
    const grantForm  = document.getElementById('subs-grant-form');
    const cancelBtn  = document.getElementById('subs-cancel-link');
    const reasonInp  = document.getElementById('subs-reason-input');
    const grantBtn   = document.getElementById('subs-grant-btn');
    const revokeBtn  = document.getElementById('subs-revoke-btn');

    if (upgradeBtn && grantForm) {
      upgradeBtn.addEventListener('click', () => {
        grantForm.classList.add('is-open');
        upgradeBtn.style.display = 'none';
        if (reasonInp) reasonInp.focus();
      });
    }
    if (cancelBtn && grantForm && upgradeBtn) {
      cancelBtn.addEventListener('click', () => {
        grantForm.classList.remove('is-open');
        upgradeBtn.style.display = '';
        if (reasonInp) reasonInp.value = '';
        const result = document.getElementById('subs-pro-result');
        if (result) { result.textContent = ''; result.className = 'subs-result'; }
      });
    }
    // Expiry pill toggle — exactly one .active at a time. "自訂" reveals the
    // date input; the others hide it. Default "永久" (data-expiry="0") starts active.
    const expiryOpts   = document.getElementById('subs-expiry-options');
    const expiryCustom = document.getElementById('subs-expiry-custom-input');
    if (expiryOpts) {
      expiryOpts.querySelectorAll('.subs-expiry-pill').forEach(pill => {
        pill.addEventListener('click', () => {
          expiryOpts.querySelectorAll('.subs-expiry-pill').forEach(p =>
            p.classList.toggle('active', p === pill));
          if (expiryCustom) {
            expiryCustom.classList.toggle('is-shown', pill.dataset.expiry === 'custom');
            if (pill.dataset.expiry === 'custom') expiryCustom.focus();
          }
        });
      });
    }
    if (grantBtn) grantBtn.addEventListener('click', subsGrantPro);
    if (revokeBtn) revokeBtn.addEventListener('click', subsRevokePro);
  };

  // Read selected expiry option and translate to ISO datetime (or null).
  // 0      → null (permanent)
  // 7/30   → now + N days, ISO UTC
  // custom → date picker value at 00:00 local → ISO UTC
  // Returns { expiresAt: string|null, error: string|null }.
  function subsComputeExpiresAt() {
    const active = document.querySelector('#subs-expiry-options .subs-expiry-pill.active');
    if (!active) return { expiresAt: null, error: null };
    const opt = active.dataset.expiry;
    if (opt === '0') return { expiresAt: null, error: null };
    if (opt === '7' || opt === '30') {
      const days = parseInt(opt, 10);
      const dt = new Date(Date.now() + days * 86400 * 1000);
      return { expiresAt: dt.toISOString(), error: null };
    }
    if (opt === 'custom') {
      const v = document.getElementById('subs-expiry-custom-input')?.value;
      if (!v) return { expiresAt: null, error: '請選擇自訂到期日' };
      const dt = new Date(v + 'T00:00:00');
      if (isNaN(dt.getTime())) return { expiresAt: null, error: '無效日期格式' };
      if (dt.getTime() <= Date.now()) return { expiresAt: null, error: '到期日必須在未來' };
      return { expiresAt: dt.toISOString(), error: null };
    }
    return { expiresAt: null, error: null };
  }

  function subsAppendLog(verb, email, reason) {
    _subsActionLog.unshift({
      when: new Date().toISOString(),
      verb, email, reason,
    });
    subsRenderActionLog();
  }

  function subsRenderActionLog() {
    const log = document.getElementById('subs-action-log');
    if (!log) return;
    if (_subsActionLog.length === 0) {
      log.innerHTML = '<div class="col__empty">No actions yet.</div>';
      return;
    }
    log.innerHTML = _subsActionLog.map(e => `
      <div class="subs-action-item">
        <div class="subs-action-item__when">${escapeHtml(fmtDateTime(e.when))}</div>
        <div class="subs-action-item__what">
          <span class="verb-${e.verb}">${e.verb === 'grant' ? 'GRANTED' : 'REVOKED'}</span>
          ${escapeHtml(e.email || '—')}
        </div>
        ${e.reason ? `<div class="subs-action-item__reason">"${escapeHtml(e.reason)}"</div>` : ''}
      </div>
    `).join('');
  }

  async function subsGrantPro() {
    const reasonInput = document.getElementById('subs-reason-input');
    const result      = document.getElementById('subs-pro-result');
    const btn         = document.getElementById('subs-grant-btn');
    const reason      = (reasonInput?.value || '').trim();
    if (!reason) {
      if (result) { result.textContent = 'Reason is required.'; result.className = 'subs-result err'; }
      return;
    }
    const { expiresAt, error: expiryError } = subsComputeExpiresAt();
    if (expiryError) {
      if (result) { result.textContent = expiryError; result.className = 'subs-result err'; }
      return;
    }
    if (btn) { btn.disabled = true; btn.textContent = 'Granting…'; }
    try {
      const user = (state.users || []).find(u => u.user_id === _subsSelectedUserId);
      await callProGrant(_subsSelectedUserId, true, reason, expiresAt);
      window.analytics?.track('admin_pro_granted', { user_id: _subsSelectedUserId, expires_at: expiresAt });
      subsAppendLog('grant', user?.email || _subsSelectedUserId, reason);
      if (result) { result.textContent = '✓ Pro access granted.'; result.className = 'subs-result ok'; }
      await loadUsers();
      await loadSubsTab();
    } catch (err) {
      if (result) { result.textContent = `Failed: ${err.message}`; result.className = 'subs-result err'; }
      if (btn) { btn.disabled = false; btn.textContent = 'Grant Pro Access'; }
    }
  }

  async function subsRevokePro() {
    if (!confirm('Revoke Pro access for this user?')) return;
    const result = document.getElementById('subs-pro-result');
    const btn    = document.getElementById('subs-revoke-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Revoking…'; }
    try {
      const user = (state.users || []).find(u => u.user_id === _subsSelectedUserId);
      await callProGrant(_subsSelectedUserId, false, 'admin revoke');
      window.analytics?.track('admin_pro_revoked', { user_id: _subsSelectedUserId });
      subsAppendLog('revoke', user?.email || _subsSelectedUserId, null);
      if (result) { result.textContent = '✓ Pro access revoked.'; result.className = 'subs-detail__result'; }
      await loadUsers();
      await loadSubsTab();
    } catch (err) {
      if (result) { result.textContent = `Failed: ${err.message}`; result.className = 'subs-detail__result err'; }
      if (btn) { btn.disabled = false; btn.textContent = '撤銷 Pro 權限'; }
    }
  }

  async function extendSub(subId, btn) {
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = '處理中…';
    try {
      const res = await fetch(`${API_BASE}/api/admin/subscription/extend`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${state.token}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ subscription_id: subId, days: 30 }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        alert(j.detail || '延長失敗');
        btn.disabled = false; btn.textContent = original;
        return;
      }
      // Reload list so the row reflects the new expires_at.
      loadSubscriptions();
    } catch (_) {
      alert('Network error');
      btn.disabled = false; btn.textContent = original;
    }
  }

  async function cancelSub(subId, btn) {
    if (!confirm('確定取消這筆訂閱？用戶會繼續享有 Pro 直到 expires_at。')) return;
    btn.disabled = true;
    const original = btn.textContent;
    btn.textContent = '處理中…';
    try {
      const res = await fetch(`${API_BASE}/api/admin/subscription/cancel`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${state.token}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ subscription_id: subId }),
      });
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        alert(j.detail || '取消失敗');
        btn.disabled = false; btn.textContent = original;
        return;
      }
      loadSubscriptions();
    } catch (_) {
      alert('Network error');
      btn.disabled = false; btn.textContent = original;
    }
  }

  boot();
})();
</script>
</body>
</html>
