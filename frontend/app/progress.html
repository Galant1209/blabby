<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Progress — Blabby</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./config.js"></script>
<style>
:root {
    --bg: #F5F0E8;
    --surface: #FDFAF4;
    --paper: #F1E9D6;
    --ink: #2C2416;
    --ink-soft: #3a3022;
    --green: #2D5016;
    --green-dark: #1f3810;
    --gold: #C9A84C;
    --gold-warm: #E8C866;
    --wine: #6B1A1A;
    --border: #C4B89A;
    --muted: #8A7E6E;
    --serif: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter Tight', 'Inter', -apple-system, sans-serif;
    --serif-tc: 'Noto Serif TC', 'EB Garamond', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.7;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
}
body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.45;
    z-index: 0;
    background-image:
        radial-gradient(circle at 22% 18%, rgba(196, 184, 154, 0.18) 0%, transparent 38%),
        radial-gradient(circle at 78% 72%, rgba(201, 168, 76, 0.07) 0%, transparent 36%);
}

main.page {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 16px 96px;
}

.brand {
    text-align: center;
    margin-bottom: 28px;
}
.brand h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 30px;
    letter-spacing: 0.01em;
    color: var(--ink);
}
.brand .subtitle {
    color: var(--muted);
    font-style: italic;
    margin-top: 4px;
    font-size: 14px;
}

.loading-state, .error-state, .empty-state {
    padding: 32px 18px;
    text-align: center;
    color: var(--muted);
    font-style: italic;
}
.empty-state .lede {
    color: var(--ink);
    font-style: normal;
    font-size: 15px;
    line-height: 1.6;
    max-width: 460px;
    margin: 0 auto;
}

.progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 18px 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 0 rgba(44,36,22,0.03);
    transition: box-shadow 0.18s ease;
}
.progress-card:hover {
    box-shadow: 0 4px 16px rgba(44,36,22,0.06);
}
.progress-card__question {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 18px;
    color: var(--ink);
    margin-bottom: 14px;
    line-height: 1.45;
}

.progress-card__panels {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 14px;
}
.progress-panel {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
}
.progress-panel__label {
    font-size: 11px;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--green);
    margin-bottom: 2px;
}
.progress-panel__date {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
}
.progress-panel__transcript {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.progress-card__delta {
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 14px;
    color: var(--green-dark);
    font-weight: 500;
    text-align: right;
    letter-spacing: 0.01em;
}
.progress-card__delta--empty {
    color: var(--muted);
    font-style: italic;
    font-weight: 400;
}

/* >= 560px: panels side by side. Mobile-first default = stacked above. */
@media (min-width: 560px) {
    .progress-card__panels {
        flex-direction: row;
    }
    .progress-panel {
        flex: 1 1 0;
        min-width: 0;
    }
}

/* Bottom nav (copied from history.html / index.html) */
#bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    z-index: 10;
}
#bottom-nav .nav-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-decoration: none;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 8px;
    transition: color 0.15s ease;
}
#bottom-nav .nav-tab:hover,
#bottom-nav .nav-tab.active {
    color: var(--green);
}
</style>
</head>
<body>

<main class="page">
    <header class="brand">
        <h1>Your Progress</h1>
        <div class="subtitle">First attempt, latest attempt, side by side.</div>
    </header>

    <div id="progress-list">
        <div class="loading-state">Gathering your past attempts…</div>
    </div>
</main>

<nav id="bottom-nav" aria-label="Main navigation">
    <a href="/" class="nav-tab" data-page="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
        </svg>
        <span>練習</span>
    </a>
    <a href="/vocabulary.html" class="nav-tab" data-page="vocabulary">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span>單字</span>
    </a>
    <a href="/diagnosis.html" class="nav-tab" data-page="diagnosis">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 8v4l3 3"/>
        </svg>
        <span>診斷</span>
    </a>
    <a href="/history.html" class="nav-tab" data-page="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h12a4 4 0 0 1 4 4v12a4 4 0 0 1-4 0H4z"/>
            <path d="M4 4v12a4 4 0 0 0 4 4h0a4 4 0 0 1-4-4z"/>
            <line x1="8" y1="9" x2="16" y2="9"/>
            <line x1="8" y1="13" x2="14" y2="13"/>
        </svg>
        <span>紀錄</span>
    </a>
    <a href="/account.html" class="nav-tab" data-page="account">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>帳號</span>
    </a>
</nav>

<script>
(() => {
    const cfg = window.BLABBY_CONFIG || {};
    const SUPABASE_URL = cfg.supabaseUrl;
    const SUPABASE_ANON_KEY = cfg.supabaseAnonKey;
    const API_BASE = window.BLABBY_API_BASE || 'https://blabby-backend.onrender.com';

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase) {
        document.body.innerHTML = '<main class="page"><p class="error-state">Missing Supabase config or SDK.</p></main>';
        return;
    }
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => (
            {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
        ));
    }

    // Spec: MMM D, YYYY (e.g. "Mar 7, 2026").
    function fmtDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        if (isNaN(d)) return '';
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    }

    // Render the delta line. Server already computed the numbers; client
    // only handles sign/omission. A zero metric is dropped; both zero
    // means the user spoke the same length again — surface as "no change"
    // rather than blank for honesty.
    function renderDelta(delta) {
        const parts = [];
        const w = delta?.word_delta ?? 0;
        const s = delta?.sentence_delta ?? 0;
        if (w !== 0) {
            const sign = w > 0 ? '+' : '−';
            parts.push(`${sign}${Math.abs(w)} word${Math.abs(w) === 1 ? '' : 's'}`);
        }
        if (s !== 0) {
            const sign = s > 0 ? '+' : '−';
            parts.push(`${sign}${Math.abs(s)} sentence${Math.abs(s) === 1 ? '' : 's'}`);
        }
        if (parts.length === 0) {
            return {
                text: 'Same length as your first attempt.',
                empty: true,
            };
        }
        return { text: parts.join(' · '), empty: false };
    }

    function renderEmpty() {
        return (
            '<div class="empty-state">' +
            '<p class="lede">You have not yet trodden this ground twice. ' +
            'Practice the same question again to see how far you have come.</p>' +
            '</div>'
        );
    }

    function renderCard(item) {
        const delta = renderDelta(item.delta);
        return (
            '<article class="progress-card">' +
                '<div class="progress-card__question">' +
                    escapeHtml(item.question) +
                '</div>' +
                '<div class="progress-card__panels">' +
                    '<div class="progress-panel">' +
                        '<div class="progress-panel__label">First Attempt</div>' +
                        '<div class="progress-panel__date">' + escapeHtml(fmtDate(item.first?.created_at)) + '</div>' +
                        '<div class="progress-panel__transcript">' + escapeHtml(item.first?.transcript || '') + '</div>' +
                    '</div>' +
                    '<div class="progress-panel">' +
                        '<div class="progress-panel__label">Latest Attempt</div>' +
                        '<div class="progress-panel__date">' + escapeHtml(fmtDate(item.latest?.created_at)) + '</div>' +
                        '<div class="progress-panel__transcript">' + escapeHtml(item.latest?.transcript || '') + '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="progress-card__delta' +
                    (delta.empty ? ' progress-card__delta--empty' : '') +
                '">' + escapeHtml(delta.text) + '</div>' +
            '</article>'
        );
    }

    async function getToken() {
        try {
            const { data: { session } } = await sb.auth.getSession();
            return (session && session.access_token) || null;
        } catch (_) {
            return null;
        }
    }

    async function load() {
        const mount = document.getElementById('progress-list');
        const token = await getToken();
        if (!token) {
            window.location.href = '/index.html';
            return;
        }
        try {
            const res = await fetch(`${API_BASE}/api/progress`, {
                headers: { 'Authorization': `Bearer ${token}` },
            });
            if (!res.ok) {
                throw new Error(`progress ${res.status}`);
            }
            const items = await res.json();
            if (!Array.isArray(items) || items.length === 0) {
                mount.innerHTML = renderEmpty();
                return;
            }
            mount.innerHTML = items.map(renderCard).join('');
        } catch (err) {
            console.error('[progress] load failed', err);
            mount.innerHTML =
                '<div class="error-state">Could not load your progress. ' +
                'Please refresh or try again later.</div>';
        }
    }

    load();
})();
</script>

</body>
</html>
