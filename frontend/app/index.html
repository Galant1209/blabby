<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blabby · AI IELTS Speaking Practice</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M4 26 L4 14 L10 19 L16 8 L22 19 L28 14 L28 26 Z' fill='none' stroke='%23C9A84C' stroke-width='2' stroke-linejoin='round'/><line x1='4' y1='26' x2='28' y2='26' stroke='%23C9A84C' stroke-width='2'/><circle cx='16' cy='7' r='2' fill='%23C9A84C'/><circle cx='4' cy='13' r='2' fill='%23C9A84C'/><circle cx='28' cy='13' r='2' fill='%23C9A84C'/></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg:         #F5F0E8;  /* 奶油白，像老紙 */
            --surface:    #FDFAF4;  /* 更淺的奶油，卡片背景 */
            --ink:        #1C1008;  /* 深墨，主文字 */
            --navy:       #1A3550;  /* 深藍，次要文字 */
            --green:      #1B3A2D;  /* 深墨綠，主色 */
            --green-dark: #11261D;
            --gold:       #C9A84C;  /* 金色，裝飾 */
            --gold-warm:  #E8C866;
            --red:        #6B1A1A;  /* 酒紅，強調 */
            --border:     #C4B89A;  /* 暖米色邊框 */
            --muted:      #7A6E5F;  /* 灰棕 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            background: var(--bg);
            color: var(--ink);
            font-family: 'EB Garamond', 'Noto Serif TC', Georgia, serif;
            font-size: 16px;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            max-width: 520px;
            margin: 0 auto;
            padding: 32px 24px 60px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            position: relative;
        }

        /* User menu */
        .user-menu-wrapper {
            position: absolute;
            top: 16px;
            right: 16px;
        }
        .user-avatar-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
        }
        .user-avatar-btn:hover {
            background: var(--gold);
            color: var(--surface);
        }
        .user-dropdown {
            position: absolute;
            top: 40px;
            right: 0;
            background: var(--surface);
            border: 1.5px solid var(--border);
            min-width: 180px;
            padding: 8px 0;
            z-index: 100;
        }
        .user-email-display {
            padding: 8px 16px;
            font-family: 'EB Garamond', serif;
            font-size: 12px;
            color: var(--muted);
            font-style: italic;
            border-bottom: 1px dashed var(--border);
            margin-bottom: 4px;
        }
        .user-logout-btn {
            width: 100%;
            padding: 8px 16px;
            background: transparent;
            border: none;
            text-align: left;
            font-family: 'Libre Baskerville', serif;
            font-size: 12px;
            font-style: italic;
            color: var(--ink);
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: color 0.2s, background 0.2s;
        }
        .user-logout-btn:hover {
            color: var(--red);
            background: rgba(107,26,26,0.05);
        }

        /* Header */
        .header { text-align: center; padding: 12px 0 4px; }
        .logo-svg {
            display: block;
            margin: 0 auto 8px;
            opacity: 0.9;
        }
        .header h1 {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            font-weight: 700;
            font-size: 48px;
            color: var(--green);
            letter-spacing: 0.01em;
            display: inline-block;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--gold);
        }
        .header .tagline {
            margin-top: 12px;
            font-family: 'EB Garamond', 'Noto Serif TC', serif;
            font-style: italic;
            font-size: 16px;
            color: var(--muted);
        }
        .header-rule {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px auto 16px;
            max-width: 200px;
        }
        .rule-line { flex: 1; height: 1px; background: var(--gold); }
        .rule-diamond { color: var(--gold); font-size: 8px; }

        /* Question card */
        .question-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-top: 3px solid var(--green);
            border-radius: 0;
            padding: 22px 24px 18px;
        }
        .question-card .label {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }
        .question-card .question-text {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            font-weight: 500;
            font-size: 22px;
            color: var(--ink);
            line-height: 1.4;
        }
        .question-card .meta {
            margin-top: 14px;
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 11px;
            color: var(--muted);
            text-align: right;
        }

        /* Recorder card */
        .recorder-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 0;
            padding: 28px 20px 32px;
            text-align: center;
        }
        .status-text {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 22px;
            min-height: 22px;
        }
        .record-btn {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: none;
            background: var(--green);
            color: var(--gold);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 2px var(--gold);
            transition: transform 0.15s ease, background 0.2s ease;
        }
        .record-btn:hover { transform: translateY(-1px); }
        .record-btn:active { transform: scale(0.97); }
        .record-btn.recording {
            background: var(--red);
            animation: pulse 1.6s ease-in-out infinite;
        }
        .record-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            animation: none;
        }
        .record-btn svg { width: 32px; height: 32px; }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 2px var(--gold), 0 0 0 0 rgba(107,26,26,0.45); }
            50%      { box-shadow: 0 0 0 2px var(--gold), 0 0 0 12px rgba(107,26,26,0); }
        }

        /* Feedback */
        .feedback-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 0;
            padding: 8px 24px;
            display: none;
            flex-direction: column;
        }
        .feedback-card.visible { display: flex; }

        .feedback-item {
            padding: 18px 0;
            border-bottom: 1px dashed var(--border);
        }
        .feedback-item:last-of-type { border-bottom: 1px dashed var(--border); }

        .feedback-label {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 10px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
        }

        .weakness-chip {
            display: inline-block;
            padding: 6px 10px;
            border: 1px solid var(--gold);
            background: rgba(201, 168, 76, 0.08);
            color: var(--green);
            font-family: 'Libre Baskerville', serif;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: none;
        }

        .transcript-text {
            font-family: 'EB Garamond', 'Noto Serif TC', serif;
            font-size: 16px;
            color: var(--ink);
            line-height: 1.6;
            padding: 10px 14px;
            background: var(--bg);
            border-left: 2px solid var(--gold);
        }
        .coach-text {
            font-family: 'EB Garamond', 'Noto Serif TC', serif;
            font-size: 16px;
            color: var(--ink);
            line-height: 1.7;
            white-space: pre-wrap;
        }
        .expression-en {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 20px;
            color: var(--green);
            line-height: 1.45;
            margin-bottom: 6px;
        }
        .expression-zh {
            font-family: 'EB Garamond', 'Noto Serif TC', serif;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.55;
        }

        .feedback-next {
            padding: 18px 0 22px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .next-question {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            font-size: 18px;
            color: var(--ink);
            line-height: 1.5;
        }

        #next-btn {
            margin-top: 8px;
            padding: 14px 32px;
            background: var(--green);
            color: var(--gold);
            border: none;
            border-radius: 0;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease;
            align-self: stretch;
        }
        #next-btn:hover { background: var(--green-dark); color: var(--gold-warm); }

        /* Footer */
        .footer {
            text-align: center;
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 11px;
            color: var(--muted);
            padding-top: 12px;
            letter-spacing: 0.05em;
        }

        /* Auth */
        .auth-card {
            max-width: 420px;
            margin: 80px auto;
            padding: 44px 40px 36px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-top: 3px solid var(--green);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .auth-card h2 {
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            font-weight: 700;
            color: var(--green);
            font-size: 40px;
            text-align: center;
            margin: 0;
            letter-spacing: 0.01em;
        }
        .auth-card p {
            font-family: 'EB Garamond', 'Noto Serif TC', serif;
            font-style: italic;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
            margin: 0 0 12px;
        }
        .auth-card input {
            padding: 10px 0;
            border: none;
            border-bottom: 1px solid var(--border);
            background: transparent;
            font-family: 'EB Garamond', 'Noto Serif TC', serif;
            font-size: 16px;
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s ease;
        }
        .auth-card input:focus { border-bottom-color: var(--green); }
        .auth-card input::placeholder { color: var(--muted); font-style: italic; }

        #auth-google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--surface);
            color: var(--ink);
            border: 1px solid var(--border);
            border-radius: 0;
            padding: 12px;
            font-family: 'EB Garamond', serif;
            font-size: 15px;
            cursor: pointer;
            margin: 8px 0 4px;
            transition: border-color 0.2s, background 0.2s;
        }
        #auth-google-btn:hover { border-color: var(--green); background: var(--bg); }

        #auth-login-btn {
            background: var(--green);
            color: var(--gold);
            border: none;
            padding: 14px;
            border-radius: 0;
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        #auth-login-btn:hover { background: var(--green-dark); color: var(--gold-warm); }

        #auth-signup-btn {
            background: transparent;
            color: var(--green);
            border: none;
            padding: 8px;
            border-radius: 0;
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            text-decoration: underline;
            text-underline-offset: 4px;
            cursor: pointer;
        }
        #auth-signup-btn:hover { color: var(--green-dark); }

        #auth-message {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 13px;
            color: var(--red);
            text-align: center;
            min-height: 20px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="auth-section">
        <div class="auth-card">
            <svg class="logo-svg" width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="32" cy="32" r="30" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
                <circle cx="32" cy="32" r="26" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
                <path d="M18 38 L18 28 L24 33 L32 22 L40 33 L46 28 L46 38 Z"
                      fill="none" stroke="#C9A84C" stroke-width="1.5"
                      stroke-linejoin="round" stroke-linecap="round"/>
                <line x1="18" y1="38" x2="46" y2="38" stroke="#C9A84C" stroke-width="1.5"/>
                <circle cx="32" cy="21" r="1.5" fill="#C9A84C"/>
                <circle cx="18" cy="27" r="1.5" fill="#C9A84C"/>
                <circle cx="46" cy="27" r="1.5" fill="#C9A84C"/>
                <text x="32" y="50"
                      font-family="Playfair Display, Georgia, serif"
                      font-size="7"
                      font-style="italic"
                      fill="#C9A84C"
                      text-anchor="middle"
                      letter-spacing="0.15em">BLABBY</text>
            </svg>
            <h2>Blabby</h2>
            <p>每天開口，讓單字從腦袋跑到嘴巴</p>
            <input id="auth-email" type="email" placeholder="你的 Email" autocomplete="email">
            <input id="auth-password" type="password" placeholder="密碼" autocomplete="current-password">
            <button id="auth-google-btn">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/>
                    <path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/>
                    <path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18z"/>
                    <path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/>
                </svg>
                用 Google 登入
            </button>
            <button id="auth-login-btn">登入</button>
            <button id="auth-signup-btn">註冊</button>
            <div id="auth-message"></div>
        </div>
    </div>

    <main id="main-section" class="app" style="display:none">
        <div class="user-menu-wrapper">
            <button id="user-avatar-btn" class="user-avatar-btn" aria-label="用戶選單">
                <span id="user-initial">?</span>
            </button>
            <div id="user-dropdown" class="user-dropdown" style="display:none">
                <div id="user-email-display" class="user-email-display"></div>
                <button id="logout-btn" class="user-logout-btn">登出</button>
            </div>
        </div>

        <header class="header">
            <svg class="logo-svg" width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="32" cy="32" r="30" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
                <circle cx="32" cy="32" r="26" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
                <path d="M18 38 L18 28 L24 33 L32 22 L40 33 L46 28 L46 38 Z"
                      fill="none" stroke="#C9A84C" stroke-width="1.5"
                      stroke-linejoin="round" stroke-linecap="round"/>
                <line x1="18" y1="38" x2="46" y2="38" stroke="#C9A84C" stroke-width="1.5"/>
                <circle cx="32" cy="21" r="1.5" fill="#C9A84C"/>
                <circle cx="18" cy="27" r="1.5" fill="#C9A84C"/>
                <circle cx="46" cy="27" r="1.5" fill="#C9A84C"/>
                <text x="32" y="50"
                      font-family="Playfair Display, Georgia, serif"
                      font-size="7"
                      font-style="italic"
                      fill="#C9A84C"
                      text-anchor="middle"
                      letter-spacing="0.15em">BLABBY</text>
            </svg>
            <h1>Blabby</h1>
            <div class="header-rule">
                <span class="rule-line"></span>
                <span class="rule-diamond">◆</span>
                <span class="rule-line"></span>
            </div>
            <p class="tagline">每天開口，讓單字從腦袋跑到嘴巴</p>
        </header>

        <section class="question-card">
            <div class="label">考官問你</div>
            <div class="question-text" id="question-text">
                What do you usually do in your free time?
            </div>
            <div class="meta" id="question-meta">Part 1 · Topic: Hobbies</div>
        </section>

        <section class="recorder-card">
            <div class="status-text" id="status-text">準備好了就按錄音</div>
            <button class="record-btn" id="record-btn" aria-label="錄音">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M12 14.5a3.5 3.5 0 0 0 3.5-3.5V6a3.5 3.5 0 0 0-7 0v5a3.5 3.5 0 0 0 3.5 3.5Z" fill="currentColor"/>
                    <path d="M18.5 11a6.5 6.5 0 0 1-13 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M12 17.5V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </section>

        <div id="feedback-section" class="feedback-card" aria-live="polite">
            <div class="feedback-item">
                <div class="feedback-label">你說的</div>
                <div id="user-transcript" class="transcript-text"></div>
            </div>
            <div class="feedback-item">
                <div class="feedback-label">物理治療師說</div>
                <div id="coach-response" class="coach-text"></div>
            </div>
            <div class="feedback-item">
                <div class="feedback-label">這次主要卡點</div>
                <div id="weakness-tag" class="weakness-chip"></div>
            </div>
            <div class="feedback-item">
                <div class="feedback-label">值得偷走的說法</div>
                <div id="better-expression" class="expression-en"></div>
                <div id="better-expression-zh" class="expression-zh"></div>
            </div>
            <div class="feedback-next">
                <div class="feedback-label">下一題</div>
                <div id="next-question-text" class="next-question"></div>
                <button id="next-btn">繼續練習 →</button>
            </div>
        </div>

        <footer class="footer">Blabby · AI IELTS Speaking Practice</footer>
    </main>

    <script>
        const API_BASE = 'https://blabby-backend.onrender.com';

        const SUPABASE_URL      = 'https://mkwywkwruyqzdhuzwnoa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rd3l3a3dydXlxemRodXp3bm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjY1NDQsImV4cCI6MjA5MjUwMjU0NH0.qVNtw6L7oXamzGlvXbVSHkELhG4YnXjWWgKbGublJj8';

        // If the CDN fails, `window.supabase` is undefined. Guarding here means
        // the rest of the script (incl. event listeners) still runs so the page
        // doesn't appear frozen.
        let sb = null;
        try {
            if (!window.supabase || typeof window.supabase.createClient !== 'function') {
                throw new Error('Supabase SDK not loaded — window.supabase is missing or malformed.');
            }
            sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('Supabase initialized');
        } catch (err) {
            console.error('Supabase init failed:', err);
        }

        // Surface any uncaught error so a silent failure is visible.
        window.addEventListener('error',              (e) => console.error('window error:',  e.message, e.error));
        window.addEventListener('unhandledrejection', (e) => console.error('unhandled promise:', e.reason));

        // Warm up Render backend so the first /process call doesn't pay the cold-start tax.
        fetch(`${API_BASE}/health`).catch(() => { /* silent */ });

        const QUESTION_BANK = [
            { topic: "Hometown",      question: "Where are you from?" },
            { topic: "Hometown",      question: "What do you like most about your hometown?" },
            { topic: "Hometown",      question: "Has your hometown changed much in recent years?" },
            { topic: "Family",        question: "Do you have a large or small family?" },
            { topic: "Family",        question: "How much time do you spend with your family?" },
            { topic: "Family",        question: "Who are you closest to in your family?" },
            { topic: "Daily Routine", question: "What do you usually do in the morning?" },
            { topic: "Daily Routine", question: "Has your daily routine changed recently?" },
            { topic: "Daily Routine", question: "Do you prefer to plan your day or be spontaneous?" },
            { topic: "Reading",       question: "Do you enjoy reading?" },
            { topic: "Reading",       question: "What kind of books do you like to read?" },
            { topic: "Reading",       question: "Do you prefer reading physical books or e-books?" },
            { topic: "Travel",        question: "Do you like travelling?" },
            { topic: "Travel",        question: "Where is the most interesting place you have visited?" },
            { topic: "Travel",        question: "Do you prefer travelling alone or with others?" },
            { topic: "Technology",    question: "How often do you use the internet?" },
            { topic: "Technology",    question: "How has technology changed your daily life?" },
            { topic: "Technology",    question: "Do you think people rely too much on technology?" },
            { topic: "Nature",        question: "Do you like spending time in nature?" },
            { topic: "Nature",        question: "Are there any environmental problems in your area?" },
            { topic: "Nature",        question: "What can individuals do to help protect the environment?" },
        ];

        const recordBtn       = document.getElementById('record-btn');
        const statusText      = document.getElementById('status-text');
        const feedbackSection = document.getElementById('feedback-section');
        const nextBtn         = document.getElementById('next-btn');
        const questionText    = document.getElementById('question-text');
        const questionMeta    = document.getElementById('question-meta');
        const nextQuestionEl  = document.getElementById('next-question-text');

        const authSection   = document.getElementById('auth-section');
        const mainSection   = document.getElementById('main-section');
        const authEmail     = document.getElementById('auth-email');
        const authPassword  = document.getElementById('auth-password');
        const authGoogleBtn = document.getElementById('auth-google-btn');
        const authLoginBtn  = document.getElementById('auth-login-btn');
        const authSignupBtn = document.getElementById('auth-signup-btn');
        const authMessage   = document.getElementById('auth-message');

        let currentTopic    = '';
        let currentQuestion = '';

        async function showMain() {
            authSection.style.display = 'none';
            mainSection.style.display = '';
            if (!sb) return;
            try {
                const { data: { user } } = await sb.auth.getUser();
                const email = user && user.email ? user.email : '';
                document.getElementById('user-initial').textContent =
                    (email[0] || '?').toUpperCase();
                document.getElementById('user-email-display').textContent = email;
            } catch (err) {
                console.error('showMain getUser error:', err);
            }
        }
        function showAuth() {
            authSection.style.display = '';
            mainSection.style.display = 'none';
        }
        function setAuthMessage(msg, ok = false) {
            authMessage.textContent = msg || '';
            authMessage.style.color = ok ? '#1A3550' : '#dc2626';
        }

        function pickRandomFromBank(exclude) {
            const pool = exclude
                ? QUESTION_BANK.filter(q => q.question !== exclude)
                : QUESTION_BANK;
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function setQuestion(question, topic) {
            currentQuestion = question;
            currentTopic    = topic;
            questionText.textContent = question;
            questionMeta.textContent = `Part 1 · Topic: ${topic}`;
        }

        // Initial question from bank
        {
            const initial = pickRandomFromBank();
            setQuestion(initial.question, initial.topic);
        }

        // Auth bootstrap: show main if session exists, else show auth form.
        (async () => {
            if (!sb) { showAuth(); return; }
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (session) showMain(); else showAuth();
            } catch (err) {
                console.error('getSession error:', err);
                showAuth();
            }
        })();

        document.getElementById('user-avatar-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            const dd = document.getElementById('user-dropdown');
            dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.user-menu-wrapper')) {
                const dd = document.getElementById('user-dropdown');
                if (dd) dd.style.display = 'none';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            console.log('Logout clicked');
            document.getElementById('user-dropdown').style.display = 'none';
            if (!sb) { showAuth(); return; }
            try {
                await sb.auth.signOut();
            } catch (err) {
                console.error('signOut threw:', err);
            }
            showAuth();
        });

        authGoogleBtn.addEventListener('click', async () => {
            console.log('Google clicked');
            if (!sb) {
                setAuthMessage('Supabase 尚未載入，請重新整理');
                return;
            }
            try {
                const { error } = await sb.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: 'https://blabby.vercel.app' }
                });
                if (error) setAuthMessage(error.message);
            } catch (err) {
                console.error('signInWithOAuth threw:', err);
                setAuthMessage('Google 登入失敗：' + (err.message || err));
            }
        });

        authLoginBtn.addEventListener('click', async () => {
            console.log('Login clicked');
            if (!sb) {
                setAuthMessage('Supabase 尚未載入，請重新整理');
                return;
            }
            const email    = authEmail.value.trim();
            const password = authPassword.value;
            if (!email || !password) {
                setAuthMessage('請輸入 Email 和密碼');
                return;
            }
            setAuthMessage('登入中...', true);
            authLoginBtn.disabled = true;
            try {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) {
                    setAuthMessage(error.message);
                } else {
                    setAuthMessage('');
                    showMain();
                }
            } catch (err) {
                console.error('signIn threw:', err);
                setAuthMessage('登入失敗：' + (err.message || err));
            } finally {
                authLoginBtn.disabled = false;
            }
        });

        authSignupBtn.addEventListener('click', async () => {
            console.log('Signup clicked');
            if (!sb) {
                setAuthMessage('Supabase 尚未載入，請重新整理');
                return;
            }
            const email    = authEmail.value.trim();
            const password = authPassword.value;
            if (!email || !password) {
                setAuthMessage('請輸入 Email 和密碼');
                return;
            }
            setAuthMessage('註冊中...', true);
            authSignupBtn.disabled = true;
            try {
                const { error } = await sb.auth.signUp({ email, password });
                if (error) {
                    setAuthMessage(error.message);
                } else {
                    setAuthMessage('註冊成功！請用剛才的 Email 和密碼登入', true);
                    authPassword.value = '';
                    authPassword.focus();
                }
            } catch (err) {
                console.error('signUp threw:', err);
                setAuthMessage('註冊失敗：' + (err.message || err));
            } finally {
                authSignupBtn.disabled = false;
            }
        });

        async function savePracticeRecord(data) {
            if (!sb) return;
            try {
                const { data: { user } } = await sb.auth.getUser();
                if (!user) return;
                const { error } = await sb.from('practice_records').insert({
                    user_id:              user.id,
                    topic:                currentTopic,
                    question:             currentQuestion,
                    user_transcript:      data.text,
                    coach_response:       data.coach_response,
                    better_expression:    data.better_expression,
                    better_expression_zh: data.better_expression_zh,
                    next_question:        data.next_question,
                });
                if (error) console.error('practice_records insert error:', error);
            } catch (err) {
                console.error('savePracticeRecord error:', err);
            }
        }

        let mediaRecorder = null;
        let chunks        = [];
        let isRecording   = false;

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) chunks.push(e.data);
                };
                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(chunks, { type: 'audio/webm' });
                    await submitAudio(blob);
                };

                mediaRecorder.start();
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtn.setAttribute('aria-label', '停止錄音');
                statusText.textContent = '錄音中...';
                feedbackSection.classList.remove('visible');
            } catch (err) {
                console.error('getUserMedia error:', err);
                statusText.textContent = '無法取得麥克風權限';
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            recordBtn.classList.remove('recording');
            recordBtn.setAttribute('aria-label', '錄音');
            statusText.textContent = 'AI 正在批改...';
            recordBtn.disabled = true;
        }

        async function submitAudio(blob) {
            const form = new FormData();
            form.append('audio', blob, 'recording.webm');
            form.append('level', 'Band 5');
            form.append('topic', currentTopic || 'General');
            form.append('history', '[]');

            try {
                if (!sb) {
                    statusText.textContent = '請先登入';
                    return;
                }

                const { data: { session } } = await sb.auth.getSession();
                const accessToken = session && session.access_token;
                if (!accessToken) {
                    statusText.textContent = '請先登入';
                    return;
                }

                const res = await fetch(`${API_BASE}/process`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: form
                });
                const data = await res.json();
                if (data.error) {
                    statusText.textContent = `錯誤：${data.error}`;
                } else if (!res.ok) {
                    statusText.textContent = `錯誤：${data.detail || '請稍後再試'}`;
                } else {
                    renderFeedback(data);
                    statusText.textContent = '批改完成，準備好再按錄音';
                }
            } catch (err) {
                console.error('submit error:', err);
                statusText.textContent = '網路錯誤，請稍後再試';
            } finally {
                recordBtn.disabled = false;
            }
        }

        function formatWeaknessTag(tag) {
            const labels = {
                weak_vocab: '弱點類型：模糊用詞',
                lack_detail: '弱點類型：細節不足',
                safe_answer: '弱點類型：回答太安全',
                grammar_minor: '弱點類型：小型文法問題'
            };
            return labels[tag] || '弱點類型：待確認';
        }

        function renderFeedback(data) {
            if (data.error) {
                statusText.textContent = '發生錯誤，請再試一次';
                return;
            }

            // 顯示用戶說的話
            document.getElementById('user-transcript').textContent = data.text || '';

            // 批改回饋
            document.getElementById('coach-response').textContent = data.coach_response || '';

            // 主要弱點標籤
            document.getElementById('weakness-tag').textContent = formatWeaknessTag(data.weakness_tag);

            // 更好的說法
            document.getElementById('better-expression').textContent = data.better_expression || '';
            document.getElementById('better-expression-zh').textContent = data.better_expression_zh || '';

            // 下一題
            document.getElementById('next-question-text').textContent = data.next_question || '';

            feedbackSection.classList.add('visible');
            statusText.textContent = '批改完成';

            // Persist the practice session (fire-and-forget; don't block UI).
            savePracticeRecord(data);
        }

        recordBtn.addEventListener('click', () => {
            if (isRecording) stopRecording();
            else startRecording();
        });

        nextBtn.addEventListener('click', () => {
            // Prefer AI's next_question (natural continuation of current topic).
            // Fall back to a random bank question, excluding the current one.
            const aiNext = nextQuestionEl.textContent.trim();
            if (aiNext) {
                setQuestion(aiNext, currentTopic);
            } else {
                const pick = pickRandomFromBank(currentQuestion);
                setQuestion(pick.question, pick.topic);
            }
            feedbackSection.classList.remove('visible');
            statusText.textContent = '準備好了就按錄音';
        });
    </script>
</body>
</html>
