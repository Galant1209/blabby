<style>
:root {
    --bg: #F5F0E8;
    --surface: #FDFAF4;
    --paper: #F1E9D6;
    --ink: #2C2416;
    --ink-soft: #3a3022;
    --green: #2D5016;
    --green-dark: #1f3810;
    --gold: #C9A84C;
    --gold-warm: #E8C866;
    --wine: #6B1A1A;
    --border: #C4B89A;
    --muted: #8A7E6E;
    --serif: 'EB Garamond', 'Cormorant Garamond', Georgia, serif;
    --sans: 'Inter Tight', 'Inter', -apple-system, sans-serif;
    --serif-tc: 'Noto Serif TC', 'EB Garamond', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    background: var(--bg); color: var(--ink);
    font-family: var(--sans); font-size: 16px; line-height: 1.7;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
}
.page { max-width: 680px; margin-left: auto; margin-right: auto; width: 100%; padding: 24px 18px 88px; }
header.brand { text-align: center; padding: 8px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
header.brand .crown {
    width: 42px; height: 42px; margin: 0 auto 8px; display: block;
}
header.brand h1 {
    font-family: var(--serif); font-weight: 500; font-size: 32px;
    color: var(--green); letter-spacing: 0.01em;
    padding-bottom: 6px; display: inline-block;
    border-bottom: 2px solid var(--gold); margin: 0;
}
header.brand .subtitle {
    font-family: var(--serif); font-style: italic; font-size: 14px;
    color: var(--ink-soft); margin-top: 12px;
}
.section-title {
    font-family: var(--serif); font-weight: 500; font-size: 22px;
    color: var(--ink); margin: 28px 0 14px;
}
.card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 18px; margin-bottom: 16px;
    position: relative;
}

.btn-primary {
    display: block; width: 100%; padding: 13px 18px;
    background: var(--green); color: var(--gold); border: none;
    border-radius: 6px; font-family: var(--serif); font-size: 15px;
    letter-spacing: 0.04em; cursor: pointer; margin-top: 16px;
}
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary:hover:not(:disabled) { background: var(--green-dark); }

/* Bank — filters + search + grid */
.topic-filters {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
}
.topic-filters button {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 999px;
    padding: 5px 12px; font-size: 12px; font-family: var(--sans);
    cursor: pointer; transition: all 120ms ease;
}
.topic-filters button.active {
    background: var(--green); border-color: var(--green); color: var(--gold);
}
.topic-filters button:hover:not(.active) { border-color: var(--gold); color: var(--ink); }
.vocab-search {
    width: 100%; padding: 10px 14px; margin-bottom: 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; font-family: var(--sans); font-size: 14px;
    color: var(--ink); outline: none;
}
.vocab-search:focus { border-color: var(--gold); }
#vocab-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
}
@media (max-width: 360px) { #vocab-grid { grid-template-columns: 1fr; } }
.vocab-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 6px;
    box-shadow: 0 1px 3px rgba(44,36,22,0.06);
}
.vocab-card__head { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.vocab-card__word { font-family: var(--serif); font-size: 22px; font-weight: 500; color: var(--ink); font-style: normal; }
.vocab-card__pos { font-size: 11px; color: var(--muted); font-style: normal; }
.vocab-card__zh { font-family: var(--serif-tc); color: #8B6914; font-size: 15px; font-weight: 500; font-style: normal; }
.vocab-card__chunk { font-size: 13px; color: var(--ink); font-style: normal; }
.vocab-card__sentence {
    font-size: 13px; color: #5a5040; line-height: 1.4; font-style: normal;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
}
.vocab-card__meta {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    font-size: 10px; color: var(--muted); margin-top: auto;
}
.vocab-card__topic {
    border: 1px solid var(--border); padding: 1px 8px; border-radius: 999px;
    text-transform: capitalize;
}
.vocab-card__band { color: var(--gold); font-weight: 500; }
.vocab-card__add {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 6px 16px; border-radius: 4px;
    font-size: 12px; font-family: var(--sans); cursor: pointer;
    width: auto; align-self: flex-end;
    margin-top: 6px; transition: all 120ms ease;
}
.vocab-card__add:hover:not(:disabled) { background: var(--green); color: var(--gold); border-color: var(--green); }
.vocab-card__add:disabled { color: var(--muted); cursor: not-allowed; opacity: 0.6; }

/* My vocabulary list */
.my-vocab-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px dashed var(--border);
}
.my-vocab-row:last-child { border-bottom: none; }
.my-vocab-row__main { flex: 1; }
.my-vocab-row__word { font-family: var(--serif); font-size: 16px; color: var(--ink); }
.my-vocab-row__zh { font-size: 12px; color: var(--gold); }
.my-vocab-row__meta { font-size: 11px; color: var(--muted); text-align: right; }
.srs-pip {
    display: inline-block; width: 8px; height: 8px;
    margin-right: 2px; border-radius: 1px;
    background: var(--border);
}
.srs-pip--filled { background: var(--gold); }

.empty-state {
    text-align: center; padding: 24px 8px; color: var(--muted);
    font-style: italic; font-size: 13px;
}
.loading-state { text-align: center; padding: 24px 8px; color: var(--gold); font-style: italic; font-size: 13px; }
.error-state { color: var(--wine); padding: 12px 0; font-size: 13px; }
.empty-onboard { font-size: 13px; color: var(--muted); font-style: italic; margin: 8px 0 0; }
.section-subtitle { font-size: 13px; color: var(--muted); font-style: italic; margin: -8px 0 14px; }
.vocab-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
}
@media (max-width: 360px) { .vocab-grid { grid-template-columns: 1fr; } }
#recommended-section { margin-bottom: 32px; }
/* Vocab card extras — better_than line + usage_note_zh inline */
.vocab-card__better,
.vocab-card__usage {
    font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4;
}
.vocab-card__usage { font-style: italic; }

/* Review modal — full-screen overlay */
#review-modal[hidden] { display: none; }
#review-modal {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    padding: 20px 18px;
}
.review-progress {
    height: 4px; background: var(--border); border-radius: 2px;
    overflow: hidden; margin-bottom: 18px;
}
.review-progress__bar {
    height: 100%; background: var(--gold); transition: width 200ms ease;
}
.review-counter {
    font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
    text-transform: uppercase; text-align: center; margin-bottom: 16px;
}
.review-card {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px 22px; cursor: pointer;
    text-align: center; min-height: 60vh;
}
.review-card__front { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.review-card__word {
    font-family: var(--serif); font-size: 38px; font-weight: 500;
    color: var(--ink); line-height: 1.1;
}
.review-card__pos { font-size: 14px; color: var(--muted); font-style: italic; }
/* SRS reveal flow — explicit Reveal button + fade-in for back/actions */
.review-reveal-row {
    display: flex; justify-content: center; margin-top: 18px;
}
.review-reveal {
    padding: 12px 36px;
    font-family: var(--serif, 'EB Garamond', Georgia, serif);
    font-size: 16px;
    background: var(--green);
    color: var(--gold);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s, transform 0.1s;
}
.review-reveal:hover { opacity: 0.9; }
.review-reveal:active { transform: scale(0.97); }
.review-fade-in {
    animation: review-fade-in 0.35s ease both;
}
@keyframes review-fade-in {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
}
.review-card__back {
    text-align: left; width: 100%;
    display: flex; flex-direction: column; gap: 10px;
}
.review-card__back .word-back {
    font-family: var(--serif); font-size: 24px; color: var(--ink); margin-bottom: 4px;
}
.review-card__back .zh { font-family: var(--serif-tc); color: var(--gold); font-size: 18px; font-weight: 500; }
.review-card__back .chunk { font-style: normal; font-size: 13px; color: var(--ink); }
.review-card__back .sentence { font-size: 14px; color: var(--ink); line-height: 1.5; font-style: normal; }
.review-card__back .note {
    font-size: 12px; color: var(--muted); padding-top: 8px;
    border-top: 1px dashed var(--border);
    font-style: italic;
}
.review-actions {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    margin-top: 14px;
}
.review-btn {
    padding: 11px 6px; border: 1px solid var(--border);
    background: var(--surface); border-radius: 6px;
    font-family: var(--sans); font-size: 12px; font-weight: 500;
    cursor: pointer;
}
.review-btn--again { color: var(--wine); }
.review-btn--hard  { color: var(--ink-soft); }
.review-btn--good  { color: var(--green); }
.review-btn--easy  { color: var(--gold); border-color: var(--gold); }
.review-btn:hover { border-color: var(--gold); }
.review-summary {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; gap: 16px; padding: 20px;
}
.review-summary__title { font-family: var(--serif); font-size: 28px; color: var(--green); }
.review-summary__count { font-family: var(--serif); font-size: 48px; color: var(--gold); font-weight: 500; }
.review-summary__quote { font-family: var(--serif-tc); font-style: italic; font-size: 15px; color: var(--ink-soft); max-width: 320px; line-height: 1.6; }
.review-close {
    margin-top: 24px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 10px 18px; border-radius: 6px; cursor: pointer;
    font-family: var(--sans); font-size: 13px;
}
.review-close:hover { color: var(--green); border-color: var(--green); }
/* Bottom tab nav — fixed across all pages */
#bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 60px;
    background: var(--surface, #FDFAF4);
    border-top: 1px solid var(--border, #C4B89A);
    display: flex; align-items: stretch;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom);
}
.nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    text-decoration: none; color: var(--muted, #8A7E6E);
    font-size: 10px; letter-spacing: 0.04em;
    font-family: var(--sans, 'Inter Tight', sans-serif);
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
}
.nav-tab:hover, .nav-tab.active { color: var(--green, #2D5016); }
.nav-tab.active svg { stroke: var(--green, #2D5016); }
.nav-tab svg { transition: stroke 0.15s; }

/* === v3 quality pass — hover lift, active press, fade-in, skeletons === */
.card,
.vocab-card {
    transition: box-shadow 0.15s, transform 0.15s;
}
.card:hover,
.vocab-card:hover {
    box-shadow: 0 4px 16px rgba(44,36,22,0.09);
    transform: translateY(-1px);
}
.btn-primary,
.vocab-card__add,
.review-btn,
.review-close {
    transition: transform 0.1s, opacity 0.1s, background 0.15s, color 0.15s, border-color 0.15s;
}
.btn-primary:active,
.vocab-card__add:active,
.review-btn:active,
.review-close:active {
    transform: scale(0.97);
    opacity: 0.88;
}
.card p { margin-bottom: 0.85em; }
.card p:last-child { margin-bottom: 0; }

.fade-in {
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.35s ease, transform 0.35s ease;
}
.fade-in.visible {
    opacity: 1;
    transform: translateY(0);
}

.skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
}
.skeleton-line {
    height: 12px;
    background: linear-gradient(90deg, #ede8df 25%, #f5f0e8 50%, #ede8df 75%);
    background-size: 200% 100%;
    border-radius: 4px;
    margin-bottom: 10px;
    animation: shimmer 1.4s infinite;
}
.skeleton-line.wide { width: 70%; }
.skeleton-line.medium { width: 50%; }
.skeleton-line.narrow { width: 35%; }
@keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* === RWD audit additions === */
@media (max-width: 390px) {
    body { font-size: 14px; }
    .wordmark, h1 { font-size: 36px !important; }
    .practice-hub-title, .section-title { font-size: 18px; }
    .vocab-card__word { font-size: 18px; }
}
@media (min-width: 681px) {
    #bottom-nav { max-width: 680px; left: 50%; transform: translateX(-50%); }
}
@media (min-width: 1024px) {
    .vocab-grid { grid-template-columns: repeat(3, 1fr); }
}

/* Add-success toast — bottom-center, fixed, fade in/out, ≤4s lifetime */
#vocab-toast {
    position: fixed;
    left: 50%;
    bottom: 88px;
    transform: translateX(-50%) translateY(8px);
    background: var(--ink);
    color: var(--surface);
    font-family: var(--serif, 'EB Garamond', Georgia, serif);
    font-size: 14px;
    padding: 12px 18px;
    border-radius: 6px;
    box-shadow: 0 4px 16px rgba(44, 36, 22, 0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 80;
    max-width: 90vw;
    white-space: nowrap;
}
#vocab-toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
}
#vocab-toast a {
    color: var(--gold);
    margin-left: 10px;
    text-decoration: none;
    font-style: italic;
    cursor: pointer;
}
#vocab-toast a:hover { text-decoration: underline; }

/* IELTS level filter row + description */
.filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
}
.level-chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    transition: 0.15s;
    white-space: nowrap;
}
.level-chip:hover { border-color: var(--green); color: var(--green); }
.level-chip.active { background: var(--green); color: #fff; border-color: var(--green); }
.level-desc {
    font-size: 13px;
    color: var(--ink);
    font-style: italic;
    background: var(--surface);
    border-left: 3px solid var(--gold);
    padding: 10px 14px;
    margin-bottom: 16px;
    border-radius: 0 6px 6px 0;
    line-height: 1.6;
}

/* Generate vocab button (Recommended for Today) */
.generate-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: var(--serif, 'EB Garamond', serif);
    font-size: 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 20px;
    transition: 0.15s;
    letter-spacing: 0.03em;
}
.generate-btn:hover { background: rgba(201,168,76,0.08); }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.generate-btn svg { animation: none; }
.generate-btn.loading svg { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.generate-status {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 12px;
}

/* ═══════════════════════════════════════════════════
   VOCAB JOURNAL — split-page open book
═══════════════════════════════════════════════════ */

#vocab-journal-section {
    margin-bottom: 28px;
}

#vocab-journal {
    border: 1px solid #C4A96A;
    border-radius: 3px;
    box-shadow: 2px 4px 0 #C4A96A, 4px 6px 0 rgba(196,169,106,0.22);
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

.journal-book-inner {
    display: flex;
    min-height: 280px;
}

/* Spine */
.journal-spine {
    width: 8px;
    background: #C4A96A;
    flex-shrink: 0;
}

/* Left page — word list */
.journal-left {
    width: 130px;
    flex-shrink: 0;
    background: #F7F0DC;
    border-right: 1px solid rgba(180,150,80,0.3);
    position: relative;
    padding: 14px 0 0;
    overflow-y: auto;
    max-height: 340px;
}

.journal-left::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
        transparent, transparent 27px,
        rgba(180,150,80,0.15) 27px,
        rgba(180,150,80,0.15) 28px
    );
    pointer-events: none;
}

.journal-left-label {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 10px;
    color: #B8A07A;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0 10px 8px;
    position: relative;
    z-index: 1;
    border-bottom: 1px dashed rgba(180,150,80,0.28);
    margin-bottom: 2px;
}

#journal-word-list {
    position: relative;
    z-index: 1;
}

.journal-word-item {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 16px;
    font-weight: 500;
    color: #5a4e3a;
    padding: 6px 10px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    line-height: 1.4;
    position: relative;
}

.journal-word-item:hover {
    color: #2C2416;
    background: rgba(180,150,80,0.08);
}

.journal-word-item.active {
    color: #2C2416;
    border-left-color: #C9A84C;
    background: rgba(201,168,76,0.10);
}

.journal-word-item.active::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 50%;
    transform: translateY(-50%);
    border: 6px solid transparent;
    border-left-color: #C9A84C;
}

/* Right page — entry detail */
.journal-right {
    flex: 1;
    background: #FDFAF4;
    position: relative;
    padding: 16px;
    overflow: hidden;
}

.journal-right::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
        transparent, transparent 27px,
        rgba(180,150,80,0.09) 27px,
        rgba(180,150,80,0.09) 28px
    );
    pointer-events: none;
}

.journal-entry-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 200px;
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 13px;
    color: #C4A96A;
    text-align: center;
    line-height: 2;
    position: relative;
    z-index: 1;
}

.journal-entry-arrow {
    font-size: 20px;
    margin-bottom: 6px;
}

.journal-entry {
    position: relative;
    z-index: 1;
    display: none;
}

.journal-entry__word {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 26px;
    font-weight: 500;
    color: #2C2416;
    line-height: 1.1;
    margin-bottom: 2px;
}

.journal-entry__pos {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 13px;
    color: #9A8050;
    margin-bottom: 8px;
}

.journal-entry__divider {
    border: none;
    border-top: 1px solid rgba(180,150,80,0.3);
    margin: 8px 0 10px;
}

.journal-entry__zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 500;
    color: #8B6914;
    margin-bottom: 10px;
}

.journal-entry__sentence {
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 14px;
    color: #5a4e3a;
    line-height: 1.65;
}

/* Footer — review CTA */
.journal-footer {
    border-top: 1px dashed rgba(180,150,80,0.4);
    padding: 11px 16px;
    background: #F7F0DC;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'EB Garamond', Georgia, serif;
    font-style: italic;
    font-size: 13px;
    color: #6B4E1A;
    cursor: pointer;
    transition: background 0.15s;
}

.journal-footer:hover { background: #F0E5C4; }

.journal-due-badge {
    background: #6B4E1A;
    color: #F7F0DC;
    font-size: 11px;
    font-style: normal;
    font-family: 'Inter Tight', sans-serif;
    padding: 2px 8px;
    border-radius: 20px;
    min-width: 20px;
    text-align: center;
}

.journal-footer-text { flex: 1; }

/* Fly ghost */
.vocab-fly-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    color: #2C2416;
    white-space: nowrap;
    will-change: transform, opacity;
}

@keyframes journal-ink-in {
    0%   { opacity: 0; transform: scale(0.7) translateY(4px); }
    60%  { opacity: 1; transform: scale(1.08) translateY(-2px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
}

.journal-word-item--new {
    animation: journal-ink-in 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes journal-pulse {
    0%   { box-shadow: 2px 4px 0 #C4A96A, 4px 6px 0 rgba(196,169,106,0.22); }
    40%  { box-shadow: 2px 4px 0 #C9A84C, 4px 6px 0 rgba(201,168,76,0.45); }
    100% { box-shadow: 2px 4px 0 #C4A96A, 4px 6px 0 rgba(196,169,106,0.22); }
}

.journal--pulse {
    animation: journal-pulse 0.7s ease;
}
</style>
</head>
<body>
<main class="page">
    <header class="brand">
        <svg class="crown" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="32" cy="32" r="30" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
            <circle cx="32" cy="32" r="26" fill="none" stroke="#C9A84C" stroke-width="0.5"/>
            <path d="M18 38 L18 28 L24 33 L32 22 L40 33 L46 28 L46 38 Z" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            <line x1="18" y1="38" x2="46" y2="38" stroke="#C9A84C" stroke-width="1.5"/>
            <circle cx="32" cy="21" r="1.5" fill="#C9A84C"/>
            <circle cx="18" cy="27" r="1.5" fill="#C9A84C"/>
            <circle cx="46" cy="27" r="1.5" fill="#C9A84C"/>
        </svg>
        <h1>Vocabulary Training</h1>
        <div class="subtitle">Don't just remember words. Learn to say better sentences.</div>
    </header>

    <!-- Section 0: Vocabulary Journal -->
    <section id="vocab-journal-section">
        <div id="vocab-journal">
            <div class="journal-book-inner">
                <div class="journal-spine"></div>
                <div class="journal-left">
                    <div class="journal-left-label">My words · <span id="stat-saved-j">0</span> saved</div>
                    <div id="journal-word-list"></div>
                </div>
                <div class="journal-right">
                    <div class="journal-entry-empty" id="journal-entry-empty">
                        <div class="journal-entry-arrow">←</div>
                        Select a word<br>to read its entry
                    </div>
                    <div class="journal-entry" id="journal-entry"></div>
                </div>
            </div>
            <div class="journal-footer" id="journal-review-cta">
                <span class="journal-due-badge" id="journal-due-badge">—</span>
                <span class="journal-footer-text" id="journal-footer-text">Loading review…</span>
                <span>→</span>
            </div>
        </div>
    </section>

    <!-- Section 1c: Recommended for Today -->
    <section id="recommended-section" class="fade-in">
        <h2 class="section-title">Recommended for Today</h2>
        <p class="section-subtitle">Start with words you can use in real IELTS answers.</p>
        <button id="generate-vocab-btn" class="generate-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
            根據我的弱點生成單字
        </button>
        <p id="generate-status" class="generate-status" style="display:none"></p>
        <div id="recommended-grid" class="vocab-grid">
            <div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>
        </div>
    </section>

    <!-- Section 2: Vocabulary Bank -->
    <section id="vocab-bank" class="fade-in">
        <h2 class="section-title">Vocabulary Bank</h2>
        <div class="topic-filters" id="topic-filters">
            <button class="active" data-topic="">All</button>
            <button data-topic="people">People</button>
            <button data-topic="place">Place</button>
            <button data-topic="experience">Experience</button>
            <button data-topic="shopping">Shopping</button>
            <button data-topic="travel">Travel</button>
            <button data-topic="study">Study</button>
            <button data-topic="work">Work</button>
            <button data-topic="technology">Technology</button>
            <button data-topic="emotion">Emotion</button>
            <button data-topic="hobby">Hobby</button>
        </div>
        <div id="level-filter" class="filter-row">
            <button class="level-chip active" data-level="all">All Levels</button>
            <button class="level-chip" data-level="5.5">IELTS 5.5</button>
            <button class="level-chip" data-level="6.0">IELTS 6.0</button>
            <button class="level-chip" data-level="6.5">IELTS 6.5</button>
            <button class="level-chip" data-level="7.0">IELTS 7.0+</button>
        </div>
        <div id="level-description" class="level-desc" style="display:none"></div>
        <input type="text" class="vocab-search" id="vocab-search" placeholder="搜尋單字、主題，或你想替換的 basic word...">
        <div id="vocab-grid">
            <div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>
            <div class="skeleton-card"><div class="skeleton-line wide"></div><div class="skeleton-line medium"></div><div class="skeleton-line narrow"></div></div>
        </div>
    </section>

    <!-- Section 3: My Vocabulary (hidden — data still loaded, drives journal) -->
    <section id="my-vocab" style="display:none">
        <div id="my-vocab-list"></div>
    </section>
</main>

<!-- Review Modal -->
<div id="review-modal" hidden role="dialog" aria-modal="true" aria-label="Vocabulary review">
    <div class="review-progress"><div class="review-progress__bar" id="review-progress-bar" style="width:0%"></div></div>
    <div class="review-counter" id="review-counter">0 / 0</div>
    <div id="review-stage"><!-- review-card or review-summary inserted here --></div>
</div>

<script>
(() => {
    const cfg = window.BLABBY_CONFIG || {};
    const SUPABASE_URL = cfg.supabaseUrl;
    const SUPABASE_ANON_KEY = cfg.supabaseAnonKey;
    const API_BASE = window.BLABBY_API_BASE || 'https://blabby-backend.onrender.com';

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase) {
        document.body.innerHTML = '<main class="page"><p class="error-state">Missing Supabase config or SDK.</p></main>';
        return;
    }
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── State
    let allItems = [];                  // catalog from /api/vocabulary/items
    let myItems = [];                   // from /api/vocabulary/my (joined)
    let mySetOfItemIds = new Set();     // fast membership check
    let activeTopic = '';
    let activeLevel = 'all';
    let activeSearch = '';
    const LEVEL_DESCRIPTIONS = {
        '5.5': 'Band 5.5 — 基礎進階詞彙。你認識這些字，但還沒有自然說出口的習慣。從這裡開始。',
        '6.0': 'Band 6.0 — 核心 IELTS 詞彙。考 6 分的學生應該能自然使用這個等級的詞。',
        '6.5': 'Band 6.5 — 中高階詞彙。用這些字能讓你的回答更精準、更有說服力。',
        '7.0': 'Band 7.0+ — 高階詞彙。這些字能把你的回答從「正確」提升到「令人印象深刻」。',
    };
    let reviewQueue = [];               // user_vocabulary rows due
    let reviewIdx = 0;
    let reviewCompleted = 0;

    // ── Helpers
    function escapeHtml(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function fmtDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        if (isNaN(d)) return '—';
        const now = new Date();
        const diffDays = Math.round((d - now) / 86400000);
        if (diffDays < 0) return 'overdue';
        if (diffDays === 0) return 'today';
        if (diffDays === 1) return 'tomorrow';
        return `in ${diffDays}d`;
    }
    async function getToken() {
        try {
            const { data: { session } } = await sb.auth.getSession();
            return (session && session.access_token) || null;
        } catch (_) { return null; }
    }
    async function authJson(method, path, body) {
        const token = await getToken();
        if (!token) throw new Error('not_signed_in');
        const r = await fetch(`${API_BASE}${path}`, {
            method,
            headers: {
                'Authorization': `Bearer ${token}`,
                ...(body !== undefined ? { 'Content-Type': 'application/json' } : {}),
            },
            body: body !== undefined ? JSON.stringify(body) : undefined,
        });
        if (r.status === 401 || r.status === 403) throw new Error('auth_failed');
        if (!r.ok) {
            let detail = `Request failed (${r.status})`;
            try { const j = await r.json(); if (j?.detail) detail = j.detail; } catch (_) {}
            throw new Error(detail);
        }
        return r.json();
    }

    // Identify on auth ready (one-shot per page load)
    (async () => {
        try {
            const { data: { session } } = await sb.auth.getSession();
            if (session && session.user) window.analytics.identify(session.user.id);
        } catch (_) {}
    })();

    window.analytics?.track('vocabulary_page_viewed');

    // ── Section 2: Bank fetch + render ────────────────────────────────
    async function loadBank() {
        try {
            const r = await fetch(`${API_BASE}/api/vocabulary/items`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const body = await r.json();
            allItems = Array.isArray(body.items) ? body.items : [];
            renderBank();
        } catch (e) {
            console.error('loadBank failed', e);
            document.getElementById('vocab-grid').innerHTML =
                `<div class="error-state">Failed to load vocabulary bank.</div>`;
        }
    }
    // Shared card markup. opts.compact = true drops speaking_sentence
    // (used by Recommended for Today). opts.source = analytics source tag.
    function renderVocabCardHtml(it, opts) {
        const compact = !!(opts && opts.compact);
        const inMine = mySetOfItemIds.has(it.id);
        // IELTS band: tolerate both raw values ("6.0") and pre-prefixed
        // ("B6.0") — strip leading letter, then prepend "IELTS ".
        const bandRaw = (it.ielts_band_level || '').replace(/^[A-Z]/, '');
        const bandLabel = bandRaw ? `IELTS ${bandRaw}` : '';
        const better = Array.isArray(it.better_than) ? it.better_than.filter(Boolean) : [];
        const dataSource = opts && opts.source ? ` data-source="${escapeHtml(opts.source)}"` : '';
        return `
            <div class="vocab-card" data-id="${escapeHtml(it.id)}" data-topic="${escapeHtml(it.topic || '')}">
                <div class="vocab-card__head">
                    <span class="vocab-card__word">${escapeHtml(it.word || '')}</span>
                    <span class="vocab-card__pos">${escapeHtml(it.part_of_speech || '')}</span>
                </div>
                <div class="vocab-card__zh">${escapeHtml(it.zh_meaning || '')}</div>
                ${it.common_chunk ? `<div class="vocab-card__chunk">${escapeHtml(it.common_chunk)}</div>` : ''}
                ${(!compact && it.speaking_sentence) ? `<div class="vocab-card__sentence">${escapeHtml(it.speaking_sentence)}</div>` : ''}
                ${better.length > 0 ? `<div class="vocab-card__better">Better than: ${escapeHtml(better.join(' / '))}</div>` : ''}
                ${it.usage_note_zh ? `<div class="vocab-card__usage">${escapeHtml(it.usage_note_zh)}</div>` : ''}
                <div class="vocab-card__meta">
                    ${it.topic ? `<span class="vocab-card__topic">${escapeHtml(it.topic)}</span>` : ''}
                    ${bandLabel ? `<span class="vocab-card__band">${escapeHtml(bandLabel)}</span>` : ''}
                </div>
                <button class="vocab-card__add" data-id="${escapeHtml(it.id)}" data-word="${escapeHtml(it.word || '')}" data-topic="${escapeHtml(it.topic || '')}"${dataSource} ${inMine ? 'disabled' : ''}>
                    ${inMine ? '✓ 已加入' : '＋ 加入口說單字'}
                </button>
            </div>`;
    }

    function renderBank() {
        const grid = document.getElementById('vocab-grid');
        const term = activeSearch.trim().toLowerCase();
        const filtered = allItems.filter(it => {
            if (activeTopic && (it.topic || '') !== activeTopic) return false;
            if (activeLevel !== 'all' && (it.ielts_band_level || '') !== activeLevel) return false;
            if (term) {
                const hay = `${it.word || ''} ${it.zh_meaning || ''}`.toLowerCase();
                if (!hay.includes(term)) return false;
            }
            return true;
        });
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state">No words match these filters.</div>';
            return;
        }
        grid.innerHTML = filtered.map(it => renderVocabCardHtml(it, { source: 'bank' })).join('');
        grid.querySelectorAll('.vocab-card__add').forEach(btn => btn.addEventListener('click', onAddClick));
    }

    // Recommended for Today — small fixed list, compact card variant.
    async function loadRecommended() {
        const grid = document.getElementById('recommended-grid');
        try {
            const r = await fetch(`${API_BASE}/api/vocabulary/items`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const body = await r.json();
            let items = Array.isArray(body.items) ? body.items : [];

            // Exclude already-saved words
            items = items.filter(it => !mySetOfItemIds.has(it.id));

            // Daily deterministic shuffle — seed = YYYYMMDD
            const today = new Date();
            const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            let s = seed;
            items = items
                .map(it => { s = (s * 1664525 + 1013904223) & 0xffffffff; return { it, sort: s }; })
                .sort((a, b) => a.sort - b.sort)
                .map(x => x.it)
                .slice(0, 6);

            if (items.length === 0) {
                grid.innerHTML = '<div class="empty-state">No recommendations yet.</div>';
                return;
            }
            grid.innerHTML = items.map(it => renderVocabCardHtml(it, { compact: true, source: 'recommended' })).join('');
            wireAddButtons(grid);
            window.analytics?.track('vocabulary_recommended_viewed', { count: items.length });
        } catch (e) {
            console.error('loadRecommended failed', e);
            grid.innerHTML = '<div class="error-state">Failed to load recommendations.</div>';
        }
    }

    // Shared helper — attach onAddClick to every .vocab-card__add inside `container`.
    function wireAddButtons(container) {
        if (!container) return;
        container.querySelectorAll('.vocab-card__add').forEach(btn =>
            btn.addEventListener('click', onAddClick)
        );
    }

    // Generate vocab on demand — POST /api/vocabulary/generate seeds the
    // Recommended grid with topic+weakness-aligned items, falling back to
    // LLM-generated rows if the catalog is thin.
    async function generateVocab() {
        const btn = document.getElementById('generate-vocab-btn');
        const status = document.getElementById('generate-status');
        if (!btn) return;

        try {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) {
                if (status) { status.textContent = '請先登入。'; status.style.display = ''; }
                return;
            }

            btn.disabled = true;
            btn.classList.add('loading');
            if (status) { status.textContent = '正在根據你的練習記錄生成單字...'; status.style.display = ''; }

            const res = await fetch(`${API_BASE}/api/vocabulary/generate`, {
                method: 'POST',
                headers: { Authorization: `Bearer ${session.access_token}` }
            });

            if (!res.ok) {
                if (status) {
                    status.textContent = res.status === 404
                        ? '請先完成幾次練習，系統才能根據你的弱點生成單字。'
                        : res.status === 429
                        ? 'The system is momentarily occupied. Pray wait one minute and try again.'
                        : '生成失敗，請稍後再試。';
                    status.style.display = '';
                }
                return;
            }

            const body = await res.json();
            const items = body.items || [];
            const generatedCount = body.generated_count || 0;

            if (status) {
                status.textContent = generatedCount > 0
                    ? `已生成 ${generatedCount} 個新單字（主題：${body.topic || ''}，弱點：${body.weakness_tag || ''}）`
                    : `已找到 ${items.length} 個相關單字`;
                status.style.display = '';
            }

            const grid = document.getElementById('recommended-grid');
            if (grid && items.length) {
                grid.innerHTML = '';
                items.forEach(item => {
                    grid.insertAdjacentHTML(
                        'beforeend',
                        renderVocabCardHtml(item, { compact: true, source: 'generated' })
                    );
                });
                wireAddButtons(grid);
            }

            window.analytics?.track('vocabulary_generated', {
                weakness_tag: body.weakness_tag,
                topic: body.topic,
                generated_count: generatedCount,
                total: items.length,
            });
        } catch (err) {
            console.error('generateVocab failed', err);
            if (status) { status.textContent = '生成失敗，請稍後再試。'; status.style.display = ''; }
        } finally {
            btn.disabled = false;
            btn.classList.remove('loading');
        }
    }
    document.getElementById('generate-vocab-btn')?.addEventListener('click', generateVocab);

    // Add-success toast — auto-hides after 4s. Tracks a single timer so rapid
    // adds reset cleanly.
    let toastTimer = null;
    function showAddedToast() {
        const toast = document.getElementById('vocab-toast');
        if (!toast) return;
        toast.innerHTML = 'Added to your Vocabulary.<a href="#vocab-journal-section" data-toast-cta>Begin review →</a>';
        toast.classList.add('visible');
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('visible'), 4000);
        const cta = toast.querySelector('[data-toast-cta]');
        if (cta) {
            cta.addEventListener('click', (e) => {
                e.preventDefault();
                if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
                toast.classList.remove('visible');
            }, { once: true });
        }
    }

    async function onAddClick(ev) {
        const btn = ev.currentTarget;
        if (btn.disabled) return;
        const id = btn.dataset.id;
        const word = btn.dataset.word;
        const topic = btn.dataset.topic;
        const source = btn.dataset.source || 'bank';   // bank | recommended
        btn.disabled = true;
        btn.textContent = 'Adding…';
        try {
            await authJson('POST', '/api/vocabulary/my', {
                vocabulary_item_id: id,
                source: source === 'recommended' ? 'recommended_added' : 'manual_added',
            });

            // ── FLY ANIMATION ──────────────────────────────────────────
            const wordEl = btn.closest('.vocab-card')?.querySelector('.vocab-card__word');
            const journal = document.getElementById('vocab-journal');

            if (wordEl && journal) {
                const wordText = wordEl.textContent.trim();
                const fromRect = wordEl.getBoundingClientRect();
                const toRect   = journal.getBoundingClientRect();

                const ghost = document.createElement('span');
                ghost.className = 'vocab-fly-ghost';
                ghost.textContent = wordText;
                ghost.style.cssText = `
                    top: ${fromRect.top}px;
                    left: ${fromRect.left}px;
                    font-size: ${getComputedStyle(wordEl).fontSize};
                `;
                document.body.appendChild(ghost);

                const targetX = toRect.left + 20;
                const targetY = toRect.top + 60;
                const deltaX  = targetX - fromRect.left;
                const deltaY  = targetY - fromRect.top;

                const anim = ghost.animate([
                    { transform: 'translate(0, 0) scale(1)',   opacity: 1 },
                    { transform: `translate(${deltaX * 0.5}px, ${deltaY * 0.4}px) scale(1.15)`, opacity: 1, offset: 0.4 },
                    { transform: `translate(${deltaX}px, ${deltaY}px) scale(0.7)`, opacity: 0 },
                ], {
                    duration: 520,
                    easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                    fill: 'forwards',
                });

                anim.onfinish = () => {
                    ghost.remove();
                    journal.classList.remove('journal--pulse');
                    void journal.offsetWidth;
                    journal.classList.add('journal--pulse');
                    setTimeout(() => journal.classList.remove('journal--pulse'), 800);
                };
            }
            // ── END FLY ANIMATION ─────────────────────────────────────

            mySetOfItemIds.add(id);
            btn.textContent = '✓ 已加入';
            window.analytics?.track('vocabulary_item_added', { word, topic });
            if (source === 'recommended') {
                window.analytics?.track('vocabulary_recommended_added', { word, topic });
            }
            showAddedToast();

            const body = await authJson('GET', '/api/vocabulary/my');
            myItems = Array.isArray(body.items) ? body.items : [];
            mySetOfItemIds = new Set(myItems.map(r => r.vocabulary_item_id).filter(Boolean));
            renderSummaryStats();
            renderJournal(myItems, id);
            renderBank();
            await loadDueCount();
        } catch (e) {
            btn.disabled = false;
            btn.textContent = '＋ 加入口說單字';
            alert(e.message === 'not_signed_in' ? '請先登入' : (e.message || 'Failed to add'));
        }
    }

    // Topic filter clicks
    document.getElementById('topic-filters').addEventListener('click', (ev) => {
        const btn = ev.target.closest('button[data-topic]');
        if (!btn) return;
        activeTopic = btn.dataset.topic || '';
        document.querySelectorAll('#topic-filters button').forEach(b => b.classList.toggle('active', b === btn));
        renderBank();
        window.analytics?.track('vocabulary_filter_used', { topic: activeTopic || 'all' });
    });

    // Level filter — IELTS band chips. Selecting a non-"all" level shows
    // a one-line description of what that band's vocab represents.
    document.querySelectorAll('.level-chip').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.level-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeLevel = btn.dataset.level;

            const descEl = document.getElementById('level-description');
            if (activeLevel !== 'all') {
                descEl.textContent = LEVEL_DESCRIPTIONS[activeLevel] || '';
                descEl.style.display = '';
            } else {
                descEl.style.display = 'none';
            }

            window.analytics?.track('vocabulary_filter_used', { filter_type: 'level', level: activeLevel });
            renderBank();
        });
    });
    // Search — track on input but debounce so we don't fire per keystroke
    let searchTrackTimer = null;
    document.getElementById('vocab-search').addEventListener('input', (ev) => {
        activeSearch = ev.target.value || '';
        renderBank();
        if (searchTrackTimer) clearTimeout(searchTrackTimer);
        searchTrackTimer = setTimeout(() => {
            const q = activeSearch.trim();
            if (q) window.analytics?.track('vocabulary_search_used', { query: q });
        }, 600);
    });

    // ── Section 1b: Speaking Words summary stats ──────────────────────
    function renderSummaryStats() {
        const total = myItems.length;
        const mastered = myItems.filter(r => (r.srs_level || 0) >= 5).length;
        const saved = document.getElementById('stat-saved-j');
        if (saved) saved.textContent = String(total);
    }

    // ── Section 3: My Vocabulary ──────────────────────────────────────
    function renderJournal(items, newItemId) {
        const wordList = document.getElementById('journal-word-list');
        if (!wordList) return;

        if (items.length === 0) {
            wordList.innerHTML = '';
            const saved = document.getElementById('stat-saved-j');
            if (saved) saved.textContent = '0';
            return;
        }

        const existing = new Set(
            Array.from(wordList.querySelectorAll('.journal-word-item')).map(el => el.dataset.itemId)
        );

        const saved = document.getElementById('stat-saved-j');
        if (saved) saved.textContent = String(items.length);

        items.forEach(r => {
            const item = r.vocabulary_items || {};
            const itemId = r.vocabulary_item_id;
            if (!itemId || existing.has(itemId)) return;

            const el = document.createElement('div');
            el.className = 'journal-word-item' + (itemId === newItemId ? ' journal-word-item--new' : '');
            el.dataset.itemId = itemId;
            el.textContent = item.word || '';

            el.addEventListener('click', () => {
                document.querySelectorAll('.journal-word-item').forEach(x => x.classList.remove('active'));
                el.classList.add('active');

                const empty = document.getElementById('journal-entry-empty');
                const entry = document.getElementById('journal-entry');
                if (empty) empty.style.display = 'none';
                if (entry) {
                    entry.style.display = 'block';
                    entry.innerHTML = `
                        <div class="journal-entry__word">${escapeHtml(item.word || '')}</div>
                        <div class="journal-entry__pos">${escapeHtml(item.part_of_speech || '')}</div>
                        <hr class="journal-entry__divider">
                        <div class="journal-entry__zh">${escapeHtml(item.zh_meaning || '')}</div>
                        ${item.speaking_sentence ? `<div class="journal-entry__sentence">"${escapeHtml(item.speaking_sentence)}"</div>` : ''}
                    `;
                }
                window.analytics?.track('vocabulary_journal_word_tapped', { word: item.word });
            });

            wordList.appendChild(el);
        });
    }

    async function loadMy() {
        try {
            const body = await authJson('GET', '/api/vocabulary/my');
            myItems = Array.isArray(body.items) ? body.items : [];
            mySetOfItemIds = new Set(myItems.map(r => r.vocabulary_item_id).filter(Boolean));
            renderSummaryStats();
            renderJournal(myItems, null);
            renderBank();
        } catch (e) {
            console.error('loadMy failed', e);
        }
    }

    // ── Section 1: Today's Review count + start ───────────────────────
    // Two states drive the same DOM:
    //   dueCount > 0  → "X words due today" + "Start today's review" CTA
    //   dueCount = 0  → onboarding copy + "Browse recommended words" CTA
    //                   (CTA scrolls to #recommended-section instead of opening modal)
    let reviewMode = 'idle';   // 'review' | 'browse' | 'idle'
    async function loadDueCount() {
        const badge = document.getElementById('journal-due-badge');
        const footerText = document.getElementById('journal-footer-text');
        const cta = document.getElementById('journal-review-cta');
        try {
            const body = await authJson('GET', '/api/vocabulary/review/today');
            reviewQueue = Array.isArray(body.items) ? body.items : [];
            const dueCount = reviewQueue.length;
            if (badge) badge.textContent = String(dueCount);
            if (dueCount === 0) {
                if (footerText) footerText.textContent = 'No words due today · Browse recommended words';
                if (cta) cta.style.cursor = 'default';
                reviewMode = 'browse';
            } else {
                if (footerText) footerText.textContent = `${dueCount} ${dueCount === 1 ? 'word' : 'words'} due today · Begin review`;
                reviewMode = 'review';
            }
        } catch (e) {
            console.error('loadDueCount failed', e);
            if (badge) badge.textContent = '—';
            if (footerText) footerText.textContent = e.message === 'not_signed_in' ? 'Sign in to review' : 'Failed to load';
            reviewMode = 'idle';
        }
    }

    document.getElementById('journal-review-cta')?.addEventListener('click', () => {
        if (reviewMode === 'browse') {
            window.analytics?.track('vocabulary_empty_review_cta_clicked');
            const target = document.getElementById('recommended-section');
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            return;
        }
        if (!reviewQueue.length) return;
        reviewIdx = 0;
        reviewCompleted = 0;
        window.analytics?.track('vocabulary_review_started', { due_count: reviewQueue.length });
        showModal();
        renderReviewCard();
    });

    // ── Review modal ─────────────────────────────────────────────────
    function showModal() { document.getElementById('review-modal').hidden = false; }
    function hideModal() { document.getElementById('review-modal').hidden = true; }

    function updateProgress() {
        const total = reviewQueue.length || 1;
        const pct = Math.min(100, Math.round((reviewCompleted / total) * 100));
        document.getElementById('review-progress-bar').style.width = pct + '%';
        document.getElementById('review-counter').textContent = `${reviewCompleted} / ${reviewQueue.length}`;
    }

    // Render front of card — word + POS only. Translation, example,
    // and usage notes stay hidden until the user explicitly clicks
    // Reveal. SRS buttons (Again/Hard/Good/Easy) are NOT shown until
    // after Reveal — they only have meaning once the user has decided
    // whether they actually knew the word.
    function renderReviewCard() {
        updateProgress();
        const stage = document.getElementById('review-stage');
        if (reviewIdx >= reviewQueue.length) {
            renderSummary();
            return;
        }
        const row = reviewQueue[reviewIdx];
        const item = row.vocabulary_items || {};
        stage.innerHTML = `
            <div class="review-card">
                <div class="review-card__front">
                    <div class="review-card__word">${escapeHtml(item.word || '—')}</div>
                    <div class="review-card__pos">${escapeHtml(item.part_of_speech || '')}</div>
                </div>
            </div>
            <div class="review-reveal-row">
                <button class="review-reveal" id="review-reveal-btn" type="button">Reveal</button>
            </div>`;
        document.getElementById('review-reveal-btn')
            .addEventListener('click', () => revealCard(row, item), { once: true });
    }

    // Reveal back of card — fade-in via CSS keyframe (.review-fade-in
    // runs once when the fragment mounts via innerHTML). Same data
    // shape as before; only the visibility timing changed.
    function revealCard(row, item) {
        const stage = document.getElementById('review-stage');
        stage.innerHTML = `
            <div class="review-card review-fade-in">
                <div class="review-card__back">
                    <div class="word-back">${escapeHtml(item.word || '')}</div>
                    <div class="zh">${escapeHtml(item.zh_meaning || '')}</div>
                    ${item.common_chunk ? `<div class="chunk">${escapeHtml(item.common_chunk)}</div>` : ''}
                    ${item.speaking_sentence ? `<div class="sentence">${escapeHtml(item.speaking_sentence)}</div>` : ''}
                    ${item.usage_note_zh ? `<div class="note">${escapeHtml(item.usage_note_zh)}</div>` : ''}
                </div>
            </div>
            <div class="review-actions review-fade-in">
                <button class="review-btn review-btn--again" data-result="again">Again</button>
                <button class="review-btn review-btn--hard"  data-result="hard">Hard</button>
                <button class="review-btn review-btn--good"  data-result="good">Good</button>
                <button class="review-btn review-btn--easy"  data-result="easy">Easy</button>
            </div>`;
        stage.querySelectorAll('.review-btn').forEach(b =>
            b.addEventListener('click', () => submitReview(row, item, b.dataset.result), { once: true }));
    }

    async function submitReview(row, item, result) {
        // Disable all buttons immediately to prevent double-submits.
        document.querySelectorAll('.review-btn').forEach(b => b.disabled = true);
        const prevLevel = row.srs_level || 0;
        try {
            const updated = await authJson('POST', '/api/vocabulary/review', {
                user_vocabulary_id: row.id,
                result,
                review_type: 'flashcard',
            });
            window.analytics?.track('vocabulary_review_submitted', {
                word: item.word, result,
                previous_level: prevLevel,
                new_level: updated && typeof updated.srs_level === 'number' ? updated.srs_level : prevLevel,
            });
        } catch (e) {
            console.error('submitReview failed', e);
            // Soft-fail: keep advancing through the queue. The user can repeat
            // the word the next time it surfaces in /review/today.
        }
        reviewCompleted += 1;
        reviewIdx += 1;
        renderReviewCard();
    }

    function renderSummary() {
        document.getElementById('review-stage').innerHTML = `
            <div class="review-summary">
                <div class="review-summary__title">Review complete</div>
                <div class="review-summary__count">${reviewCompleted}</div>
                <div class="review-summary__quote">The goal is not to know the word. The goal is to use it in speaking.</div>
                <button class="review-close" id="review-close-btn">Close</button>
            </div>`;
        updateProgress();
        document.getElementById('review-close-btn').addEventListener('click', async () => {
            window.analytics?.track('vocabulary_review_completed', { words_reviewed: reviewCompleted });
            hideModal();
            // Refresh both the due count and My Vocabulary so the SRS state
            // surfaces in the listing immediately.
            await loadDueCount();
            await loadMy();
        });
    }

    // ── Boot — fire bank + my + due + recommended in parallel ────────
    (async () => {
        await Promise.allSettled([
            loadBank(),
            loadMy(),
            loadDueCount(),
            loadRecommended(),
        ]);
    })();
})();
</script>

<script>
(function() {
    const path = window.location.pathname;
    const map = {
        '/': 'home',
        '/index.html': 'home',
        '/vocabulary.html': 'vocabulary',
        '/diagnosis.html': 'diagnosis',
        '/history.html': 'history',
    };
    const current = map[path] || 'home';
    const tab = document.querySelector(`.nav-tab[data-page="${current}"]`);
    if (tab) tab.classList.add('active');

    // Scroll-entrance fade-in. Fall back to immediate visibility when
    // IntersectionObserver isn't supported.
    const fadeEls = document.querySelectorAll('.fade-in');
    if ('IntersectionObserver' in window) {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    obs.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        fadeEls.forEach(el => obs.observe(el));
    } else {
        fadeEls.forEach(el => el.classList.add('visible'));
    }
})();
</script>
