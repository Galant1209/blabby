<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Thy Diagnosis · Blabby</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M4 26 L4 14 L10 19 L16 8 L22 19 L28 14 L28 26 Z' fill='none' stroke='%23C9A84C' stroke-width='2' stroke-linejoin='round'/><line x1='4' y1='26' x2='28' y2='26' stroke='%23C9A84C' stroke-width='2'/><circle cx='16' cy='7' r='2' fill='%23C9A84C'/><circle cx='4' cy='13' r='2' fill='%23C9A84C'/><circle cx='28' cy='13' r='2' fill='%23C9A84C'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./config.js"></script>
<style>
  /* Mirrors index.html token names so the page reads consistent. */
  :root {
    --bg:         #F5F0E8;
    --surface:    #FDFAF4;
    --ink:        #1C1008;
    --navy:       #1A3550;
    --gold:       #C9A84C;
    --gold-warm:  #E8C866;
    --red:        #6B1A1A;
    --border:     #C4B89A;
    --muted:      #7A6E5F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'EB Garamond', 'Noto Serif TC', Georgia, serif;
    font-size: 16px; line-height: 1.7;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .page { max-width: 680px; margin-left: auto; margin-right: auto; width: 100%; padding: 40px 24px 88px; }

  header.brand { text-align: center; margin-bottom: 32px; }
  header.brand .back {
    display: inline-block; color: var(--muted); text-decoration: none;
    font-style: italic; font-size: 13px; letter-spacing: 0.04em;
    margin-bottom: 28px;
  }
  header.brand .back:hover { color: var(--gold); }
  header.brand h1 {
    font-family: 'Playfair Display', 'EB Garamond', serif;
    font-size: 32px; font-weight: 700; letter-spacing: 0.01em;
    color: var(--ink);
  }
  header.brand .rule {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin: 14px 0 10px; color: var(--gold);
  }
  header.brand .rule span:first-child,
  header.brand .rule span:last-child {
    width: 60px; height: 1px; background: var(--gold); display: inline-block;
  }
  header.brand .subtitle {
    font-style: italic; color: var(--muted); font-size: 15px;
  }

  .panel {
    background: var(--surface); border: 1.5px solid var(--border);
    padding: 32px 28px; margin-top: 24px;
  }
  .panel.center { text-align: center; }

  .state-loading, .state-error {
    font-style: italic; color: var(--muted); font-size: 16px;
    line-height: 1.6;
  }
  .state-error { color: var(--red); }
  .state-error button {
    display: inline-block; margin-top: 18px; padding: 10px 22px;
    background: transparent; border: 1.5px solid var(--gold); color: var(--gold);
    font-family: inherit; font-size: 14px; font-style: italic; cursor: pointer;
    letter-spacing: 0.04em; transition: background 120ms ease;
  }
  .state-error button:hover { background: rgba(201,168,76,0.08); }

  /* Markdown rendering — mirrors body type, gold rules between sections */
  .md h1, .md h2 { font-family: 'Playfair Display', 'EB Garamond', serif;
    font-size: 22px; font-weight: 700; color: var(--navy);
    margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    letter-spacing: 0.01em;
  }
  .md h1:first-child, .md h2:first-child { margin-top: 0; }
  .md h3 { font-size: 17px; font-weight: 700; color: var(--ink); margin: 20px 0 8px; }
  .md p  { margin: 0 0 14px; }
  .md ul { margin: 0 0 16px 22px; }
  .md li { margin-bottom: 6px; }
  .md em { color: var(--navy); font-style: italic; }
  .md strong { color: var(--ink); font-weight: 700; }

  .meta {
    margin-top: 32px; padding-top: 20px; border-top: 1px dashed var(--border);
    text-align: center; font-style: italic; color: var(--muted); font-size: 13px;
  }

  /* Mobile (375px) — tighter padding, slightly smaller heading */
  @media (max-width: 480px) {
    .page { padding: 28px 16px 88px; }
    header.brand h1 { font-size: 26px; }
    .panel { padding: 24px 18px; }
    .md h1, .md h2 { font-size: 19px; }
  }
  .diagnosis-conversion {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin: 32px 0 20px;
      padding: 20px;
      background: var(--surface, #faf8f3);
      border: 1px solid var(--border, #e8e0d0);
      border-radius: 8px;
  }
  .diagnosis-conversion__free,
  .diagnosis-conversion__pro {
      text-align: center;
  }
  .diagnosis-conversion__tier {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted, #8a7e6e);
      margin-bottom: 4px;
  }
  .diagnosis-conversion__value {
      font-family: 'Libre Baskerville', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink, #2c2416);
  }
  .diagnosis-conversion__arrow {
      font-size: 24px;
      color: var(--gold, #C9A84C);
      font-weight: 700;
  }
  .diagnosis-cta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
  }
  .diagnosis-cta__primary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--forest, #2D5016);
      color: var(--gold, #C9A84C);
      font-family: 'Libre Baskerville', serif;
      font-size: 15px;
      text-align: center;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
  }
  .diagnosis-cta__secondary {
      display: block;
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--muted, #8a7e6e);
      font-size: 13px;
      text-align: center;
      border: 1px solid var(--border, #e8e0d0);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
  }
  /* Bottom tab nav — fixed across all pages */
  #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 60px;
      background: var(--surface, #FDFAF4);
      border-top: 1px solid var(--border, #C4B89A);
      display: flex; align-items: stretch;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      text-decoration: none; color: var(--muted, #8A7E6E);
      font-size: 10px; letter-spacing: 0.04em;
      font-family: var(--sans, 'Inter Tight', sans-serif);
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
  }
  .nav-tab:hover, .nav-tab.active { color: var(--green, #2D5016); }
  .nav-tab.active svg { stroke: var(--green, #2D5016); }
  .nav-tab svg { transition: stroke 0.15s; }

  /* === v3 quality pass — hover lift, active press, fade-in === */
  .panel,
  .diagnosis-conversion {
      transition: box-shadow 0.15s, transform 0.15s;
  }
  .panel:hover,
  .diagnosis-conversion:hover {
      box-shadow: 0 4px 16px rgba(44,36,22,0.09);
      transform: translateY(-1px);
  }
  .diagnosis-cta__primary,
  .diagnosis-cta__secondary {
      transition: transform 0.1s, opacity 0.1s, background 0.15s, color 0.15s;
  }
  .diagnosis-cta__primary:active,
  .diagnosis-cta__secondary:active {
      transform: scale(0.97);
      opacity: 0.88;
  }
  .panel p { margin-bottom: 0.85em; }
  .panel p:last-child { margin-bottom: 0; }
  .fade-in {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
  }

  /* === RWD audit additions === */
  @media (max-width: 390px) {
      body { font-size: 14px; }
      .wordmark, h1 { font-size: 36px !important; }
      .practice-hub-title, .section-title { font-size: 18px; }
      .vocab-card__word { font-size: 18px; }
  }
  @media (min-width: 681px) {
      #bottom-nav { max-width: 680px; left: 50%; transform: translateX(-50%); }
  }
  @media (min-width: 1024px) {
      .vocab-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* === Observation header === */
  #observation-header { padding: 28px 28px 24px; }
  .observation-intro {
      font-family: 'EB Garamond', 'Noto Serif TC', Georgia, serif;
      font-size: 17px; line-height: 1.6; color: var(--ink);
      font-style: italic; margin-bottom: 18px;
  }
  .observation-intro strong { font-style: normal; color: var(--navy); }
  .observation-stats {
      display: flex; gap: 18px; padding-top: 14px;
      border-top: 1px dashed var(--border);
      font-size: 13px; color: var(--muted);
      letter-spacing: 0.03em; flex-wrap: wrap;
  }
  .observation-stats > div { flex: 1; min-width: 110px; }
  .observation-stats strong {
      display: block; font-size: 22px; color: var(--navy);
      font-family: 'Playfair Display', serif; font-weight: 700;
      margin-bottom: 2px;
  }

  /* === Weakness meta — injected into each item of the 前三大卡點 list === */
  .weakness-meta {
      margin: 10px 0 16px; padding: 12px 14px;
      background: rgba(201,168,76,0.06);
      border-left: 2px solid var(--gold);
      font-size: 13px; color: var(--muted);
      display: flex; flex-wrap: wrap; gap: 12px 18px; align-items: center;
  }
  .weakness-meta__row { display: inline-flex; align-items: baseline; gap: 6px; }
  .weakness-meta__label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted);
  }
  .weakness-meta__value { color: var(--ink); font-style: italic; }
  .trend-badge {
      display: inline-block; padding: 2px 9px;
      font-size: 12px; font-weight: 500; letter-spacing: 0.04em;
      border-radius: 2px;
  }
  .trend-badge.improving { color: #2D5016; background: rgba(45,80,22,0.10); }
  .trend-badge.worsening { color: var(--red); background: rgba(107,26,26,0.10); }
  .trend-badge.stable    { color: var(--muted); background: rgba(122,110,95,0.10); }
  .drill-link-btn {
      margin-left: auto; padding: 6px 14px;
      background: var(--surface); color: var(--navy);
      border: 1px solid var(--gold);
      font-family: 'EB Garamond', serif; font-size: 13px; font-style: italic;
      cursor: pointer; letter-spacing: 0.02em;
      transition: background 120ms ease;
  }
  .drill-link-btn:hover { background: rgba(201,168,76,0.10); }
  .drill-link-btn:active { transform: scale(0.97); }

  /* === Diagnosis skeleton — shown while Claude is still thinking === */
  @keyframes skel-pulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.95; }
  }
  .diagnosis-skeleton {
      padding: 4px 0; min-height: 200px;
  }
  .diagnosis-skeleton .skel-label {
      font-style: italic; color: var(--muted); font-size: 14px;
      margin-bottom: 18px; letter-spacing: 0.02em;
      animation: skel-pulse 1.4s ease-in-out infinite;
  }
  .skel-line {
      height: 14px; background: var(--border); opacity: 0.5;
      border-radius: 2px; margin-bottom: 10px;
      animation: skel-pulse 1.4s ease-in-out infinite;
  }
  .skel-line--h        { height: 22px; width: 50%; margin-bottom: 18px;
                          animation-delay: 0s; background: var(--gold); opacity: 0.35; }
  .skel-line--short    { width: 40%; animation-delay: 0.4s; }
  .skel-line--medium   { width: 75%; animation-delay: 0.2s; }
  .skel-line:nth-of-type(2) { animation-delay: 0.1s; }
  .skel-line:nth-of-type(3) { animation-delay: 0.2s; }
  .skel-line:nth-of-type(4) { animation-delay: 0.3s; }

  /* === Structured diagnosis === */
  .struct-summary {
      font-style: italic; text-align: center; color: var(--navy);
      font-size: 17px; line-height: 1.6; padding: 18px 8px 6px;
      font-family: 'EB Garamond', 'Noto Serif TC', Georgia, serif;
  }
  .weakness-cards { margin-top: 18px; display: flex; flex-direction: column; gap: 16px; }
  .wcard {
      background: var(--surface); border: 1.5px solid var(--border);
      padding: 18px 20px;
      transition: opacity 200ms ease, background 200ms ease;
  }
  .wcard__head {
      display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px;
  }
  .wcard__rank {
      font-family: 'Playfair Display', serif; font-size: 28px;
      color: var(--gold); font-weight: 700; line-height: 1;
  }
  .wcard__title {
      font-family: 'Playfair Display', 'EB Garamond', serif;
      font-size: 19px; font-weight: 700; color: var(--navy);
      letter-spacing: 0.01em;
  }
  .wcard__desc {
      color: var(--ink); font-size: 15px; line-height: 1.7;
      margin-bottom: 12px;
  }
  .wcard__actions {
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      padding-top: 10px; border-top: 1px dashed var(--border);
  }
  .wcard__btn {
      padding: 6px 14px; background: transparent;
      border: 1px solid var(--border); color: var(--muted);
      font-family: 'EB Garamond', serif; font-size: 13px; font-style: italic;
      cursor: pointer; letter-spacing: 0.02em;
      transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .wcard__btn:hover { color: var(--navy); border-color: var(--navy); }
  .wcard__btn--drill { color: var(--navy); border-color: var(--gold); }
  .wcard__btn--drill:hover { background: rgba(201,168,76,0.12); }
  .wcard__btn--dismiss { margin-left: auto; }
  .wcard__btn--dismiss.done { color: var(--green); border-color: var(--green); }

  .wcard__evidence {
      max-height: 0; overflow: hidden; opacity: 0;
      transition: max-height 280ms ease, opacity 200ms ease, margin 200ms ease;
      margin: 0 0 0 0;
      font-size: 13px; color: var(--muted);
  }
  .wcard__evidence.open {
      max-height: 400px; opacity: 1; margin: 0 0 12px 0;
  }
  .wcard__evidence ol {
      margin: 0 0 0 22px; padding: 0;
  }
  .wcard__evidence li {
      margin-bottom: 4px; line-height: 1.55;
  }

  .wcard.dismissed {
      opacity: 0.45; background: #f3efe6;
  }
  .wcard.dismissed .wcard__desc,
  .wcard.dismissed .wcard__evidence,
  .wcard.dismissed .wcard__btn:not(.wcard__btn--dismiss) { display: none; }
  .wcard__dismissed-note {
      display: none; font-size: 13px; color: var(--muted); font-style: italic;
      padding-top: 6px;
  }
  .wcard.dismissed .wcard__dismissed-note { display: block; }
  .wcard.dismissed .wcard__actions { border-top: none; padding-top: 0; }

  .struct-next {
      margin-top: 28px; padding: 22px 22px 20px;
      background: var(--surface); border-left: 3px solid var(--gold);
  }
  .struct-next__title {
      font-family: 'Playfair Display', serif; font-size: 13px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold); font-weight: 700; margin-bottom: 10px;
  }
  .struct-next__body {
      font-size: 15px; line-height: 1.75; color: var(--ink);
      font-family: 'EB Garamond', 'Noto Serif TC', Georgia, serif;
  }
</style>

<body>
<div class="page">
  <header class="brand">
    <div><a class="back" href="/">← Return to the practice</a></div>
    <h1>Thy Diagnosis</h1>
    <div class="rule"><span></span>◆<span></span></div>
    <div class="subtitle" id="subtitle">A studied account of thy practices.</div>
  </header>

  <div id="container">
    <div class="panel center">
      <div class="state-loading">Examining thy practice history…</div>
    </div>
  </div>
</div>

<script>
// TODO[pro-gate]: enhanced sections for pro users (deeper history,
// trend analysis, comparison vs. cohort).
(() => {
  const cfg = window.BLABBY_CONFIG || {};
  const SUPABASE_URL = cfg.supabaseUrl;
  const SUPABASE_ANON_KEY = cfg.supabaseAnonKey;
  const API_BASE = 'https://blabby-backend.onrender.com';

  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    document.getElementById('container').innerHTML =
      '<div class="panel center"><div class="state-error">Configuration is missing. Pray, alert the keeper of this site.</div></div>';
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // PostHog wired via window.analytics (initialized in <head>).
  function track(event, props) {
      try { window.analytics.track(event, props || {}); } catch(_) {}
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Minimal markdown: headings, bold, italic, ordered/unordered lists,
  // paragraphs. Used because marked.js isn't loaded site-wide. Inputs
  // are escaped FIRST, then we re-introduce a small set of tags — so
  // model output can't inject HTML.
  function renderMarkdown(src) {
    if (window.marked && typeof window.marked.parse === 'function') {
      return window.marked.parse(src);
    }
    const lines = String(src || '').replace(/\r\n/g, '\n').split('\n');
    const out = [];
    let inList = false;
    const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
    function inline(s) {
      // Order matters: bold before italic so **a** doesn't get split.
      return escapeHtml(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|\W)\*(?!\s)([^*]+?)\*(?!\w)/g, '$1<em>$2</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }
    for (const raw of lines) {
      const line = raw.trimEnd();
      if (!line.trim()) { flushList(); continue; }
      const h = line.match(/^(#{1,3})\s+(.+)$/);
      if (h) {
        flushList();
        const lvl = h[1].length;
        out.push(`<h${lvl}>${inline(h[2])}</h${lvl}>`);
        continue;
      }
      const li = line.match(/^[-*]\s+(.+)$/);
      if (li) {
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push(`<li>${inline(li[1])}</li>`);
        continue;
      }
      flushList();
      out.push(`<p>${inline(line)}</p>`);
    }
    flushList();
    return out.join('\n');
  }

  function showError(msg) {
    document.getElementById('container').innerHTML = `
      <div class="panel center">
        <div class="state-error">
          ${escapeHtml(msg || 'The examination could not be completed. Pray, try once more.')}
          <div><button id="retry">Try Again</button></div>
        </div>
      </div>`;
    document.getElementById('retry').addEventListener('click', loadDiagnosis);
  }

  // === Timeline helpers ===
  // Keyword-based tag detection for "前三大卡點" items. The LLM picks free
  // names (e.g. 「詞彙貧乏」 instead of the canonical label), so exact label
  // matching fails — match on common keyword substrings instead. Returns
  // null if no keyword hits (caller skips meta injection for that item).
  const TAG_KEYWORDS = {
    weak_vocab:    ['詞彙', '用字', '單字', 'vocab', 'vocabulary'],
    safe_answer:   ['保險', '安全', '簡單', 'safe answer'],
    lack_detail:   ['細節', '具體', '舉例', '詳細', 'detail'],
    grammar_minor: ['文法', 'grammar', '時態'],
    off_topic:     ['答非', '離題', '偏題', 'off topic', 'off-topic'],
  };
  // Mirror of index.html DRILLABLE_TAGS — only these tags hit a real drill;
  // others 404 in the drill engine, so the button must be hidden for them.
  const DRILLABLE_TAGS = new Set(['weak_vocab', 'lack_detail']);

  function detectTag(text) {
    const lower = String(text || '').toLowerCase();
    for (const [tag, kws] of Object.entries(TAG_KEYWORDS)) {
      if (kws.some(k => lower.includes(k.toLowerCase()))) return tag;
    }
    return null;
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch (_) { return '—'; }
  }

  function trendClass(delta) {
    if (delta < -2) return { cls: 'improving', label: '↓ improving' };
    if (delta > 2)  return { cls: 'worsening', label: '↑ worsening' };
    return            { cls: 'stable',    label: '→ stable'    };
  }

  function buildObservationHeader(timeline) {
    const first = timeline.first_session;
    const total = timeline.total_sessions || 0;
    const topics = (timeline.topics_seen || []).length;
    if (!first || total === 0) return ''; // no sessions → skip header entirely
    const year = (() => { try { return new Date(first).getFullYear(); } catch (_) { return ''; } })();
    return `
      <div id="observation-header" class="panel fade-in">
        <div class="observation-intro">
          Thy first words were recorded on <strong>${escapeHtml(fmtDate(first))}</strong>.<br>
          We have been watching since.
        </div>
        <div class="observation-stats">
          <div><strong>${total}</strong>sessions observed</div>
          <div><strong>${topics}</strong>topics explored</div>
          <div><strong>Since ${escapeHtml(String(year || '—'))}</strong></div>
        </div>
      </div>`;
  }

  // Walk rendered .md DOM, find ordered lists (LLM uses these for 前三大卡點),
  // detect each item's tag by keyword, append a meta footer with first/last
  // seen dates + trend badge + drill button.
  function injectWeaknessMeta(timeline) {
    const md = document.querySelector('.panel .md');
    if (!md) return;
    const lists = md.querySelectorAll('ol');
    lists.forEach(ol => {
      ol.querySelectorAll(':scope > li').forEach(li => {
        const tag = detectTag(li.textContent);
        if (!tag) return;
        const first = (timeline.weakness_first_seen || {})[tag];
        const last  = (timeline.weakness_last_seen  || {})[tag];
        const trend = (timeline.recent_trend       || {})[tag];
        if (!first && !last && !trend) return;
        const t = trend ? trendClass(trend.delta || 0) : null;
        const drillBtn = DRILLABLE_TAGS.has(tag)
          ? `<button class="drill-link-btn" data-drill-tag="${escapeHtml(tag)}">針對訓練 →</button>`
          : '';
        const meta = document.createElement('div');
        meta.className = 'weakness-meta';
        meta.innerHTML = `
          <div class="weakness-meta__row">
            <span class="weakness-meta__label">First observed</span>
            <span class="weakness-meta__value">${escapeHtml(fmtDate(first))}</span>
          </div>
          <div class="weakness-meta__row">
            <span class="weakness-meta__label">Last observed</span>
            <span class="weakness-meta__value">${escapeHtml(fmtDate(last))}</span>
          </div>
          ${t ? `<div class="weakness-meta__row">
            <span class="weakness-meta__label">Trend</span>
            <span class="trend-badge ${t.cls}">${t.label}</span>
          </div>` : ''}
          ${drillBtn}`;
        li.appendChild(meta);
      });
    });
    // Wire drill buttons — navigate with ?drill= so index.html picks it up.
    md.querySelectorAll('.drill-link-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.drillTag || '';
        track('diagnosis_drill_link_clicked', { tag });
        window.location.href = `/index.html?drill=${encodeURIComponent(tag)}`;
      });
    });
  }

  // === Structured diagnosis rendering ===
  // The new JSON shape from /api/diagnosis/me. Keys mirror the prompt:
  // { summary, weaknesses: [{rank, title, tag, description, evidence[], drill_available}], next_step }
  // dismissed state lives in localStorage keyed by user_id + rank.
  const DRILLABLE_TAGS_STRUCT = new Set(['weak_vocab', 'lack_detail']);

  function dismissedKey(userId, rank) {
    return `dismissed_${userId || 'anon'}_${rank}`;
  }

  function renderStructuredDiagnosis(payload) {
    const data = payload.data || {};
    const userId = payload.user_id || '';
    const summary = data.summary || '';
    const weaknesses = Array.isArray(data.weaknesses) ? data.weaknesses : [];
    const nextStep = data.next_step || '';

    const cardsHtml = weaknesses.map((w) => {
      const rank = w.rank ?? '?';
      const title = w.title || '—';
      const tag = w.tag || '';
      const desc = w.description || '';
      const evidence = Array.isArray(w.evidence) ? w.evidence : [];
      const drillBtn = (w.drill_available === true && DRILLABLE_TAGS_STRUCT.has(tag))
        ? `<button class="wcard__btn wcard__btn--drill" data-drill="${escapeHtml(tag)}">針對訓練 →</button>`
        : '';
      const evidenceHtml = evidence.length ? `
        <div class="wcard__evidence" data-rank="${escapeHtml(rank)}">
          <ol>${evidence.map(e => `<li>${escapeHtml(e)}</li>`).join('')}</ol>
        </div>` : '';
      const isDismissed = (() => {
        try { return localStorage.getItem(dismissedKey(userId, rank)) === '1'; }
        catch (_) { return false; }
      })();
      return `
        <div class="wcard${isDismissed ? ' dismissed' : ''}" data-rank="${escapeHtml(rank)}">
          <div class="wcard__head">
            <div class="wcard__rank">${escapeHtml(rank)}</div>
            <div class="wcard__title">${escapeHtml(title)}</div>
          </div>
          <div class="wcard__desc">${escapeHtml(desc)}</div>
          ${evidenceHtml}
          <div class="wcard__actions">
            ${evidence.length ? `<button class="wcard__btn wcard__btn--evidence" data-rank="${escapeHtml(rank)}">展開證據</button>` : ''}
            ${drillBtn}
            <button class="wcard__btn wcard__btn--dismiss${isDismissed ? ' done' : ''}" data-rank="${escapeHtml(rank)}">
              ${isDismissed ? '已標記為改善' : '✓ 已改善'}
            </button>
          </div>
          <div class="wcard__dismissed-note">已標記為改善，繼續觀察中</div>
        </div>`;
    }).join('');

    return `
      ${summary ? `<div class="struct-summary">${escapeHtml(summary)}</div>` : ''}
      <div class="weakness-cards">${cardsHtml}</div>
      ${nextStep ? `
        <div class="struct-next">
          <div class="struct-next__title">下一步</div>
          <div class="struct-next__body">${escapeHtml(nextStep)}</div>
        </div>` : ''}
    `;
  }

  function wireStructuredHandlers(root, userId) {
    // Toggle evidence reveal — flip .open on the matching .wcard__evidence,
    // toggle button label.
    root.querySelectorAll('.wcard__btn--evidence').forEach(btn => {
      btn.addEventListener('click', () => {
        const rank = btn.dataset.rank;
        const ev = root.querySelector(`.wcard__evidence[data-rank="${rank}"]`);
        if (!ev) return;
        const open = ev.classList.toggle('open');
        btn.textContent = open ? '收起證據' : '展開證據';
      });
    });
    // Drill deep-link — same mechanism as the timeline trend buttons.
    root.querySelectorAll('.wcard__btn--drill').forEach(btn => {
      btn.addEventListener('click', () => {
        const tag = btn.dataset.drill || '';
        track('diagnosis_struct_drill_clicked', { tag });
        window.location.href = `/index.html?drill=${encodeURIComponent(tag)}`;
      });
    });
    // Dismiss — write localStorage flag, flip the card class. No backend
    // round-trip; this is a personal "I'm watching this" marker.
    root.querySelectorAll('.wcard__btn--dismiss').forEach(btn => {
      btn.addEventListener('click', () => {
        const rank = btn.dataset.rank;
        const card = root.querySelector(`.wcard[data-rank="${rank}"]`);
        if (!card) return;
        const wasDismissed = card.classList.contains('dismissed');
        const key = dismissedKey(userId, rank);
        try {
          if (wasDismissed) {
            localStorage.removeItem(key);
            card.classList.remove('dismissed');
            btn.classList.remove('done');
            btn.textContent = '✓ 已改善';
          } else {
            localStorage.setItem(key, '1');
            card.classList.add('dismissed');
            btn.classList.add('done');
            btn.textContent = '已標記為改善';
            track('diagnosis_struct_dismissed', { rank });
          }
        } catch (_) { /* localStorage blocked — best-effort */ }
      });
    });
  }

  // Re-observe any new .fade-in nodes added after first render — the diagnosis
  // panel gets swapped in piecemeal, so a single boot-time observer would miss
  // the late arrivals.
  function observeFadeIns(root) {
    const els = (root || document).querySelectorAll('.fade-in:not(.visible)');
    if ('IntersectionObserver' in window) {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            obs.unobserve(e.target);
          }
        });
      }, { threshold: 0.1 });
      els.forEach(el => obs.observe(el));
    } else {
      els.forEach(el => el.classList.add('visible'));
    }
  }

  async function loadDiagnosis() {
    document.getElementById('container').innerHTML =
      '<div class="panel center"><div class="state-loading">Examining thy practice history…</div></div>';

    let token = null;
    try {
      const { data: { session } } = await sb.auth.getSession();
      token = session && session.access_token;
      if (session && session.user) { window.analytics.identify(session.user.id); }
    } catch (e) {
      console.error('getSession failed', e);
    }
    if (!token) {
      // Not signed in — bounce home where the auth panel lives.
      showError('Thou must first sign in. Returning to the practice.');
      setTimeout(() => { window.location = '/'; }, 1500);
      return;
    }

    // Fire all three in parallel — timeline + diagnosis + pro check.
    // Diagnosis is the slow one (cache miss → Claude); we paint the
    // page in two stages so the user sees the observation header
    // and skeleton instantly instead of staring at a single spinner
    // for 5–20s.
    const timelinePromise = fetch(`${API_BASE}/api/diagnosis/timeline`, {
      headers: { 'Authorization': `Bearer ${token}` }
    }).catch(() => null);
    const diagnosisPromise = fetch(`${API_BASE}/api/diagnosis/me`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const proPromise = fetch(`${API_BASE}/api/drill/check_quota`, {
      headers: { 'Authorization': `Bearer ${token}` }
    }).then(r => r.ok ? r.json() : null).catch(() => null);

    // === Stage 1: render scaffold immediately with skeleton ===
    document.getElementById('container').innerHTML = `
      <div id="observation-slot"></div>
      <div class="panel fade-in" id="diagnosis-panel">
        <div class="diagnosis-skeleton" aria-busy="true">
          <div class="skel-label">Examining thy practice history…</div>
          <div class="skel-line skel-line--h"></div>
          <div class="skel-line"></div>
          <div class="skel-line"></div>
          <div class="skel-line skel-line--medium"></div>
          <div class="skel-line skel-line--h" style="margin-top:24px"></div>
          <div class="skel-line"></div>
          <div class="skel-line skel-line--short"></div>
        </div>
      </div>`;
    observeFadeIns();

    // === Stage 2: timeline arrives → paint observation header ===
    let timeline = null;
    try {
      const tlRes = await timelinePromise;
      if (tlRes && tlRes.ok) timeline = await tlRes.json();
    } catch (_) { timeline = null; }
    if (timeline) {
      const slot = document.getElementById('observation-slot');
      if (slot) {
        slot.outerHTML = buildObservationHeader(timeline);
        observeFadeIns();
      }
    }

    // === Stage 3: diagnosis arrives → swap skeleton for real content ===
    let res, data;
    try { res = await diagnosisPromise; }
    catch (e) {
      console.error('fetch failed', e);
      showError('The examination could not be completed. Pray, try once more.');
      return;
    }
    if (!res.ok) {
      let detail = `Status ${res.status}`;
      try { const j = await res.json(); if (j?.detail) detail = j.detail; } catch (_) {}
      console.error('/api/diagnosis/me failed:', detail);
      showError('The examination could not be completed. Pray, try once more.');
      return;
    }
    try { data = await res.json(); }
    catch (e) {
      console.error('json parse failed', e);
      showError('The examination could not be completed. Pray, try once more.');
      return;
    }

    const count = data.practice_count ?? data.total_records ?? 0;
    document.getElementById('subtitle').textContent =
      count === 0
        ? 'No practices yet recorded.'
        : `A studied account of ${count} ${count === 1 ? 'practice' : 'practices'} undertaken.`;

    let isPro = false;
    try {
      const pro = await proPromise;
      isPro = !!(pro && pro.is_pro);
    } catch (_) { /* keep isPro = false */ }

    const panel = document.getElementById('diagnosis-panel');
    if (panel) {
      panel.classList.add('visible'); // keep the existing fade-in state
      console.log('diagnosis response:', JSON.stringify(data).slice(0, 200));
      const isStructured = data && data.format === 'structured' && data.data
        && Array.isArray(data.data.weaknesses);
      const bodyHtml = isStructured
        ? renderStructuredDiagnosis(data)
        : `<div class="md">${renderMarkdown(data.diagnosis_markdown || data.raw || '')}</div>`;
      panel.innerHTML = `
        ${bodyHtml}
        <div class="meta">Compiled ${new Date(data.generated_at || Date.now()).toLocaleString()}</div>
        <div class="diagnosis-conversion fade-in">
          <div class="diagnosis-conversion__free">
            <div class="diagnosis-conversion__tier">Free</div>
            <div class="diagnosis-conversion__value">Finds your weakness</div>
          </div>
          <div class="diagnosis-conversion__arrow">→</div>
          <div class="diagnosis-conversion__pro">
            <div class="diagnosis-conversion__tier">Pro</div>
            <div class="diagnosis-conversion__value">Fixes it</div>
          </div>
        </div>
        <div class="diagnosis-cta fade-in">
          <button id="diagnosis-cta-primary" class="diagnosis-cta__primary">前往單字訓練 →</button>
          <button id="diagnosis-cta-secondary" class="diagnosis-cta__secondary"${isPro ? ' style="display:none"' : ''}>Upgrade to Pro →</button>
        </div>`;
      if (isStructured) wireStructuredHandlers(panel, data.user_id || '');
    }

    document.getElementById('diagnosis-cta-primary').addEventListener('click', () => {
      track('diagnosis_drill_clicked');
      window.location.href = '/vocabulary.html';
    });
    const upgradeBtn = document.getElementById('diagnosis-cta-secondary');
    if (upgradeBtn && !isPro) {
      upgradeBtn.addEventListener('click', () => {
        track('diagnosis_upgrade_clicked');
        window.location.href = '/upgrade.html';
      });
    }

    track('diagnosis_viewed', {
      practice_count: count,
      cached: !!data.cached,
      format: data.format || 'raw',
    });

    // Walk the rendered .md DOM and append per-weakness metadata + drill
    // buttons. Only meaningful in raw/markdown mode — structured cards
    // already carry their own evidence + drill buttons.
    if (timeline && data.format !== 'structured') injectWeaknessMeta(timeline);

    // Re-run the fade-in observer over the freshly-mounted children.
    const fadeEls = document.querySelectorAll('.fade-in');
    if ('IntersectionObserver' in window) {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    obs.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        fadeEls.forEach(el => obs.observe(el));
    } else {
        fadeEls.forEach(el => el.classList.add('visible'));
    }
  }

  loadDiagnosis();
})();
</script>
