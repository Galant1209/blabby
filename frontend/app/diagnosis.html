<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thy Diagnosis · Blabby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
  /* Mirrors index.html token names so the page reads consistent. */
  :root {
    --bg:         #F5F0E8;
    --surface:    #FDFAF4;
    --ink:        #1C1008;
    --navy:       #1A3550;
    --gold:       #C9A84C;
    --gold-warm:  #E8C866;
    --red:        #6B1A1A;
    --border:     #C4B89A;
    --muted:      #7A6E5F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--ink);
    font-family: 'EB Garamond', 'Noto Serif TC', Georgia, serif;
    font-size: 16px; line-height: 1.6;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
  }
  .page { max-width: 600px; margin: 0 auto; padding: 40px 24px 80px; }

  header.brand { text-align: center; margin-bottom: 32px; }
  header.brand .back {
    display: inline-block; color: var(--muted); text-decoration: none;
    font-style: italic; font-size: 13px; letter-spacing: 0.04em;
    margin-bottom: 28px;
  }
  header.brand .back:hover { color: var(--gold); }
  header.brand h1 {
    font-family: 'Playfair Display', 'EB Garamond', serif;
    font-size: 32px; font-weight: 700; letter-spacing: 0.01em;
    color: var(--ink);
  }
  header.brand .rule {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin: 14px 0 10px; color: var(--gold);
  }
  header.brand .rule span:first-child,
  header.brand .rule span:last-child {
    width: 60px; height: 1px; background: var(--gold); display: inline-block;
  }
  header.brand .subtitle {
    font-style: italic; color: var(--muted); font-size: 15px;
  }

  .panel {
    background: var(--surface); border: 1.5px solid var(--border);
    padding: 32px 28px; margin-top: 24px;
  }
  .panel.center { text-align: center; }

  .state-loading, .state-error {
    font-style: italic; color: var(--muted); font-size: 16px;
    line-height: 1.6;
  }
  .state-error { color: var(--red); }
  .state-error button {
    display: inline-block; margin-top: 18px; padding: 10px 22px;
    background: transparent; border: 1.5px solid var(--gold); color: var(--gold);
    font-family: inherit; font-size: 14px; font-style: italic; cursor: pointer;
    letter-spacing: 0.04em; transition: background 120ms ease;
  }
  .state-error button:hover { background: rgba(201,168,76,0.08); }

  /* Markdown rendering — mirrors body type, gold rules between sections */
  .md h1, .md h2 { font-family: 'Playfair Display', 'EB Garamond', serif;
    font-size: 22px; font-weight: 700; color: var(--navy);
    margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    letter-spacing: 0.01em;
  }
  .md h1:first-child, .md h2:first-child { margin-top: 0; }
  .md h3 { font-size: 17px; font-weight: 700; color: var(--ink); margin: 20px 0 8px; }
  .md p  { margin: 0 0 14px; }
  .md ul { margin: 0 0 16px 22px; }
  .md li { margin-bottom: 6px; }
  .md em { color: var(--navy); font-style: italic; }
  .md strong { color: var(--ink); font-weight: 700; }

  .meta {
    margin-top: 32px; padding-top: 20px; border-top: 1px dashed var(--border);
    text-align: center; font-style: italic; color: var(--muted); font-size: 13px;
  }

  /* Mobile (375px) — tighter padding, slightly smaller heading */
  @media (max-width: 480px) {
    .page { padding: 28px 16px 60px; }
    header.brand h1 { font-size: 26px; }
    .panel { padding: 24px 18px; }
    .md h1, .md h2 { font-size: 19px; }
  }
  .diagnosis-conversion {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin: 32px 0 20px;
      padding: 20px;
      background: var(--surface, #faf8f3);
      border: 1px solid var(--border, #e8e0d0);
      border-radius: 8px;
  }
  .diagnosis-conversion__free,
  .diagnosis-conversion__pro {
      text-align: center;
  }
  .diagnosis-conversion__tier {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted, #8a7e6e);
      margin-bottom: 4px;
  }
  .diagnosis-conversion__value {
      font-family: 'Libre Baskerville', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink, #2c2416);
  }
  .diagnosis-conversion__arrow {
      font-size: 24px;
      color: var(--gold, #C9A84C);
      font-weight: 700;
  }
  .diagnosis-cta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
  }
  .diagnosis-cta__primary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--forest, #2D5016);
      color: var(--gold, #C9A84C);
      font-family: 'Libre Baskerville', serif;
      font-size: 15px;
      text-align: center;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.04em;
  }
  .diagnosis-cta__secondary {
      display: block;
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--muted, #8a7e6e);
      font-size: 13px;
      text-align: center;
      border: 1px solid var(--border, #e8e0d0);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
  }
</style>

</head>
<body>
<div class="page">
  <header class="brand">
    <div><a class="back" href="/">← Return to the practice</a></div>
    <h1>Thy Diagnosis</h1>
    <div class="rule"><span></span>◆<span></span></div>
    <div class="subtitle" id="subtitle">A studied account of thy practices.</div>
  </header>

  <div id="container">
    <div class="panel center">
      <div class="state-loading">Examining thy practice history…</div>
    </div>
  </div>
</div>

<script>
// TODO[pro-gate]: enhanced sections for pro users (deeper history,
// trend analysis, comparison vs. cohort).
(() => {
  const cfg = window.BLABBY_CONFIG || {};
  const SUPABASE_URL = cfg.supabaseUrl;
  const SUPABASE_ANON_KEY = cfg.supabaseAnonKey;
  const API_BASE = 'https://blabby-backend.onrender.com';

  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    document.getElementById('container').innerHTML =
      '<div class="panel center"><div class="state-error">Configuration is missing. Pray, alert the keeper of this site.</div></div>';
    return;
  }

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // PostHog wired via window.analytics (initialized in <head>).
  function track(event, props) {
      try { window.analytics.track(event, props || {}); } catch(_) {}
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Minimal markdown: headings, bold, italic, ordered/unordered lists,
  // paragraphs. Used because marked.js isn't loaded site-wide. Inputs
  // are escaped FIRST, then we re-introduce a small set of tags — so
  // model output can't inject HTML.
  function renderMarkdown(src) {
    if (window.marked && typeof window.marked.parse === 'function') {
      return window.marked.parse(src);
    }
    const lines = String(src || '').replace(/\r\n/g, '\n').split('\n');
    const out = [];
    let inList = false;
    const flushList = () => { if (inList) { out.push('</ul>'); inList = false; } };
    function inline(s) {
      // Order matters: bold before italic so **a** doesn't get split.
      return escapeHtml(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/(^|\W)\*(?!\s)([^*]+?)\*(?!\w)/g, '$1<em>$2</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
    }
    for (const raw of lines) {
      const line = raw.trimEnd();
      if (!line.trim()) { flushList(); continue; }
      const h = line.match(/^(#{1,3})\s+(.+)$/);
      if (h) {
        flushList();
        const lvl = h[1].length;
        out.push(`<h${lvl}>${inline(h[2])}</h${lvl}>`);
        continue;
      }
      const li = line.match(/^[-*]\s+(.+)$/);
      if (li) {
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push(`<li>${inline(li[1])}</li>`);
        continue;
      }
      flushList();
      out.push(`<p>${inline(line)}</p>`);
    }
    flushList();
    return out.join('\n');
  }

  function showError(msg) {
    document.getElementById('container').innerHTML = `
      <div class="panel center">
        <div class="state-error">
          ${escapeHtml(msg || 'The examination could not be completed. Pray, try once more.')}
          <div><button id="retry">Try Again</button></div>
        </div>
      </div>`;
    document.getElementById('retry').addEventListener('click', loadDiagnosis);
  }

  async function loadDiagnosis() {
    document.getElementById('container').innerHTML =
      '<div class="panel center"><div class="state-loading">Examining thy practice history…</div></div>';

    let token = null;
    try {
      const { data: { session } } = await sb.auth.getSession();
      token = session && session.access_token;
      if (session && session.user) { window.analytics.identify(session.user.id); }
    } catch (e) {
      console.error('getSession failed', e);
    }
    if (!token) {
      // Not signed in — bounce home where the auth panel lives.
      showError('Thou must first sign in. Returning to the practice.');
      setTimeout(() => { window.location = '/'; }, 1500);
      return;
    }

    let res, data;
    try {
      res = await fetch(`${API_BASE}/api/diagnosis/me`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    } catch (e) {
      console.error('fetch failed', e);
      showError('The examination could not be completed. Pray, try once more.');
      return;
    }

    if (!res.ok) {
      let detail = `Status ${res.status}`;
      try { const j = await res.json(); if (j?.detail) detail = j.detail; } catch (_) {}
      console.error('/api/diagnosis/me failed:', detail);
      showError('The examination could not be completed. Pray, try once more.');
      return;
    }

    try { data = await res.json(); }
    catch (e) {
      console.error('json parse failed', e);
      showError('The examination could not be completed. Pray, try once more.');
      return;
    }

    const count = data.practice_count ?? data.total_records ?? 0;
    document.getElementById('subtitle').textContent =
      count === 0
        ? 'No practices yet recorded.'
        : `A studied account of ${count} ${count === 1 ? 'practice' : 'practices'} undertaken.`;

    // Pull pro status alongside the diagnosis so the upgrade button can be
    // hidden for paying users. Fail-open: any error → assume non-pro and
    // show the upgrade CTA (false positive is acceptable; false negative
    // would silence a paid user with an "Upgrade" button which is worse).
    let isPro = false;
    try {
      const qres = await fetch(`${API_BASE}/api/drill/check_quota`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (qres.ok) {
        const q = await qres.json();
        isPro = !!(q && q.is_pro);
      }
    } catch (_) { /* keep isPro = false */ }

    document.getElementById('container').innerHTML = `
      <div class="panel">
        <div class="md">${renderMarkdown(data.diagnosis_markdown || '')}</div>
        <div class="meta">Compiled ${new Date(data.generated_at || Date.now()).toLocaleString()}</div>
        <div class="diagnosis-conversion">
          <div class="diagnosis-conversion__free">
            <div class="diagnosis-conversion__tier">Free</div>
            <div class="diagnosis-conversion__value">Finds your weakness</div>
          </div>
          <div class="diagnosis-conversion__arrow">→</div>
          <div class="diagnosis-conversion__pro">
            <div class="diagnosis-conversion__tier">Pro</div>
            <div class="diagnosis-conversion__value">Fixes it</div>
          </div>
        </div>
        <div class="diagnosis-cta">
          <button id="diagnosis-cta-primary" class="diagnosis-cta__primary">開始針對性訓練 →</button>
          <button id="diagnosis-cta-secondary" class="diagnosis-cta__secondary"${isPro ? ' style="display:none"' : ''}>Upgrade to Pro →</button>
        </div>
      </div>`;

    document.getElementById('diagnosis-cta-primary').addEventListener('click', () => {
      track('diagnosis_drill_clicked');
      window.location.href = '/';
    });
    const upgradeBtn = document.getElementById('diagnosis-cta-secondary');
    if (upgradeBtn && !isPro) {
      upgradeBtn.addEventListener('click', () => {
        track('diagnosis_upgrade_clicked');
        window.location.href = '/upgrade.html';
      });
    }

    track('diagnosis_viewed', { practice_count: count });
  }

  loadDiagnosis();
})();
</script>
</body>
</html>
