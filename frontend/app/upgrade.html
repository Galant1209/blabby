<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blabby Pro</title>
    <script src="/config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #F5F0E8;
            --surface:      #FDFAF4;
            --ink:          #1C1008;
            --muted:        #7A6E5F;
            --border:       #C4B89A;
            --gold:         #C9A84C;
            --gold-warm:    #E8C866;
            --accent:       #173f2f;
            --accent-soft:  #e4ede5;
            --error:        #9a2d21;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: 'Libre Baskerville', 'Noto Serif TC', Georgia, serif;
            font-size: 16px;
            line-height: 1.7;
        }

        main {
            width: min(100% - 32px, 620px);
            margin: 0 auto;
            padding: 52px 0 72px;
        }

        /* ── Hero ───────────────────────────────────────────── */
        .hero { padding-bottom: 32px; }

        .hero__kicker {
            margin: 0 0 22px;
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
        }

        h1.hero__headline {
            margin: 0 0 20px;
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.01em;
            color: var(--ink);
        }

        .hero__sub {
            margin: 0;
            font-family: 'Playfair Display', 'Noto Serif TC', serif;
            font-style: italic;
            font-size: 20px;
            line-height: 1.45;
            color: var(--accent);
        }

        /* ── Decorative rule ────────────────────────────────── */
        .rule {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 36px;
        }
        .rule__line  { flex: 1; height: 1px; background: var(--gold); opacity: 0.55; }
        .rule__diamond { color: var(--gold); font-size: 7px; line-height: 1; }

        /* ── Sections ───────────────────────────────────────── */
        .section { margin-bottom: 32px; }

        .section__title {
            margin: 0 0 16px;
            font-family: 'Libre Baskerville', serif;
            font-size: 11px;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Prop list ──────────────────────────────────────── */
        .prop-list {
            list-style: none;
            margin: 0;
            padding: 0;
            border-top: 1px solid var(--border);
        }

        .prop-list li {
            position: relative;
            padding: 13px 0 13px 22px;
            border-bottom: 1px dashed var(--border);
            font-family: 'EB Garamond', 'Noto Serif TC', serif;
            font-size: 17px;
            line-height: 1.6;
            color: var(--ink);
        }

        .prop-list li::before {
            content: '—';
            position: absolute;
            left: 0;
            top: 13px;
            color: var(--gold);
            font-family: 'EB Garamond', serif;
            line-height: 1.6;
        }

        /* ── Price banner ───────────────────────────────────── */
        .price-banner {
            padding: 16px 0;
            border-top: 1px solid var(--border);
            margin-bottom: 24px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 15px;
            color: var(--muted);
            text-align: center;
            letter-spacing: 0.02em;
        }

        /* ── Form ───────────────────────────────────────────── */
        form { display: grid; gap: 14px; }

        fieldset { margin: 0; padding: 0; border: 0; display: grid; gap: 8px; }

        legend {
            padding: 0;
            margin-bottom: 10px;
            font-family: 'Libre Baskerville', serif;
            font-size: 11px;
            font-style: italic;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .price-grid { display: grid; gap: 8px; }

        .price-option { position: relative; display: block; }

        .price-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .price-card {
            display: block;
            width: 100%;
            padding: 13px 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            line-height: 1.3;
            cursor: pointer;
            transition: border-color 0.12s, background 0.12s;
        }

        .price-option input:checked + .price-card {
            border-color: var(--accent);
            border-left: 3px solid var(--gold);
            background: var(--accent-soft);
            padding-left: 14px;
        }

        .price-option input:focus-visible + .price-card {
            outline: 2px solid rgba(201, 168, 76, 0.4);
            outline-offset: 2px;
        }

        input[type="email"] {
            width: 100%;
            min-height: 46px;
            padding: 11px 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.12s;
        }

        input[type="email"]:focus       { border-color: var(--accent); }

        input[type="email"]:invalid:not(:placeholder-shown) { border-color: var(--error); }

        button {
            min-height: 48px;
            border: 1px solid var(--accent);
            background: var(--accent);
            color: var(--surface);
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        button:hover    { opacity: 0.88; }
        button:disabled { cursor: wait; opacity: 0.6; }

        .error {
            min-height: 20px;
            color: var(--error);
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 13px;
            line-height: 1.5;
        }

        /* ── Success / followup (rendered by JS) ────────────── */
        .success {
            padding: 28px 0;
            font-family: 'Playfair Display', serif;
            font-size: 21px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.45;
        }

        .success small {
            display: block;
            margin-top: 10px;
            font-family: 'Libre Baskerville', serif;
            font-size: 13px;
            font-style: italic;
            font-weight: 400;
            color: var(--muted);
            line-height: 1.55;
        }

        .followup {
            display: grid;
            gap: 12px;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 1px solid var(--border);
        }

        .followup-label {
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1.4;
        }

        textarea {
            width: 100%;
            min-height: 96px;
            padding: 11px 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--ink);
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            line-height: 1.55;
            resize: vertical;
            outline: none;
            transition: border-color 0.12s;
        }

        textarea:focus { border-color: var(--accent); }

        .followup-actions { display: flex; gap: 10px; }
        .followup-actions button { flex: 1; }

        .btn-ghost {
            background: transparent;
            border-color: var(--border);
            color: var(--muted);
            font-weight: 400;
        }

        /* ── Responsive ─────────────────────────────────────── */
        @media (min-width: 600px) {
            main { padding: 72px 0 96px; }
            h1.hero__headline { font-size: 50px; }
            .price-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
    </style>
</head>
<body>
<main>

    <header class="hero">
        <p class="hero__kicker">Blabby Pro</p>
        <h1 class="hero__headline">免費版讓你<br>再犯一次同樣的錯。</h1>
        <p class="hero__sub">Pro 會陪你練到你不再犯為止。</p>
    </header>

    <div class="rule" aria-hidden="true">
        <span class="rule__line"></span>
        <span class="rule__diamond">◆</span>
        <span class="rule__line"></span>
    </div>

    <section class="section">
        <h2 class="section__title">Pro 適合你，如果</h2>
        <ul class="prop-list">
            <li>你練習過同一題，卻在考場上說出同樣的句子</li>
            <li>你知道自己的英文能力不止於此</li>
            <li>你想要被糾正，不只是被鼓勵</li>
        </ul>
    </section>

    <section class="section">
        <h2 class="section__title">Pro 為你做什麼</h2>
        <ul class="prop-list">
            <li>無限次針對性訓練，直到弱點被根除</li>
            <li>顯示精確的語言證據——哪個字、哪個句子出賣了你</li>
            <li>記錄每一次練習的進步，讓你親眼看見自己的成長</li>
        </ul>
    </section>

    <section id="intent-section" class="section">
        <p class="price-banner">每月 NT$259 &nbsp;·&nbsp; 隨時可以取消</p>
        <form id="upgrade-form" novalidate>
            <fieldset>
                <legend>這個價格值得嗎？</legend>
                <div class="price-grid">
                    <label class="price-option">
                        <input type="radio" name="price_choice" value="149">
                        <span class="price-card">NT$149 / 月</span>
                    </label>
                    <label class="price-option">
                        <input type="radio" name="price_choice" value="259">
                        <span class="price-card">NT$259 / 月</span>
                    </label>
                    <label class="price-option">
                        <input type="radio" name="price_choice" value="499">
                        <span class="price-card">NT$499 / 月</span>
                    </label>
                    <label class="price-option">
                        <input type="radio" name="price_choice" value="0">
                        <span class="price-card">暫時不加入</span>
                    </label>
                </div>
            </fieldset>

            <input id="email" type="email" placeholder="電子郵件（必填）" autocomplete="email" required>
            <button id="submit-btn" type="submit">預約我的位置</button>
            <div id="error" class="error" role="status" aria-live="polite"></div>
        </form>
    </section>

</main>

<script>
const form = document.getElementById('upgrade-form');
const intentSection = document.getElementById('intent-section');
const emailInput = document.getElementById('email');
const errorEl = document.getElementById('error');
const submitBtn = document.getElementById('submit-btn');
const priceInputs = document.querySelectorAll('input[name="price_choice"]');

// ---- tracking events (written to upgrade_intent.metadata on submit) ----
const trackedEvents = [];

function track(name, props = {}) {
    trackedEvents.push({
        name,
        ts: new Date().toISOString(),
        ...props,
    });
}

// 1. page viewed
track('upgrade_page_viewed');

// 2. price selected (fires on change)
priceInputs.forEach(input => {
    input.addEventListener('change', () => {
        track('price_selected', { value: parseInt(input.value, 10) });
        updateButtonLabel();
    });
});

// 3. email entered (fires on blur, only if non-empty + valid)
emailInput.addEventListener('blur', () => {
    const v = emailInput.value.trim();
    if (v && emailInput.checkValidity()) {
        track('email_entered');
    }
});

// ---- dynamic submit button label ----
function selectedPrice() {
    const selected = document.querySelector('input[name="price_choice"]:checked');
    return selected ? parseInt(selected.value, 10) : null;
}

function updateButtonLabel() {
    const price = selectedPrice();
    if (price === null) {
        submitBtn.textContent = 'Continue';
    } else if (price === 0) {
        submitBtn.textContent = 'Tell us why (next survey)';
    } else {
        submitBtn.textContent = `I'd pay $${price}/mo for this`;
    }
}

// ---- helpers ----
function configValue(name) {
    const config = window.BLABBY_CONFIG || {};
    return typeof config[name] === 'string' ? config[name].trim() : '';
}

function setError(message) {
    errorEl.textContent = message;
}

// ---- submit ----
async function submitIntent(event) {
    event.preventDefault();
    setError('');

    const price = selectedPrice();
    if (price === null) {
        setError('Please select a price.');
        return;
    }

    const emailValue = emailInput.value.trim();
    if (!emailValue) {
        setError('Email is required so we can let you know when Pro launches.');
        emailInput.focus();
        return;
    }
    if (!emailInput.checkValidity()) {
        setError('Please enter a valid email.');
        emailInput.focus();
        return;
    }

    const supabaseUrl = configValue('supabaseUrl');
    const supabaseAnonKey = configValue('supabaseAnonKey');
    if (!supabaseUrl || !supabaseAnonKey) {
        setError('Config is missing. Please try again later.');
        return;
    }

    submitBtn.disabled = true;

    track('intent_submitted', { price });

    const metadata = {
        opt_out: price === 0,
        events: trackedEvents,
        page_url: window.location.href,
    };

    try {
        const response = await fetch(`${supabaseUrl}/rest/v1/upgrade_intent`, {
            method: 'POST',
            headers: {
                apikey: supabaseAnonKey,
                Authorization: `Bearer ${supabaseAnonKey}`,
                'Content-Type': 'application/json',
                Prefer: 'return=representation',
            },
            body: JSON.stringify({
                email: emailValue,
                reserved_price: price,
                source: 'upgrade_page',
                user_agent: navigator.userAgent,
                metadata,
            }),
        });

        if (!response.ok) {
            const text = await response.text().catch(() => '');
            throw new Error(`Supabase insert failed: ${response.status} ${text}`);
        }

        const rows = await response.json().catch(() => []);
        const rowId = rows[0]?.id ?? null;

        if (price === 0) {
            renderOptOutFollowUp(rowId, supabaseUrl, supabaseAnonKey, metadata);
        } else {
            intentSection.innerHTML =
                `<div class="success">Reserved at $${price}/mo.` +
                `<small>We'll email you the moment Pro is ready. No spam.</small></div>`;
        }
    } catch (error) {
        console.error('upgrade_intent insert failed:', error);
        setError('Something went wrong. Please try again.');
        submitBtn.disabled = false;
    }
}

// ---- opt-out follow-up ----
function renderOptOutFollowUp(rowId, supabaseUrl, supabaseAnonKey, metadata) {
    intentSection.innerHTML =
        '<div class="success">Got it. Thanks for the honest signal.' +
        '<small>Your signal helps us build the right thing.</small>' +
        '<div class="followup">' +
            '<label class="followup-label" for="opt-out-reason">What would change your mind?</label>' +
            '<textarea id="opt-out-reason" placeholder="e.g. If it tracked my progress over time, or if there was a free trial…" maxlength="500"></textarea>' +
            '<div class="followup-actions">' +
                '<button id="followup-send-btn" type="button">Send</button>' +
                '<button id="followup-skip-btn" type="button" class="btn-ghost">Skip</button>' +
            '</div>' +
            '<div id="followup-error" class="error" role="status" aria-live="polite"></div>' +
        '</div>' +
        '</div>';

    const reasonEl = document.getElementById('opt-out-reason');
    const sendBtn  = document.getElementById('followup-send-btn');
    const skipBtn  = document.getElementById('followup-skip-btn');
    const errEl    = document.getElementById('followup-error');

    sendBtn.addEventListener('click', async () => {
        const reason = reasonEl.value.trim();
        if (!reason) {
            errEl.textContent = 'Please write something, or click Skip.';
            return;
        }
        sendBtn.disabled = true;
        skipBtn.disabled = true;
        errEl.textContent = '';

        try {
            if (rowId) {
                const updatedMetadata = { ...metadata, opt_out_reason: reason };
                await fetch(`${supabaseUrl}/rest/v1/upgrade_intent?id=eq.${rowId}`, {
                    method: 'PATCH',
                    headers: {
                        apikey: supabaseAnonKey,
                        Authorization: `Bearer ${supabaseAnonKey}`,
                        'Content-Type': 'application/json',
                        Prefer: 'return=minimal',
                    },
                    body: JSON.stringify({ metadata: updatedMetadata }),
                });
            }
            track('opt_out_reason_submitted', { length: reason.length });
        } catch (e) {
            console.error('opt_out_reason patch failed:', e);
            // Don't surface to user — reason is a bonus signal, not critical
        }

        showOptOutFinal();
    });

    skipBtn.addEventListener('click', () => {
        track('opt_out_reason_skipped');
        showOptOutFinal();
    });

    reasonEl.focus();
}

function showOptOutFinal() {
    intentSection.innerHTML =
        '<div class="success">Thanks for being honest with us.' +
        '<small>We\'ll keep building. If anything changes, come back.</small></div>';
}

form.addEventListener('submit', submitIntent);
</script>
</body>
</html>
