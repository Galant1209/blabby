<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解鎖 Pro · Blabby</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            max-width: 560px;
            margin: 60px auto;
            padding: 24px;
            line-height: 1.6;
            color: #1C1008;
        }
        h1 { font-size: 22px; margin-bottom: 16px; }
        p { margin-bottom: 12px; }
        input[type="email"] {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        button {
            padding: 10px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        a { color: #1B3A2D; }
        .meta { font-size: 12px; color: #7A6E5F; margin-top: 24px; }
    </style>
</head>
<body>
<h1>解鎖你的詞彙弱點完整修復計畫</h1>
<p>本週免費版的 drill 額度已用完。Pro 即將推出。</p>
<p>留下 email,Pro 上線時第一時間通知你:</p>
<input type="email" id="email" placeholder="your@email.com">
<button onclick="submitEmail()">通知我</button>

<p class="meta"><a href="/">← 回到練習</a></p>

<script>
const API_BASE = 'https://blabby-backend.onrender.com';
const SUPABASE_URL      = 'https://mkwywkwruyqzdhuzwnoa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rd3l3a3dydXlxemRodXp3bm9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MjY1NDQsImV4cCI6MjA5MjUwMjU0NH0.qVNtw6L7oXamzGlvXbVSHkELhG4YnXjWWgKbGublJj8';

let sb = null;
try {
    if (window.supabase && typeof window.supabase.createClient === 'function') {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }
} catch (e) { /* tracking falls back to anonymous */ }

async function authHeader() {
    if (!sb) return null;
    try {
        const { data: { session } } = await sb.auth.getSession();
        const token = session && session.access_token;
        return token ? { Authorization: `Bearer ${token}` } : null;
    } catch (e) { return null; }
}

// Page-view tracking — fires once on load. Auth optional; backend logs
// user_id when a valid bearer token is supplied, "anonymous" otherwise.
(async () => {
    const headers = (await authHeader()) || {};
    headers['Content-Type'] = 'application/json';
    try {
        await fetch(`${API_BASE}/api/track/upgrade_page_view`, {
            method: 'POST',
            headers,
            body: '{}',
        });
    } catch (e) { /* tracking is best-effort */ }
})();

async function submitEmail() {
    const email = document.getElementById('email').value.trim();
    console.log('Email submitted:', email);
    const headers = (await authHeader()) || {};
    headers['Content-Type'] = 'application/json';
    try {
        await fetch(`${API_BASE}/api/track/upgrade_interest`, {
            method: 'POST',
            headers,
            body: JSON.stringify({
                email: email,
                timestamp: new Date().toISOString(),
            }),
        });
    } catch (e) { /* swallow — UX message still fires below */ }
    alert('收到!Pro 上線會通知你。');
}
</script>
</body>
</html>
